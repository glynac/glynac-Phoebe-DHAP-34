x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  env_file:
    - ./.env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__API__AUTH_BACKENDS: ${AIRFLOW__API__AUTH_BACKENDS}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:${REDIS_PORT}/0
    AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
    # Expose MinIO/S3 to DAGs
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_ENDPOINT: ${S3_ENDPOINT}
    S3_SECURE: ${S3_SECURE}
    MINIO_BUCKET: ${MINIO_BUCKET}
    _PIP_ADDITIONAL_REQUIREMENTS: ""
  volumes:
  - ${DAGS_VOLUME:-./dags}:/opt/airflow/dags
  - ${LOGS_VOLUME:-./logs}:/opt/airflow/logs
  - ${PLUGINS_VOLUME:-./plugins}:/opt/airflow/plugins
  - ${INGESTION_VOLUME:-./ingestion}:/opt/airflow/ingestion
  - ./requirements.txt:/requirements.txt
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  depends_on:
    - postgres
    - redis

services:
  postgres:
    image: postgres:15
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT}:6379"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        pip install --no-cache-dir -r /requirements.txt
        airflow db init
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname "${_AIRFLOW_WWW_USER_FIRSTNAME}" \
          --lastname "${_AIRFLOW_WWW_USER_LASTNAME}" \
          --role Admin \
          --email "${_AIRFLOW_WWW_USER_EMAIL}" || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      - airflow-init
      - scheduler

  scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      - airflow-init
      - redis

  triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      - airflow-init

  minio:
    image: minio/minio:latest
    env_file:
      - ./.env
    command: server --console-address ":${MINIO_CONSOLE_PORT}" /data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc:latest
    env_file:
      - ./.env
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc ls local


volumes:
  postgres_data:
  minio_data:
