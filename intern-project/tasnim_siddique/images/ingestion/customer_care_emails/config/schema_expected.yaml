    type: integer
    nullable: false

  - name: subject
    type: string
    nullable: true

  - name: sender
    type: string
    nullable: true

  - name: receiver
    type: string
    nullable: true

  - name: timestamp
    type: string
    nullable: true

  - name: message_body
    type: string
    nullable: true

  - name: thread_id
    type: string
    nullable: true

  - name: email_types
    type: string
    nullable: true

  - name: email_status
    type: string
    nullable: true

  - name: email_criticality
    type: string
    nullable: true

  - name: product_types
    type: string
    nullable: true

  - name: agent_effectivity
    type: string
    nullable: true

  - name: agent_efficiency
    type: string
    nullable: true

  - name: customer_satisfaction
    type: numeric
    nullable: true

  - name: agent_effectivity_rating
    type: integer
    nullable: true

  - name: agent_efficiency_rating
    type: integer
    nullable: true

  - name: sentiment
    type: string
    nullable: true

  - name: sentiment_score
    type: numeric
    nullable: true

  - name: word_count
    type: integer
    nullable: true

uniques:
