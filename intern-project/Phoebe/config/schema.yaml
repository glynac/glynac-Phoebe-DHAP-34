dataset_name: "customer_care_emails_ingestion"
table_name: "customer_care_emails"
description: "Ingesting customer care emails from CSV"
columns:
  - name: "subject"
    type: "VARCHAR(255)"
  - name: "sender"
    type: "VARCHAR(255)"
  - name: "receiver"
    type: "VARCHAR(255)"
  - name: "timestamp"
    type: "TIMESTAMP"
  - name: "message_body"
    type: "TEXT"
  - name: "thread_id"
    type: "VARCHAR(100)"
  - name: "email_types"
    type: "VARCHAR(50)"
  - name: "email_status"
    type: "VARCHAR(50)"
  - name: "email_criticality"
    type: "VARCHAR(50)"
  - name: "product_types"
    type: "VARCHAR(100)"
  - name: "agent_effectivity"
    type: "VARCHAR(50)"
  - name: "agent_efficiency"
    type: "VARCHAR(50)"
  - name: "customer_satisfaction"
    type: "INTEGER"