# Mautic Emails Extraction
dag_id: DOCKER__sql_extractor__mautic_emails
description: "Extract Mautic emails table to MinIO (ORC format)"
schedule_interval: "0 2 * * *"
owner: data-platform
catchup: false
retries: 2
retry_delay_minutes: 10
tags:
  - sql-extractor
  - mautic
  - emails

tasks:
  - task_id: extract_emails
    job_name: sql-extractor
    connection_id: mariadb_mautic
    environment:
      MINIO_ENDPOINT: "{{ var.value.MINIO_ENDPOINT }}"
      MINIO_ACCESS_KEY: "{{ var.value.MINIO_ACCESS_KEY }}"
      MINIO_SECRET_KEY: "{{ var.value.MINIO_SECRET_KEY }}"
      MINIO_BUCKET: "raw-data"
      MINIO_SECURE: "false"
      DB_TYPE: "mysql"
      TABLE_NAME: "emails"
      OUTPUT_PREFIX: "mautic/emails"
      PARTITION_COLUMN: "date_added"
      PARTITION_FORMAT: "%Y-%m-%d"
      INCREMENTAL_MODE: "false"
      BATCH_SIZE: "10000"
      ORC_COMPRESSION: "snappy"
