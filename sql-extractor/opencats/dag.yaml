# OpenCATS Database Extraction
# Tasks run independently - one failure won't block others

dag_id: DOCKER__sql_extractor__opencats
description: "Extract OpenCATS database tables to MinIO (ORC format)"
schedule_interval: "0 4 * * *"
owner: data-platform
catchup: false
retries: 2
retry_delay_minutes: 10
tags:
  - sql-extractor
  - opencats
  - production

tasks:
  - task_id: extract_candidates
    job_name: sql-extractor
    connection_id: mariadb_opencats
    environment:
      MINIO_ENDPOINT: "{{ var.value.MINIO_ENDPOINT }}"
      MINIO_ACCESS_KEY: "{{ var.value.MINIO_ACCESS_KEY }}"
      MINIO_SECRET_KEY: "{{ var.value.MINIO_SECRET_KEY }}"
      MINIO_BUCKET: "raw-data"
      MINIO_SECURE: "false"
      DB_TYPE: "mysql"
      TABLE_NAME: "candidate"
      OUTPUT_PREFIX: "opencats/candidates"
      PARTITION_COLUMN: "date_created"
      PARTITION_FORMAT: "%Y-%m-%d"
      INCREMENTAL_MODE: "false"
      BATCH_SIZE: "10000"
      ORC_COMPRESSION: "snappy"
