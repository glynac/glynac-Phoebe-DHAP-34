version: "1.0"
layer: bronze
database: blackdiamond
view: contact_phones_raw

metadata:
  description: "Raw Black Diamond contact phones data from MinIO"
  owner: data-engineering
  tags:
    - bronze
    - blackdiamond
    - wealth-management
    - contact-phones

source:
  type: minio
  bucket: main-data
  path: blackdiamond/contact_phones
  format: parquet

  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_parquet_allow_missing_columns: 1

schema:
  mode: auto

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
