version: "1.0"
layer: bronze
database: blackdiamond
view: asset_tags_raw

metadata:
  description: "Raw Black Diamond asset tags data from MinIO"
  owner: data-engineering
  tags:
    - bronze
    - blackdiamond
    - wealth-management
    - asset-tags

source:
  type: minio
  bucket: main-data
  path: blackdiamond/asset_tags
  format: parquet
  file_pattern: asset_tags.parquet
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_parquet_allow_missing_columns: 1

schema:
  mode: auto

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
