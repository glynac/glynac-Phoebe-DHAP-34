version: "1.0"
layer: bronze
database: redtail
table: net_worth_raw

metadata:
  description: "Raw Redtail net worth data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/net_worth
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: status
      type: String
    - name: message_type
      type: String
    - name: rec_id
      type: Int32
    - name: contact_id
      type: Int32
    - name: as_of_date
      type: String
    - name: cash_and_equivalents
      type: String
    - name: investments
      type: String
    - name: retirement_accounts
      type: String
    - name: real_estate
      type: String
    - name: business_interests
      type: String
    - name: personal_property
      type: String
    - name: other_assets
      type: String
    - name: total_assets
      type: String
    - name: short_term_liabilities
      type: String
    - name: mortgages
      type: String
    - name: loans
      type: String
    - name: other_liabilities
      type: String
    - name: total_liabilities
      type: String
    - name: net_worth_amount
      type: String
    - name: rec_add
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit
      type: String
    - name: rec_edit_user
      type: Int32
    - name: record_id
      type: Int32
    - name: notes
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"