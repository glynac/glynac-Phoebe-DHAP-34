version: "1.0"
layer: bronze
database: redtail
view: contact_raw

metadata:
  description: "Raw Redtail contact data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/contact
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: contact_id
      type: Int32
    - name: rec_id
      type: Int32
    - name: first_name
      type: String
    - name: last_name
      type: String
    - name: full_name
      type: String
    - name: prefix
      type: String
    - name: email
      type: String
    - name: phone_number
      type: String
    - name: phone_number2
      type: String
    - name: mobile_phone
      type: String
    - name: work_phone
      type: String
    - name: home_phone
      type: String
    - name: fax_number
      type: String
    - name: address1
      type: String
    - name: city
      type: String
    - name: state
      type: String
    - name: zip_code
      type: String
    - name: country
      type: String
    - name: date_of_birth
      type: String
    - name: gender
      type: String
    - name: marital_status
      type: String
    - name: occupation
      type: String
    - name: company_name
      type: String
    - name: job_title
      type: String
    - name: contact_type
      type: String
    - name: contact_status
      type: String
    - name: assigned_to
      type: Int32
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"