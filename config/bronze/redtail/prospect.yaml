version: "1.0"
layer: bronze
database: redtail
view: prospect_raw

metadata:
  description: "Raw Redtail prospect data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/prospect
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: batch_size
      type: Int32
    - name: message_type
      type: String
    - name: batch_status
      type: String
    - name: prospect_id
      type: Int32
    - name: contact_id
      type: Int32
    - name: prospect_number
      type: String
    - name: prospect_status
      type: String
    - name: stage
      type: String
    - name: source
      type: String
    - name: expected_revenue
      type: String
    - name: probability
      type: Int32
    - name: expected_close_date
      type: String
    - name: notes
      type: String
    - name: rec_id
      type: Int32
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit_user
      type: Int32
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"