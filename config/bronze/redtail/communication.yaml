version: "1.0"
layer: bronze
database: redtail
view: communication_raw

metadata:
  description: "Raw Redtail communication data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/communication
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: rec_id
      type: Int32
    - name: communication_id
      type: Int32
    - name: communication_type
      type: String
    - name: direction
      type: String
    - name: subject
      type: String
    - name: body
      type: String
    - name: contact_id
      type: Int32
    - name: from_user_id
      type: Int32
    - name: to_contact_id
      type: Int32
    - name: comm_status
      type: String
    - name: read_status
      type: Bool
    - name: communication_date
      type: String
    - name: attachments_count
      type: Int32
    - name: notes
      type: String
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"