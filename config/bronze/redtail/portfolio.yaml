version: "1.0"
layer: bronze
database: redtail
table: portfolio_raw

metadata:
  description: "Raw Redtail portfolio data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/portfolio
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_offset
      type: Int64
    - name: batch_size
      type: Int32
    - name: batch_number
      type: Int32
    - name: batch_timestamp
      type: String
    - name: status
      type: String
    - name: message_type
      type: String
    - name: rec_id
      type: Int32
    - name: portfolio_id
      type: Int32
    - name: portfolio_name
      type: String
    - name: portfolio_code
      type: String
    - name: portfolio_type
      type: String
    - name: strategy
      type: String
    - name: objective
      type: String
    - name: risk_level
      type: String
    - name: target_return
      type: String
    - name: ytd_return
      type: String
    - name: one_year_return
      type: String
    - name: three_year_return
      type: String
    - name: five_year_return
      type: String
    - name: inception_return
      type: String
    - name: created_by
      type: Int32
    - name: manager_id
      type: Int32
    - name: inception_date
      type: String
    - name: description
      type: String
    - name: is_model
      type: UInt8
    - name: is_active
      type: UInt8
    - name: rec_add
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit
      type: String
    - name: rec_edit_user
      type: Int32
    - name: notes
      type: String
    - name: accounts_data
      type: String
    - name: portfolio_allocations_data
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"