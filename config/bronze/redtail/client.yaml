version: "1.0"
layer: bronze
database: redtail
view: client_raw

metadata:
  description: "Raw Redtail client data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/client
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date
clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: batch_status
      type: String
    - name: rec_id
      type: Int32
    - name: client_id
      type: Int32
    - name: contact_id
      type: Int32
    - name: client_number
      type: String
    - name: client_since
      type: String
    - name: client_status
      type: String
    - name: service_level
      type: String
    - name: risk_tolerance
      type: String
    - name: investment_objective
      type: String
    - name: aum
      type: String
    - name: annual_revenue
      type: String
    - name: next_review_date
      type: String
    - name: notes
      type: String
    - name: is_active
      type: Bool
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit_user
      type: Int32
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date
      
validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"