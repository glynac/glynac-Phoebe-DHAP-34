version: "1.0"
layer: bronze
database: redtail
table: investment_raw

metadata:
  description: "Raw Redtail investment data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/investment
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: batch_timestamp
      type: String
    - name: message_type
      type: String
    - name: status
      type: String
    - name: rec_id
      type: Int32
    - name: investment_id
      type: Int32
    - name: investment_name
      type: String
    - name: symbol
      type: String
    - name: investment_type
      type: String
    - name: asset_class
      type: String
    - name: category
      type: String
    - name: current_price
      type: String
    - name: previous_close
      type: String
    - name: price_change
      type: String
    - name: price_change_percent
      type: String
    - name: description
      type: String
    - name: currency
      type: String
    - name: country
      type: String
    - name: coupon_rate
      type: String
    - name: maturity_date
      type: String
    - name: credit_rating
      type: String
    - name: ytd_return
      type: String
    - name: one_year_return
      type: String
    - name: three_year_return
      type: String
    - name: five_year_return
      type: String
    - name: dividend_yield
      type: String
    - name: is_active
      type: Bool
    - name: cusip
      type: String
    - name: isin
      type: String
    - name: expense_ratio
      type: String
    - name: fund_manager
      type: String
    - name: fund_family
      type: String
    - name: fund_aum
      type: String
    - name: exchange
      type: String
    - name: sector
      type: String
    - name: industry
      type: String
    - name: rec_add
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit
      type: String
    - name: rec_edit_user
      type: Int32
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"