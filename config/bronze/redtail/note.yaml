version: "1.0"
layer: bronze
database: redtail
view: note_raw

metadata:
  description: "Raw Redtail note data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/note
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: batch_status
      type: String
    - name: note_rec_id
      type: Int32
    - name: note_id
      type: Int32
    - name: title
      type: String
    - name: content
      type: String
    - name: note_type
      type: String
    - name: contact_id
      type: Int32
    - name: created_by
      type: Int32
    - name: category
      type: String
    - name: tags
      type: String
    - name: is_private
      type: Boolean
    - name: is_pinned
      type: Boolean
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"