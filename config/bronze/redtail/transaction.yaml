version: "1.0"
layer: bronze
database: redtail
view: transaction_raw

metadata:
  description: "Raw Redtail transaction data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/transaction
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: rec_id
      type: Int32
    - name: transaction_id
      type: Int32
    - name: transaction_number
      type: String
    - name: transaction_type
      type: String
    - name: account_id
      type: Int32
    - name: investment_id
      type: Int32
    - name: amount
      type: String
    - name: fees
      type: String
    - name: currency
      type: String
    - name: transaction_date
      type: String
    - name: settlement_date
      type: String
    - name: entry_date
      type: String
    - name: transaction_status
      type: String
    - name: description
      type: String
    - name: notes
      type: String
    - name: reference_number
      type: String
    - name: is_active
      type: Boolean
    - name: investment
      type: String
    - name: investment_data
      type: String
    - name: price_per_unit
      type: String
    - name: quantity
      type: String
    - name: rec_add
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit
      type: String
    - name: rec_edit_user
      type: Int32
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"