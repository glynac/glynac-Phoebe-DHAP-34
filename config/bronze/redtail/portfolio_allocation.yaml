version: "1.0"
layer: bronze
database: redtail
view: portfolio_allocation_raw

metadata:
  description: "Raw Redtail portfolio allocation data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/portfolio_allocation
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: status
      type: String
    - name: rec_id
      type: Int32
    - name: portfolio_id
      type: Int32
    - name: investment_id
      type: Int32
    - name: target_percentage
      type: String
    - name: current_percentage
      type: String
    - name: min_percentage
      type: String
    - name: max_percentage
      type: String
    - name: notes
      type: String
    - name: is_core_holding
      type: Bool
    - name: is_active
      type: Bool
    - name: rec_add
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit
      type: String
    - name: rec_edit_user
      type: Int32
    - name: record_id
      type: Int32
    - name: investment_data
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"