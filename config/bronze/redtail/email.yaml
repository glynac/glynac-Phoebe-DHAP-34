version: "1.0"
layer: bronze
database: redtail
view: email_raw

metadata:
  description: "Raw Redtail email data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/email
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: email_id
      type: Int32
    - name: rec_id
      type: Int32
    - name: from_address
      type: String
    - name: to_addresses
      type: String
    - name: cc_addresses
      type: String
    - name: bcc_addresses
      type: String
    - name: subject
      type: String
    - name: body_text
      type: String
    - name: body_html
      type: String
    - name: contact_id
      type: Int32
    - name: sent_by
      type: Int32
    - name: email_status
      type: String
    - name: is_read
      type: Boolean
    - name: sent_date
      type: String
    - name: read_date
      type: String
    - name: delivered_date
      type: String
    - name: open_count
      type: Int32
    - name: click_count
      type: Int32
    - name: has_attachments
      type: Boolean
    - name: attachments_count
      type: Int32
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"