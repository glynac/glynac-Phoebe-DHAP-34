version: "1.0"
layer: bronze
database: redtail
view: lead_raw

metadata:
  description: "Raw Redtail lead data from MinIO"
  owner: data-engineering

source:
  type: minio
  bucket: main-data
  path: redtail/lead
  format: orc
  partitions:
    - name: glynac_organization_id
      type: String
    - name: processing_date
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
    - name: glynac_organization_id
      type: String
    - name: entity_type
      type: String
    - name: batch_timestamp
      type: String
    - name: batch_number
      type: Int32
    - name: batch_offset
      type: Int64
    - name: message_type
      type: String
    - name: lead_id
      type: Int32
    - name: rec_id
      type: Int32
    - name: first_name
      type: String
    - name: last_name
      type: String
    - name: full_name
      type: String
    - name: email
      type: String
    - name: phone_number
      type: String
    - name: company_name
      type: String
    - name: job_title
      type: String
    - name: industry
      type: String
    - name: lead_status
      type: String
    - name: source
      type: String
    - name: rating
      type: String
    - name: assigned_to
      type: Int32
    - name: converted_to_prospect
      type: Bool
    - name: converted_date
      type: String
    - name: notes
      type: String
    - name: rec_add
      type: String
    - name: rec_edit
      type: String
    - name: rec_add_user
      type: Int32
    - name: rec_edit_user
      type: Int32
    - name: processing_timestamp
      type: String
    - name: processing_date
      type: Date

validation:
  enabled: true
  checks:
    - name: not_empty
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: has_recent_data
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"