version: "1.0"
layer: bronze
database: mautic
view: widgets_raw

source:
  bucket: raw-data
  path: mautic/widgets
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw Mautic widgets data via sql-extractor"
tags: [bronze, mautic, widgets, sql-extractor, auto-schema]
