version: "1.0"
layer: bronze
database: mautic
view: page_hits_raw

source:
  bucket: raw-data
  path: mautic/page_hits
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw Mautic page_hits data via sql-extractor"
tags: [bronze, mautic, page_hits, sql-extractor, auto-schema]
