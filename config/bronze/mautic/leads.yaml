version: "1.0"
layer: bronze
database: mautic
view: leads_raw

source:
  bucket: raw-data
  path: mautic/leads
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw Mautic leads data extracted from MariaDB via sql-extractor (auto-schema)"

tags:
  - bronze
  - mautic
  - leads
  - sql-extractor
  - auto-schema
