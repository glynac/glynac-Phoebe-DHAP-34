version: "1.0"
layer: bronze
database: opencats
view: xml_feeds_raw

source:
  bucket: raw-data
  path: opencats/xml_feeds
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS xml_feeds data via sql-extractor"
tags: [bronze, opencats, xml_feeds, sql-extractor, auto-schema]
