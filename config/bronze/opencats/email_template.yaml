version: "1.0"
layer: bronze
database: opencats
view: email_template_raw

source:
  bucket: raw-data
  path: opencats/email_template
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS email_template data via sql-extractor"
tags: [bronze, opencats, email_template, sql-extractor, auto-schema]
