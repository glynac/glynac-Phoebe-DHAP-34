version: "1.0"
layer: bronze
database: opencats
view: access_level_raw

source:
  bucket: raw-data
  path: opencats/access_level
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS access_level data via sql-extractor"
tags: [bronze, opencats, access_level, sql-extractor, auto-schema]
