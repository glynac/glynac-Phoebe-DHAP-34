version: "1.0"
layer: bronze
database: opencats
view: data_item_type_raw

source:
  bucket: raw-data
  path: opencats/data_item_type
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS data_item_type data via sql-extractor"
tags: [bronze, opencats, data_item_type, sql-extractor, auto-schema]
