version: "1.0"
layer: bronze
database: opencats
view: module_schema_raw

source:
  bucket: raw-data
  path: opencats/module_schema
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS module_schema data via sql-extractor"
tags: [bronze, opencats, module_schema, sql-extractor, auto-schema]
