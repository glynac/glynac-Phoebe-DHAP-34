version: "1.0"
layer: bronze
database: opencats
view: company_raw

source:
  bucket: raw-data
  path: opencats/company
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1

description: "Raw OpenCATS company data via sql-extractor"
tags: [bronze, opencats, company, sql-extractor, auto-schema]
