version: "1.0"
layer: bronze
database: nexterp
view: market_segment_raw

source:
  bucket: raw-data
  path: erpnext/market_segment
  format: orc
  file_pattern: "data.orc"
  partitions:
    - name: partition
      type: Date

clickhouse:
  engine: S3
  settings:
