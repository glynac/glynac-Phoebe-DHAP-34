
version: "1.0"
layer: bronze
database: salesforce
table: account_raw


source:
  type: minio
  bucket: main-data
  path: salesforce/account
  format: orc
  file_pattern: "part-*"
  partitions:
    - name: glynac_organization_id
      type: String
      description: "Organization identifier"
      required: true
      
    - name: processing_date
      type: Date
      description: "Date when data was processed (YYYY-MM-DD format)"
      required: true

clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1
    input_format_orc_import_nested: 1
    input_format_orc_skip_columns_with_unsupported_types_in_schema_inference: 0
    input_format_orc_row_batch_size: 10000


schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
      nullable: false
      description: "Unique identifier for the data extraction scan"
      example: "scan_20251018_143022"
      category: metadata
    - name: service
      type: String
      nullable: false
      description: "Source service identifier"
      example: "salesforce_account"
      category: metadata
    - name: batch_timestamp
      type: String
      nullable: false
      description: "Timestamp when batch was processed (ISO 8601 format)"
      example: "2025-10-18T14:30:22.000Z"
      category: metadata
    - name: page_number
      type: Int32
      nullable: false
      description: "Page number in paginated data extraction"
      example: 1
      category: metadata
      
    - name: table_name
      type: String
      nullable: false
      description: "Source table name from Salesforce"
      example: "salesforce_accounts"
      category: metadata
    - name: account_id
      type: String
      nullable: false
      description: "Salesforce Account ID (18-character unique identifier)"
      example: "001XX000003AbCdEFG"
      category: data
      primary_key: true
    - name: account_name
      type: String
      nullable: false
      description: "Account name"
      example: "Acme Corporation"
      category: data
    - name: account_type
      type: String
      nullable: true
      description: "Account type classification from Salesforce"
      example: "Customer - Direct"
      category: data
      allowed_values:
        - "Customer - Direct"
        - "Customer - Channel"
        - "Prospect"
        - "Partner"
        - "Other"
        - "Unknown"
    - name: industry
      type: String
      nullable: true
      description: "Industry sector classification"
      example: "Technology"
      category: data
    - name: billing_street
      type: String
      nullable: true
      description: "Billing street address"
      example: "123 Main Street, Suite 400"
      category: data
      pii: true
    - name: billing_city
      type: String
      nullable: true
      description: "Billing city"
      example: "San Francisco"
      category: data
      pii: true
    - name: billing_state
      type: String
      nullable: true
      description: "Billing state/province code"
      example: "CA"
      category: data
      pii: true
    - name: billing_country
      type: String
      nullable: true
      description: "Billing country"
      example: "United States"
      category: data
      pii: true
    - name: billing_postal_code
      type: String
      nullable: true
      description: "Billing postal/ZIP code"
      example: "94105"
      category: data
      pii: true
    - name: phone
      type: String
      nullable: true
      description: "Primary phone number"
      example: "+1-415-555-1234"
      category: data
      pii: true
    - name: website
      type: String
      nullable: true
      description: "Company website URL"
      example: "https://www.acme.com"
      category: data
    - name: annual_revenue
      type: Float64
      nullable: true
      description: "Annual revenue amount (numeric from Flink DOUBLE)"
      example: 1500000.50
      category: data
      unit: USD
    - name: number_of_employees
      type: Int32
      nullable: true
      description: "Number of employees (numeric from Flink INT)"
      example: 250
      category: data
    - name: owner_id
      type: String
      nullable: true
      description: "Salesforce User ID of account owner"
      example: "005XX000001AbCdEFG"
      category: data
    - name: created_date
      type: String
      nullable: true
      description: "Account creation timestamp (ISO 8601 string format from Salesforce)"
      example: "2023-01-15T10:30:00.000Z"
      category: data
    - name: last_modified_date
      type: String
      nullable: true
      description: "Last modification timestamp (ISO 8601 string format from Salesforce)"
      example: "2025-10-18T14:20:00.000Z"
      category: data
    - name: extracted_at
      type: String
      nullable: true
      description: "Timestamp when data was extracted from Salesforce API"
      example: "2025-10-18T14:30:00.000Z"
      category: metadata
    - name: source_service
      type: String
      nullable: false
      description: "Source system identifier"
      example: "salesforce"
      category: metadata
    - name: processing_timestamp
      type: String
      nullable: false
      description: "Flink processing timestamp when record was written to MinIO"
      example: "2025-10-18T14:30:22.123Z"
      category: metadata
  
  validation:
    enabled: true
    on_mismatch: fail
    allow_extra_columns: true    
    allow_missing_columns: false   
    required_columns:
      - scan_id
      - account_id
      - account_name
      - glynac_organization_id
      - processing_date
      - processing_timestamp

validation:
  enabled: true
  checks:
    - name: table_not_empty
      description: "Table should have at least one row"
      query: "SELECT count() > 0 FROM {database}.{table}"
      severity: warning
    - name: has_recent_data
      description: "Should have data from last 7 days"
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"
      severity: warning
    - name: no_null_account_ids
      description: "account_id should never be null"
      query: "SELECT countIf(account_id IS NULL OR account_id = '' OR account_id = 'NONE') as null_count FROM {database}.{table}"
      expect:
        null_count: 0
      severity: error
    - name: no_null_account_names
      description: "account_name should never be null or 'No Name'"
      query: "SELECT countIf(account_name IS NULL OR account_name = '' OR account_name = 'No Name') as null_count FROM {database}.{table}"
      expect:
        null_count: 0
      severity: warning
    - name: valid_account_type_values
      description: "account_type should be from known list"
      query: |
        SELECT countIf(
          account_type NOT IN (
            'Customer - Direct', 
            'Customer - Channel', 
            'Prospect', 
            'Partner', 
            'Other', 
            'Unknown'
          ) AND account_type IS NOT NULL
        ) as invalid_count 
        FROM {database}.{table}
      expect:
        invalid_count: 0
      severity: warning
    - name: revenue_reasonable
      description: "Annual revenue should be non-negative and reasonable"
      query: "SELECT countIf(annual_revenue < 0 OR annual_revenue > 1000000000000) as invalid_count FROM {database}.{table}"
      expect:
        invalid_count: 0
      severity: warning
    - name: employee_count_reasonable
      description: "Employee count should be reasonable (< 10 million)"
      query: "SELECT countIf(number_of_employees < 0 OR number_of_employees > 10000000) as invalid_count FROM {database}.{table}"
      expect:
        invalid_count: 0
      severity: warning
    - name: check_partition_distribution
      description: "Check data is properly distributed across partitions"
      query: |
        SELECT 
          count(DISTINCT concat(glynac_organization_id, '-', processing_date)) as partition_count
        FROM {database}.{table}
      severity: info
    - name: check_data_completeness
      description: "Check percentage of records with key fields populated"
      query: |
        SELECT 
          countIf(billing_city IS NOT NULL AND billing_city != '') * 100.0 / count() as pct_with_city,
          countIf(phone IS NOT NULL AND phone != '') * 100.0 / count() as pct_with_phone,
          countIf(website IS NOT NULL AND website != '') * 100.0 / count() as pct_with_website
        FROM {database}.{table}
      severity: info

metadata:
  display_name: "Salesforce Accounts (Raw)"
  owner: data-engineering-team
  description: |
    Raw Salesforce account data loaded from ORC files in MinIO.
     
    No transformations applied - data exactly as produced by Flink.
    All type conversions and cleaning happen in Silver layer.
    
    Partitioning:
    - By organization (glynac_organization_id)
    - By processing date (processing_date in YYYY-MM-DD format)

  source_system: salesforce
  source_topic: sf-stream-accounts
  source_processor: flink
  update_frequency: realtime
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - billing_street
    - billing_city
    - billing_state
    - billing_country
    - billing_postal_code
    - phone
  
  retention_days: 730
  schema_version: "1.0"
  last_schema_change: "2025-10-18"
  schema_changelog:
    - version: "1.0"
      date: "2025-10-18"
      changes: "Initial schema based on Flink ORC output for Salesforce accounts"
      author: "data-engineering-team"
  
  tags:
    - salesforce
    - accounts
    - crm
    - bronze
    - raw
    - pii
    - realtime
    - financial-data
  
