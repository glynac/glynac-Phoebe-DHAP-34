version: "1.0"
layer: bronze
database: salesforce
table: campaign_raw


source:
  type: minio
  bucket: main-data
  path: salesforce/campaign
  format: orc
  file_pattern: "part-*"
  partitions:
    - name: glynac_organization_id
      type: String
      description: "Organization identifier"
      required: true
    - name: processing_date
      type: Date
      description: "Date when data was processed (YYYY-MM-DD format)"
      required: true


clickhouse:
  engine: S3
  settings:
    input_format_orc_allow_missing_columns: 1
    input_format_orc_import_nested: 1
    input_format_orc_skip_columns_with_unsupported_types_in_schema_inference: 0
    input_format_orc_row_batch_size: 10000

schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
      nullable: false
      description: "Unique identifier for the data extraction scan"
      example: "scan_20251018_143022"
      category: metadata
    - name: service
      type: String
      nullable: false
      description: "Source service identifier"
      example: "salesforce_campaign"
      category: metadata
    - name: batch_timestamp
      type: String
      nullable: false
      description: "Timestamp when batch was processed (ISO 8601 format)"
      example: "2025-10-18T14:30:22.000Z"
      category: metadata
    - name: page_number
      type: Int32
      nullable: false
      description: "Page number in paginated data extraction"
      example: 1
      category: metadata
    - name: table_name
      type: String
      nullable: false
      description: "Source table name from Salesforce"
      example: "salesforce_campaigns"
      category: metadata
    - name: campaign_id
      type: String
      nullable: false
      description: "Salesforce Campaign ID (18-character unique identifier)"
      example: "701XX000001AbCdEFG"
      category: data
      primary_key: true
    - name: campaign_name
      type: String
      nullable: false
      description: "Campaign name"
      example: "Q4 2025 Marketing Campaign"
      category: data
    - name: campaign_type
      type: String
      nullable: true
      description: "Type of campaign (e.g., Email, Webinar, Conference, Advertisement)"
      example: "Email"
      category: data
    - name: campaign_status
      type: String
      nullable: true
      description: "Current status of the campaign"
      example: "In Progress"
      category: data
      allowed_values:
        - "Planned"
        - "In Progress"
        - "Completed"
        - "Aborted"
        - "Unknown"
    - name: start_date
      type: String
      nullable: true
      description: "Campaign start date (ISO 8601 string format from Salesforce)"
      example: "2025-10-01T00:00:00.000Z"
      category: data
    - name: end_date
      type: String
      nullable: true
      description: "Campaign end date (ISO 8601 string format from Salesforce)"
      example: "2025-12-31T23:59:59.000Z"
      category: data
    - name: is_active
      type: UInt8
      nullable: false
      description: "Whether campaign is currently active (1=active, 0=inactive)"
      example: 1
      category: data
      allowed_values: [0, 1]
    - name: budgeted_cost
      type: Float64
      nullable: true
      description: "Budgeted cost for the campaign in USD"
      example: 50000.00
      category: financial
      unit: USD
    - name: actual_cost
      type: Float64
      nullable: true
      description: "Actual cost incurred for the campaign in USD"
      example: 47500.50
      category: financial
      unit: USD
    - name: expected_revenue
      type: Float64
      nullable: true
      description: "Expected revenue from the campaign in USD"
      example: 250000.00
      category: metrics
      unit: USD
    - name: expected_response
      type: Float64
      nullable: true
      description: "Expected response rate (percentage or count)"
      example: 15.5
      category: metrics
    - name: number_sent
      type: Float64
      nullable: true
      description: "Number of communications sent (emails, mailers, etc.)"
      example: 10000.0
      category: metrics
    - name: number_of_leads
      type: Int32
      nullable: true
      description: "Total number of leads associated with campaign"
      example: 1250
      category: metrics
    - name: number_of_converted_leads
      type: Int32
      nullable: true
      description: "Number of leads that were converted"
      example: 230
      category: metrics
    - name: number_of_contacts
      type: Int32
      nullable: true
      description: "Number of contacts associated with campaign"
      example: 850
      category: metrics
    - name: number_of_responses
      type: Int32
      nullable: true
      description: "Number of responses received from campaign"
      example: 1550
      category: metrics
    - name: number_of_opportunities
      type: Int32
      nullable: true
      description: "Total number of opportunities generated by campaign"
      example: 45
      category: metrics
    - name: number_of_won_opportunities
      type: Int32
      nullable: true
      description: "Number of opportunities that were won"
      example: 12
      category: metrics
    - name: amount_all_opportunities
      type: Float64
      nullable: true
      description: "Total amount of all opportunities in USD"
      example: 450000.00
      category: metrics
      unit: USD
    - name: amount_won_opportunities
      type: Float64
      nullable: true
      description: "Total amount of won opportunities in USD"
      example: 180000.00
      category: metrics
      unit: USD
    - name: owner_id
      type: String
      nullable: true
      description: "Salesforce User ID of campaign owner"
      example: "005XX000001AbCdEFG"
      category: data
    - name: owner_name
      type: String
      nullable: true
      description: "Name of campaign owner"
      example: "John Doe"
      category: data
      pii: true
    - name: owner_email
      type: String
      nullable: true
      description: "Email address of campaign owner"
      example: "john.doe@company.com"
      category: data
      pii: true
    - name: created_date
      type: String
      nullable: true
      description: "Campaign creation timestamp (ISO 8601 string format from Salesforce)"
      example: "2025-09-15T10:30:00.000Z"
      category: metadata
    - name: last_modified_date
      type: String
      nullable: true
      description: "Last modification timestamp (ISO 8601 string format from Salesforce)"
      example: "2025-10-18T14:20:00.000Z"
      category: metadata
    - name: extracted_at
      type: String
      nullable: true
      description: "Timestamp when data was extracted from Salesforce API"
      example: "2025-10-18T14:30:00.000Z"
      category: metadata
    - name: source_service
      type: String
      nullable: false
      description: "Source system identifier"
      example: "salesforce"
      category: metadata
    - name: processing_timestamp
      type: String
      nullable: false
      description: "Flink processing timestamp when record was written to MinIO"
      example: "2025-10-18T14:30:22.123Z"
      category: metadata
  
  validation:
    enabled: true
    on_mismatch: fail
    allow_extra_columns: true
    allow_missing_columns: false
    required_columns:
      - scan_id
      - campaign_id
      - glynac_organization_id
      - processing_date
      - processing_timestamp

validation:
  enabled: true
  checks:
    - name: table_not_empty
      description: "Table should have at least one row"
      query: "SELECT count() > 0 FROM {database}.{table}"
      severity: warning
    - name: has_recent_data
      description: "Should have data from last 7 days"
      query: "SELECT max(processing_date) >= today() - 7 FROM {database}.{table}"
      severity: warning
    - name: no_null_campaign_ids
      description: "campaign_id should never be null"
      query: "SELECT countIf(campaign_id IS NULL OR campaign_id = '' OR campaign_id = 'NONE') as null_count FROM {database}.{table}"
      expect:
        null_count: 0
      severity: error
    - name: valid_is_active_values
      description: "is_active should only be 0 or 1"
      query: "SELECT countIf(is_active NOT IN (0, 1)) as invalid_count FROM {database}.{table}"
      expect:
        invalid_count: 0
      severity: error
    - name: valid_campaign_status
      description: "campaign_status should be in known values"
      query: |
        SELECT countIf(
          campaign_status NOT IN ('Planned', 'In Progress', 'Completed', 'Aborted', 'Unknown')
          AND campaign_status IS NOT NULL 
          AND campaign_status != ''
        ) as invalid_count 
        FROM {database}.{table}
      expect:
        invalid_count: 0
      severity: warning
    - name: costs_non_negative
      description: "Costs should not be negative"
      query: |
        SELECT 
          countIf(budgeted_cost < 0) + 
          countIf(actual_cost < 0) + 
          countIf(expected_revenue < 0) as negative_count
        FROM {database}.{table}
      expect:
        negative_count: 0
      severity: error
    - name: won_opportunities_less_than_total
      description: "Won opportunities should not exceed total opportunities"
      query: |
        SELECT countIf(
          number_of_won_opportunities > number_of_opportunities 
          AND number_of_opportunities IS NOT NULL
        ) as invalid_count
        FROM {database}.{table}
      expect:
        invalid_count: 0
      severity: warning
    - name: check_partition_distribution
      description: "Check data is properly distributed across partitions"
      query: |
        SELECT 
          count(DISTINCT concat(glynac_organization_id, '-', processing_date)) as partition_count
        FROM {database}.{table}
      severity: info


metadata:
  display_name: "Salesforce Campaigns (Raw)"
  owner: data-engineering-team
  
  description: |
    Raw Salesforce campaign data loaded from ORC files in MinIO.
    
    No transformations applied - data exactly as produced by Flink.
    All type conversions and metric calculations happen in Silver layer.
    
    Partitioning:
    - By organization (glynac_organization_id)
    - By processing date (processing_date in YYYY-MM-DD format)
  
  source_system: salesforce
  source_topic: sf-stream-campaigns
  source_processor: flink
  update_frequency: realtime
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - owner_name
    - owner_email
  retention_days: 730 
  schema_version: "1.0"
  last_schema_change: "2025-10-18"
  schema_changelog:
    - version: "1.0"
      date: "2025-10-18"
      changes: "Initial schema based on Flink ORC output for Salesforce Campaign data"
      author: "data-engineering-team"
  tags:
    - salesforce
    - campaigns
    - marketing
    - bronze
    - raw
    - pii
    - realtime
    - metrics
  
  key_metrics:
    - campaign_roi
    - lead_conversion_rate
    - opportunity_win_rate
    - cost_per_lead
    - revenue_per_campaign
  