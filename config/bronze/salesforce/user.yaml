version: "1.0"
layer: bronze
database: salesforce
view: user_raw

source:
  type: minio
  bucket: main-data
  path: salesforce/user
  format: orc
  file_pattern: "part-*"

  partitions:
    - name: glynac_organization_id
      type: String
      description: "Organization identifier"
      required: true
      
    - name: processing_date
      type: Date
      description: "Date when data was processed (YYYY-MM-DD format)"
      required: true

clickhouse:
  engine: S3
  
  settings:
    input_format_orc_allow_missing_columns: 1
    input_format_orc_import_nested: 1
    input_format_orc_skip_columns_with_unsupported_types_in_schema_inference: 0
    input_format_orc_row_batch_size: 10000


schema:
  mode: manual
  columns:
    - name: scan_id
      type: String
      nullable: false
      description: "Unique identifier for the data extraction scan"
      example: "scan_20251013_143022"
      category: metadata
      
    - name: service
      type: String
      nullable: false
      description: "Source service identifier"
      example: "salesforce_user"
      category: metadata
      
    - name: batch_timestamp
      type: String
      nullable: false
      description: "Timestamp when batch was processed (ISO 8601 format)"
      example: "2025-10-13T14:30:22.000Z"
      category: metadata
      
    - name: page_number
      type: Int32
      nullable: false
      description: "Page number in paginated data extraction"
      example: 1
      category: metadata
      
    - name: table_name
      type: String
      nullable: false
      description: "Source table name from Salesforce"
      example: "salesforce_users"
      category: metadata
    
    # =========== USER DATA ===========
    - name: user_id
      type: String
      nullable: false
      description: "Salesforce User ID (18-character unique identifier)"
      example: "005XX000001AbCdEFG"
      category: data
      primary_key: true
      
    - name: username
      type: String
      nullable: true
      description: "User's login username (email format)"
      example: "john.doe@company.com"
      category: data
      pii: true
      
    - name: email
      type: String
      nullable: true
      description: "User's email address"
      example: "john.doe@company.com"
      category: data
      pii: true
      
    - name: first_name
      type: String
      nullable: true
      description: "User's first name"
      example: "John"
      category: data
      pii: true
      
    - name: last_name
      type: String
      nullable: true
      description: "User's last name"
      example: "Doe"
      category: data
      pii: true
      
    - name: is_active
      type: UInt8
      nullable: false
      description: "Whether user account is active (1=active, 0=inactive)"
      example: 1
      category: data
      allowed_values: [0, 1]
      
    - name: profile_id
      type: String
      nullable: true
      description: "Salesforce Profile ID associated with the user"
      example: "00eXX000001AbCdEFG"
      category: data
      
    - name: created_date
      type: String
      nullable: true
      description: "User creation timestamp (ISO 8601 string format from Salesforce)"
      example: "2023-01-15T10:30:00.000Z"
      category: data
      
    - name: last_modified_date
      type: String
      nullable: true
      description: "Last modification timestamp (ISO 8601 string format from Salesforce)"
      example: "2025-10-13T14:20:00.000Z"
      category: data
    
    # =========== EXTRACTION METADATA ===========
    - name: extracted_at
      type: String
      nullable: true
      description: "Timestamp when data was extracted from Salesforce API"
      example: "2025-10-13T14:30:00.000Z"
      category: metadata
      
    - name: source_service
      type: String
      nullable: false
      description: "Source system identifier"
      example: "salesforce"
      category: metadata
      
    - name: processing_timestamp
      type: String
      nullable: false
      description: "Flink processing timestamp when record was written to MinIO"
      example: "2025-10-13T14:30:22.123Z"
      category: metadata
  
  validation:
    enabled: true
    on_mismatch: fail
    allow_extra_columns: true      
    allow_missing_columns: false     
    required_columns:
      - scan_id
      - user_id
      - glynac_organization_id
      - processing_date
      - processing_timestamp


validation:
  enabled: true
  
  checks:
    - name: table_not_empty
      description: "Table should have at least one row"
      query: "SELECT count() > 0 FROM {database}.{table}"
      severity: warning
      
metadata:
  display_name: "Salesforce Users (Raw)"
  owner: data-engineering-team
  
  description: |
    Raw Salesforce user data loaded from ORC files in MinIO.  
  source_system: salesforce
  source_topic: sf-stream-users
  source_processor: flink
  update_frequency: realtime
  
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - username
    - email
    - first_name
    - last_name
  
  retention_days: 730 
  
  schema_version: "1.0"
  last_schema_change: "2025-10-16"
  schema_changelog:
    - version: "1.0"
      date: "2025-10-16"
      changes: "Initial schema based on Flink ORC output"
      author: "data-engineering-team"
  
  tags:
    - salesforce
    - users
    - bronze
    - raw
    - pii
    - realtime
    