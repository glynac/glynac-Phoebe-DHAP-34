# ============================================================
# SILVER LAYER - AUTO MODE DEFAULTS
# ============================================================
# These defaults apply to ALL auto-mode Silver configs.
# Individual config.yaml files can override any value.
#
# Precedence (highest to lowest):
#   1. Individual config.yaml values
#   2. These defaults
#   3. DAG generator hardcoded fallbacks
#
# Version: 1.0
# Last Updated: December 2024
# ============================================================

version: "1.0"

# ============================================================
# METADATA DEFAULTS
# ============================================================
metadata:
  owner: data-engineering
  domain: auto-detected  # Overwritten by source name
  data_classification: internal
  contains_pii: false
  pii_columns: []
  update_frequency: hourly
  retention_days: 730  # ~2 years default

# ============================================================
# CLICKHOUSE DEFAULTS
# ============================================================
clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  # order_by is auto-generated from dedupe.partition_by
  # primary_key is auto-generated from dedupe.partition_by[0]
  ttl: "processing_date + INTERVAL 730 DAY"
  settings:
    index_granularity: 8192
  # indexes can be specified per-table

# ============================================================
# DAG DEFAULTS
# ============================================================
dag:
  schedule_interval: "dataset"  # Bronze-triggered by default
  start_date: "2025-01-01"
  catchup: false
  max_active_runs: 1
  concurrency: 1
  max_active_tasks_per_dag: 1

  default_args:
    owner: data-engineering
    retries: 3
    retry_delay_minutes: 5
    execution_timeout_minutes: 30
    email_on_failure: false
    email_on_retry: false

  sla:
    enabled: true
    duration_minutes: 120

# ============================================================
# TASK DEFAULTS
# ============================================================
task:
  task_type: clickhouse_transformation

  incremental:
    enabled: true
    strategy: partition_based
    partition_column: processing_date

  execution:
    mode: insert_overwrite
    batch_size: 100000
    max_insert_threads: 4

# ============================================================
# DEPENDENCY DEFAULTS
# ============================================================
dependencies:
  auto_detect: true
  mode: dataset_aware

  check_strategy:
    - type: table_exists
      description: "Check if Bronze table exists"
      fail_on_missing: true

    - type: has_data
      description: "Check if Bronze table has data for this partition"
      fail_on_empty: true
      partition_column: processing_date

    - type: freshness
      description: "Check Bronze data is fresh (< 2 hours old)"
      max_age_hours: 2
      fail_on_stale: false

# ============================================================
# DATA QUALITY DEFAULTS
# ============================================================
# Default tests applied to all auto-mode tables
tests:
  - type: row_count
    min: 1
    severity: error

# ============================================================
# PROCESSING DEFAULTS
# ============================================================
# Incremental processing configuration
incremental:
  enabled: true
  strategy: partition_based
  partition_column: processing_date
  lookback_days: 90  # Number of days to look back from today
  use_date_filter: true  # Set to false to process ALL Bronze data (no date filtering)

# Backward compatibility: top-level lookback_days still supported
lookback_days: 90

# ============================================================
# PRIMARY KEY CONVENTIONS
# ============================================================
# Primary key column naming by source
# Used for auto-detecting partition_by and filters
primary_key_patterns:
  redtail: rec_id
  orion: "{entity}_id"      # e.g., customer_id, account_id
  salesforce: sf_id
  default: id

# ============================================================
# EXCLUDED COLUMNS (always excluded from Silver)
# ============================================================
global_exclude:
  - _raw_json
  - _temp_data
  - _internal_id
