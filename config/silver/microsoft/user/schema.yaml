version: "1.0"
layer: silver
database: microsoft_silver
table: user

metadata:
  display_name: "Microsoft 365 Users (Cleaned)"
  description: |
    Cleaned and transformed Microsoft 365 / Azure AD User profile data from Bronze layer.
    Contains identity and contact information for each corporate user account
    extracted via the Microsoft Graph API.
  owner: data-engineering
  domain: microsoft
  tags:
    - microsoft
    - user
    - microsoft365
    - azure-ad
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - user_principal_name
    - display_name
    - mail
    - given_name
    - surname
    - mobile_phone
  update_frequency: daily
  retention_days: 730
  upstream_dependencies:
    - microsoft.user_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - user_id
  primary_key:
    - user_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 730 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: user_principal_name_idx
      expression: user_principal_name
      type: set
      granularity: 4
    - name: mail_idx
      expression: mail
      type: set
      granularity: 4
    - name: display_name_idx
      expression: display_name
      type: set
      granularity: 4

columns:
  - name: user_id
    type: String
    nullable: false
    description: "Microsoft Graph API user ID / Azure AD object ID (primary key)"
    primary_key: true
    example: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"

  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Glynac organization identifier for data isolation"
    example: "org-xyz789"

  # Identity fields
  - name: user_principal_name
    type: String
    nullable: false
    description: "User Principal Name (UPN) — typically the corporate email address"
    pii: true
    example: "john.doe@company.com"

  - name: display_name
    type: String
    nullable: false
    description: "Full display name in Azure AD"
    pii: true
    example: "John Doe"

  - name: mail
    type: String
    nullable: false
    description: "Primary SMTP email address"
    pii: true
    example: "john.doe@company.com"

  # Name components
  - name: given_name
    type: String
    nullable: false
    description: "User's first / given name"
    pii: true
    example: "John"

  - name: surname
    type: String
    nullable: false
    description: "User's last name / surname"
    pii: true
    example: "Doe"

  # Contact information
  - name: mobile_phone
    type: String
    nullable: false
    description: "User's mobile phone number"
    pii: true
    example: "+1-555-123-4567"

  # Processing metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Processing date partition (YYYY-MM-DD)"
    partition_key: true
    example: "2025-01-20"

  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when the record was processed by Glynac pipeline"
    example: "2025-01-20 14:30:22.123"

  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-20 15:30:45"

  - name: _source_table
    type: String
    nullable: false
    description: "Source Bronze table"
    system_column: true
    example: "microsoft.user_raw"

  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-20 14:30:22.123"
