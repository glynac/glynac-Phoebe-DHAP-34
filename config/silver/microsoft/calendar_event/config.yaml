# Silver Layer - Microsoft Calendar Event (AUTO MODE)
# Schema inferred from Bronze: microsoft.calendar_event_raw
# Settings inherited from _defaults.yaml unless overridden
# NOTE: This config extracts fields from JSON entity_data field

version: "1.0"

dag:
  description: "Transform and clean Microsoft Calendar Event data with JSON extraction"
  tags: ["silver", "microsoft", "calendar_event", "auto-mode", "json-extraction"]
  schedule_interval: "dataset"  # Triggers when Bronze updates

source:
  database: microsoft
  table: calendar_event_raw

target:
  database: microsoft_silver
  table: calendar_event

# JSON extraction and transforms
# Extract fields from entity_data JSON and apply transformations
json_extractions:
  # Core event identifiers
  - source_field: entity_data
    json_path: $.event_id
    target: event_id
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.icalendar_uid
    target: icalendar_uid
    type: String

  - source_field: entity_data
    json_path: $.calendar_id
    target: calendar_id
    type: String

  - source_field: entity_data
    json_path: $.calendar_name
    target: calendar_name
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.calendar_owner_email
    target: calendar_owner_email
    type: String
    transform: clean_email

  - source_field: entity_data
    json_path: $.calendar_owner_id
    target: calendar_owner_id
    type: Int32

  # Event details
  - source_field: entity_data
    json_path: $.subject
    target: subject
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.body_preview
    target: body_preview
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.body_content_type
    target: body_content_type
    type: String

  # DateTime fields
  - source_field: entity_data
    json_path: $.start_datetime
    target: start_datetime
    type: DateTime64(3)
    transform: parse_datetime

  - source_field: entity_data
    json_path: $.end_datetime
    target: end_datetime
    type: DateTime64(3)
    transform: parse_datetime

  - source_field: entity_data
    json_path: $.start_timezone
    target: start_timezone
    type: String

  - source_field: entity_data
    json_path: $.end_timezone
    target: end_timezone
    type: String

  # Event properties
  - source_field: entity_data
    json_path: $.is_all_day
    target: is_all_day
    type: Bool

  - source_field: entity_data
    json_path: $.duration_minutes
    target: duration_minutes
    type: Int32

  - source_field: entity_data
    json_path: $.location
    target: location
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.location_display_name
    target: location_display_name
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.location_type
    target: location_type
    type: String

  # Organizer information
  - source_field: entity_data
    json_path: $.organizer_email
    target: organizer_email
    type: String
    transform: clean_email

  - source_field: entity_data
    json_path: $.organizer_name
    target: organizer_name
    type: String
    transform: clean_string

  - source_field: entity_data
    json_path: $.organizer_id
    target: organizer_id
    type: Int32

  # Attendee counts
  - source_field: entity_data
    json_path: $.attendee_count
    target: attendee_count
    type: Int32

  - source_field: entity_data
    json_path: $.required_attendee_count
    target: required_attendee_count
    type: Int32

  - source_field: entity_data
    json_path: $.optional_attendee_count
    target: optional_attendee_count
    type: Int32

  - source_field: entity_data
    json_path: $.resource_count
    target: resource_count
    type: Int32

  # Meeting properties
  - source_field: entity_data
    json_path: $.is_online_meeting
    target: is_online_meeting
    type: Bool

  - source_field: entity_data
    json_path: $.online_meeting_provider
    target: online_meeting_provider
    type: String

  - source_field: entity_data
    json_path: $.online_meeting_url
    target: online_meeting_url
    type: String

  # Event status and flags
  - source_field: entity_data
    json_path: $.show_as
    target: show_as
    type: String

  - source_field: entity_data
    json_path: $.sensitivity
    target: sensitivity
    type: String

  - source_field: entity_data
    json_path: $.importance
    target: importance
    type: String

  - source_field: entity_data
    json_path: $.is_cancelled
    target: is_cancelled
    type: Bool

  - source_field: entity_data
    json_path: $.is_draft
    target: is_draft
    type: Bool

  - source_field: entity_data
    json_path: $.is_organizer
    target: is_organizer
    type: Bool

  - source_field: entity_data
    json_path: $.is_recurring
    target: is_recurring
    type: Bool

  - source_field: entity_data
    json_path: $.series_master_id
    target: series_master_id
    type: String

  - source_field: entity_data
    json_path: $.is_exception
    target: is_exception
    type: Bool

  # Attachments and categories
  - source_field: entity_data
    json_path: $.has_attachments
    target: has_attachments
    type: Bool

  - source_field: entity_data
    json_path: $.attachment_count
    target: attachment_count
    type: Int32

  - source_field: entity_data
    json_path: $.category_count
    target: category_count
    type: Int32

  # Response status
  - source_field: entity_data
    json_path: $.response_status
    target: response_status
    type: String

  # Links and metadata
  - source_field: entity_data
    json_path: $.web_link
    target: web_link
    type: String

  - source_field: entity_data
    json_path: $.created_datetime
    target: created_datetime
    type: DateTime64(3)
    transform: parse_datetime

  - source_field: entity_data
    json_path: $.last_modified_datetime
    target: last_modified_datetime
    type: DateTime64(3)
    transform: parse_datetime

# Additional transforms on Bronze fields (non-JSON)
transforms:
  pii_masked_at:
    transform: parse_datetime
    target: pii_masked_datetime
    format: "ISO8601"

  scan_timestamp:
    transform: parse_datetime
    target: scan_datetime
    format: "ISO8601"

  processing_timestamp:
    transform: parse_datetime
    target: processing_datetime
    format: "ISO8601"

# Deduplication strategy
dedupe:
  partition_by:
    - record_id
    - processing_date
  order_by:
    - processing_timestamp DESC
    - scan_timestamp DESC

# Filters
filters:
  - "record_id IS NOT NULL"
  - "record_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"
  - "tenant_id IS NOT NULL"
  - "tenant_id != ''"
  - "entity_data IS NOT NULL"
  - "isValidJSON(entity_data) = 1"

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one record exists"

  - type: not_null
    columns:
      - record_id
      - event_id
      - glynac_organization_id
      - tenant_id
      - processing_date
    severity: error
    description: "Critical fields must not be NULL"

  - type: unique
    columns:
      - record_id
      - processing_date
    severity: warning
    description: "Record ID should be unique per processing date after dedup"

  - type: custom
    query: "SELECT count() FROM {table} WHERE start_datetime > end_datetime"
    threshold: 0
    severity: warning
    description: "Start datetime should not be after end datetime"

  - type: custom
    query: "SELECT count() FROM {table} WHERE event_id IS NULL OR event_id = ''"
    threshold: 0
    severity: error
    description: "Event ID must be extracted from JSON successfully"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"

# Additional configuration
incremental:
  enabled: true
  strategy: partition_based
  partition_column: processing_date
  lookback_days: 90

output:
  format: ORC
  compression: ZSTD
  partition_by:
    - glynac_organization_id
    - processing_date

# Notes for implementation
notes: |
  This config uses JSON extraction from the entity_data field.
  If the AUTO mode generator doesn't support json_extractions yet,
  this will need to be converted to MANUAL mode with custom query.sql
  that includes JSONExtract* functions for each field.
