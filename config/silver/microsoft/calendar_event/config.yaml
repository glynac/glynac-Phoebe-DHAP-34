# Silver Layer - Microsoft Calendar Event (MANUAL MODE)
# Custom SQL transformation with JSON extraction from entity_data field
# Query: query.sql - Extracts 40+ fields using ClickHouse JSONExtract* functions
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

# Transformation mode
mode: manual  # Uses custom query.sql for complex JSON extraction

dag:
  description: "Transform and clean Microsoft Calendar Event data with JSON extraction"
  tags: ["silver", "microsoft", "calendar_event", "manual-mode", "json-extraction"]
  schedule_interval: "dataset"  # Triggers when Bronze updates

source:
  database: microsoft
  table: calendar_event_raw

target:
  database: microsoft_silver
  table: calendar_event

# ClickHouse table configuration
clickhouse:
  engine: S3  # Read from MinIO, write back to MinIO
  output_path: s3://main-data/microsoft_silver/calendar_event/{glynac_organization_id}/{processing_date}/  # Hive-style partitioning
  format: ORC
  compression: ZSTD
  settings:
    input_format_orc_allow_missing_columns: 1

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one record exists"

  - type: not_null
    columns:
      - record_id
      - event_id
      - glynac_organization_id
      - tenant_id
      - processing_date
    severity: error
    description: "Critical fields must not be NULL"

  - type: unique
    columns:
      - record_id
      - processing_date
    severity: warning
    description: "Record ID should be unique per processing date after dedup"

  - type: custom
    query: "SELECT count() FROM {table} WHERE start_datetime > end_datetime"
    threshold: 0
    severity: warning
    description: "Start datetime should not be after end datetime"

  - type: custom
    query: "SELECT count() FROM {table} WHERE event_id IS NULL OR event_id = ''"
    threshold: 0
    severity: error
    description: "Event ID must be extracted from JSON successfully"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"

# Incremental processing configuration
incremental:
  enabled: true
  strategy: partition_based
  partition_column: processing_date
  lookback_days: 90  # Reprocess last 90 days on each run

# Output configuration for MinIO storage
output:
  format: ORC
  compression: ZSTD
  partition_by:
    - glynac_organization_id
    - processing_date
  path_template: "microsoft_silver/calendar_event/glynac_organization_id={glynac_organization_id}/processing_date={processing_date}/"

# Implementation notes
notes: |
  MANUAL MODE - Uses custom query.sql for JSON extraction
  - Extracts 40+ fields from entity_data JSON using ClickHouse JSONExtract* functions
  - Applies string cleaning (trimBoth, COALESCE) and datetime parsing
  - Implements deduplication via QUALIFY ROW_NUMBER() in query
  - Writes to MinIO with Hive-style partitioning: main-data/microsoft_silver/calendar_event/glynac_organization_id=xx/processing_date=xx/
  - ClickHouse table uses S3 engine to query MinIO data directly
