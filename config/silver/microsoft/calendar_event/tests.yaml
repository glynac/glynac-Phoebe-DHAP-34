# ============================================================
# DATA QUALITY TESTS: SILVER.MICROSOFT_CALENDAR_EVENT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL or empty"
    severity: error
    query: |
      SELECT
        countIf(event_web_link IS NULL)         AS null_event_web_link,
        countIf(event_web_link = '')            AS empty_event_web_link,
        countIf(glynac_organization_id IS NULL) AS null_org_id,
        countIf(glynac_organization_id = '')    AS empty_org_id,
        countIf(processing_date IS NULL)        AS null_processing_date
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_event_web_link: 0
      empty_event_web_link: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0

  - name: event_web_link_unique_per_org_per_partition
    type: uniqueness
    description: "event_web_link must be unique per org per processing_date"
    severity: error
    query: |
      SELECT event_web_link, glynac_organization_id, processing_date, count() AS cnt
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY event_web_link, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true

  - name: all_events_exist_in_bronze
    type: referential_integrity
    description: "All Silver calendar events should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() AS orphaned_events
      FROM microsoft_silver.calendar_event s
      LEFT JOIN microsoft.calendar_event_raw b
        ON s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
        AND s.event_id = b.event_id  -- Gunakan event_id karena lebih pasti
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.event_id IS NULL       -- Jika di Bronze tidak ada, berarti orphaned
    expect:
      orphaned_events: 0

  - name: event_web_link_not_empty
    type: assertion
    description: "event_web_link must always be populated (it is the unique event key)"
    severity: error
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND (event_web_link IS NULL OR event_web_link = '')
    expect:
      invalid_count: 0

  - name: subject_not_empty
    type: assertion
    description: "Event subject should not be empty"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND (subject IS NULL OR subject = '')
    expect:
      invalid_count: 0

  - name: duration_non_negative
    type: assertion
    description: "Event duration in minutes must not be negative"
    severity: error
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND duration_minutes < 0
    expect:
      invalid_count: 0

  - name: attendee_counts_non_negative
    type: assertion
    description: "All attendee counts must be non-negative"
    severity: error
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          attendee_count < 0
          OR required_attendee_count < 0
          OR optional_attendee_count < 0
          OR resource_count < 0
        )
    expect:
      invalid_count: 0

  - name: valid_importance_values
    type: assertion
    description: "Importance must be one of: low, normal, high (or empty)"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND importance != ''
        AND importance NOT IN ('low', 'normal', 'high')
    expect:
      invalid_count: 0

  - name: valid_sensitivity_values
    type: assertion
    description: "Sensitivity must be one of: normal, personal, private, confidential (or empty)"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND sensitivity != ''
        AND sensitivity NOT IN ('normal', 'personal', 'private', 'confidential')
    expect:
      invalid_count: 0

  - name: organizer_email_format
    type: assertion
    description: "Organizer email should contain @ when present"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar_event
      WHERE processing_date = toDate('{{ ds }}')
        AND organizer_email != ''
        AND position(organizer_email, '@') = 0
    expect:
      invalid_count: 0
