version: "1.0"
layer: silver
database: microsoft_silver
table: calendar_event_v2

metadata:
  display_name: "Microsoft Calendar Events (Silver)"
  description: |
    Cleaned and normalized Microsoft 365 Calendar Event data from Bronze layer.
    The Bronze AUTO-mode view exposes real ORC columns directly (event_id, start_json,
    organizer_json, etc.) — all JSON blobs are expanded into typed columns.
    Includes event timing, location, organizer, attendee counts, online meeting details,
    status flags, and audit timestamps from the Microsoft Graph API.
  owner: data-engineering
  domain: microsoft
  tags:
    - microsoft
    - calendar_event
    - microsoft365
    - silver
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - calendar_owner_email
    - organizer_email
    - organizer_name
    - online_meeting_url
    - event_web_link
  update_frequency: daily
  retention_days: 365
  upstream_dependencies:
    - microsoft.calendar_event_raw
  downstream_dependencies: []

clickhouse:
  engine: S3
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - event_id
  primary_key:
    - event_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 365 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: calendar_owner_email_idx
      expression: calendar_owner_email
      type: set
      granularity: 4
    - name: organizer_email_idx
      expression: organizer_email
      type: set
      granularity: 4
    - name: is_cancelled_idx
      expression: is_cancelled
      type: set
      granularity: 4
    - name: is_recurring_idx
      expression: is_recurring
      type: set
      granularity: 4

columns:
  # Partition columns (must be first in S3 engine DDL)
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Glynac organization identifier for data isolation"
    partition_key: true
    example: "41f11cc0-7d71-4f1a-9f89-f8f0a66293e7"

  - name: processing_date
    type: Date
    nullable: false
    description: "Processing date partition (YYYY-MM-DD)"
    partition_key: true
    example: "2026-03-02"

  # Core event identity
  - name: event_id
    type: String
    nullable: false
    description: "Microsoft Graph API event ID (direct Bronze column)"
    primary_key: true
    example: "evt_ms_001"

  - name: icalendar_uid
    type: String
    nullable: false
    description: "iCalendar UID for cross-system event reference (Bronze: i_cal_uid)"
    example: "040000008200E00074C5B7101A82E008..."

  - name: event_web_link
    type: String
    nullable: false
    description: "Outlook web URL for this event (Bronze: web_link)"
    pii: true
    example: "https://outlook.office365.com/owa/?itemid=..."

  # Calendar reference
  - name: calendar_id
    type: String
    nullable: false
    description: "Microsoft Graph calendar ID"
    example: "cal_alex_primary"

  - name: calendar_name
    type: String
    nullable: false
    description: "Name of the calendar containing this event"
    example: "Calendar"

  - name: calendar_owner_email
    type: String
    nullable: false
    description: "Email address of the calendar owner"
    pii: true
    example: "alex.rivera@summitfin.com"

  - name: user_id
    type: String
    nullable: false
    description: "User ID (UPN) of the calendar owner from Bronze"
    example: "alex.rivera@summitfin.com"

  # Event content
  - name: subject
    type: String
    nullable: false
    description: "Event subject / title"
    example: "Client Review Meeting"

  - name: body_preview
    type: String
    nullable: false
    description: "First 255 characters of the event body"
    example: "Quarterly portfolio review with client"

  - name: body_content_type
    type: String
    nullable: false
    description: "Body content type extracted from body_json (html, text)"
    example: "html"

  # Timing
  - name: start_datetime
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Event start datetime parsed from start_json.dateTime"
    example: "2025-09-13 17:40:00.000"

  - name: end_datetime
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Event end datetime parsed from end_json.dateTime"
    example: "2025-09-13 18:40:00.000"

  - name: start_timezone
    type: String
    nullable: false
    description: "Timezone from start_json.timeZone"
    example: "Eastern Standard Time"

  - name: end_timezone
    type: String
    nullable: false
    description: "Timezone from end_json.timeZone"
    example: "Eastern Standard Time"

  - name: is_all_day
    type: Bool
    nullable: false
    description: "Whether the event is an all-day event"
    example: false

  - name: duration_minutes
    type: Int32
    nullable: false
    description: "Duration of the event in minutes (computed from start/end datetimes)"
    example: 60

  # Location
  - name: location
    type: String
    nullable: false
    description: "Event location display name from location_json.displayName"
    example: "Zoom - Client Webinar Room"

  - name: location_display_name
    type: String
    nullable: false
    description: "Display name of the location (same as location)"
    example: "Zoom - Client Webinar Room"

  - name: location_type
    type: String
    nullable: false
    description: "Location type from location_json.locationType"
    example: "conferenceRoom"

  # Organizer
  - name: organizer_email
    type: String
    nullable: false
    description: "Email of the event organizer from organizer_json.emailAddress.address"
    pii: true
    example: "john.doe@company.com"

  - name: organizer_name
    type: String
    nullable: false
    description: "Display name of the organizer from organizer_json.emailAddress.name"
    pii: true
    example: "John Doe"

  # Attendee counts (derived from attendees_json array)
  - name: attendee_count
    type: Int32
    nullable: false
    description: "Total number of attendees in attendees_json array"
    example: 3

  - name: required_attendee_count
    type: Int32
    nullable: false
    description: "Number of required attendees (type=required in attendees_json)"
    example: 2

  - name: optional_attendee_count
    type: Int32
    nullable: false
    description: "Number of optional attendees (type=optional in attendees_json)"
    example: 1

  - name: resource_count
    type: Int32
    nullable: false
    description: "Number of resource bookings (type=resource in attendees_json)"
    example: 0

  # Online meeting
  - name: is_online_meeting
    type: Bool
    nullable: false
    description: "Whether the event has an online meeting link"
    example: true

  - name: online_meeting_provider
    type: String
    nullable: false
    description: "Online meeting provider (teamsForBusiness, skypeForBusiness, etc.)"
    example: "teamsForBusiness"

  - name: online_meeting_url
    type: String
    nullable: false
    description: "Join URL for the online meeting"
    pii: true
    example: "https://teams.microsoft.com/l/meetup-join/..."

  # Status / flags
  - name: show_as
    type: String
    nullable: false
    description: "How the event appears in calendar (free, busy, tentative, oof)"
    example: "busy"

  - name: sensitivity
    type: String
    nullable: false
    description: "Event sensitivity level (normal, personal, private, confidential)"
    example: "normal"

  - name: importance
    type: String
    nullable: false
    description: "Event importance (low, normal, high)"
    example: "normal"

  - name: is_cancelled
    type: Bool
    nullable: false
    description: "Whether the event has been cancelled"
    example: false

  - name: is_draft
    type: Bool
    nullable: false
    description: "Whether the event is a draft"
    example: false

  - name: is_organizer
    type: Bool
    nullable: false
    description: "Whether the calendar owner is the organizer"
    example: true

  - name: is_recurring
    type: Bool
    nullable: false
    description: "Whether the event is part of a recurring series"
    example: false

  # Attachments / categories
  - name: has_attachments
    type: Bool
    nullable: false
    description: "Whether the event has file attachments"
    example: false

  - name: attachment_count
    type: Int32
    nullable: false
    description: "Number of attachments (from attachments_json array length)"
    example: 0

  - name: category_count
    type: Int32
    nullable: false
    description: "Number of categories (from categories_json array length)"
    example: 0

  # Response status
  - name: response_status
    type: String
    nullable: false
    description: "Response status from response_status_json.response (accepted, declined, etc.)"
    example: "accepted"

  # Audit timestamps
  - name: created_datetime
    type: Nullable(DateTime64(3))
    nullable: true
    description: "When the event was created (parsed from created_date_time string)"
    example: "2025-01-10 14:30:00.000"

  - name: last_modified_datetime
    type: Nullable(DateTime64(3))
    nullable: true
    description: "When the event was last modified (parsed from last_modified_date_time string)"
    example: "2025-01-14 09:00:00.000"

  # Processing metadata
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when the record was processed by Glynac pipeline"
    example: "2026-03-02 14:30:22.123"

  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2026-03-02 15:30:45"

  - name: _source_table
    type: String
    nullable: false
    description: "Source Bronze table"
    system_column: true
    example: "microsoft.calendar_event_raw"

  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2026-03-02 14:30:22.123"
