# Silver Layer - Microsoft Calendar (AUTO MODE)
# Schema inferred from Bronze: microsoft.calendar_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Microsoft Calendar data from Bronze to Silver"
  tags: ["silver", "microsoft", "calendar", "auto-mode"]
  schedule_interval: "dataset"  # Triggers when Bronze updates

source:
  database: microsoft
  table: calendar_raw

target:
  database: microsoft_silver
  table: calendar

# Transform specifications
# Only specify transforms for columns that need transformation
transforms:
  # String cleaning
  title:
    transform: clean_string

  description:
    transform: clean_string

  location:
    transform: clean_string

  organizer_name:
    transform: clean_string

  organizer_email:
    transform: clean_email

  user_upn:
    transform: clean_email

  # DateTime parsing
  start_time:
    transform: parse_date
    target: start_datetime

  end_time:
    transform: parse_date
    target: end_datetime

  created_at:
    transform: parse_date
    target: created_datetime

  updated_at:
    transform: parse_date
    target: updated_datetime

  processing_timestamp:
    transform: parse_date
    target: processing_datetime

# Deduplication strategy
dedupe:
  partition_by:
    - event_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "event_id IS NOT NULL"
  - "event_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"
  - "tenant_id IS NOT NULL"
  - "tenant_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one record exists"

  - type: not_null
    columns:
      - event_id
      - glynac_organization_id
      - tenant_id
      - processing_date
    severity: error
    description: "Critical fields must not be NULL"

  - type: unique
    columns:
      - event_id
      - processing_date
    severity: warning
    description: "Event ID should be unique per processing date after dedup"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
