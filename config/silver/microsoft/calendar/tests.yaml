# ============================================================
# DATA QUALITY TESTS: SILVER.MICROSOFT_CALENDAR
# NOTE: event_id is NULL in current Bronze source. scan_id is the PK.
# Tests for event-level fields (title, user_upn) are downgraded to warning
# until the upstream pipeline populates those fields.
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL or empty"
    severity: error
    query: |
      SELECT
        countIf(scan_id IS NULL)                   AS null_scan_id,
        countIf(scan_id = '')                      AS empty_scan_id,
        countIf(glynac_organization_id IS NULL)    AS null_org_id,
        countIf(glynac_organization_id = '')       AS empty_org_id,
        countIf(processing_date IS NULL)           AS null_processing_date
      FROM microsoft_silver.calendar
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_scan_id: 0
      empty_scan_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0

  - name: scan_id_unique_per_org_per_partition
    type: uniqueness
    description: "scan_id must be unique per org per processing_date"
    severity: error
    query: |
      SELECT scan_id, glynac_organization_id, processing_date, count() AS cnt
      FROM microsoft_silver.calendar
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY scan_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true

  - name: all_records_exist_in_bronze
    type: referential_integrity
    description: "All Silver calendar records should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() AS orphaned_records
      FROM microsoft_silver.calendar s
      LEFT JOIN microsoft.calendar_raw b
        ON s.scan_id = b.scan_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.scan_id IS NULL
    expect:
      orphaned_records: 0

  - name: has_data_for_partition
    type: assertion
    description: "Silver calendar must have at least one record per partition"
    severity: error
    query: |
      SELECT count() AS total_records
      FROM microsoft_silver.calendar
      WHERE processing_date = toDate('{{ ds }}')
    expect_min:
      total_records: 1

  - name: start_time_before_end_time
    type: assertion
    description: "When present, event start time must be before end time"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar
      WHERE processing_date = toDate('{{ ds }}')
        AND start_time IS NOT NULL
        AND end_time IS NOT NULL
        AND start_time >= end_time
    expect:
      invalid_count: 0

  - name: organizer_email_format
    type: assertion
    description: "Organizer email should contain @ when present"
    severity: warning
    query: |
      SELECT count() AS invalid_count
      FROM microsoft_silver.calendar
      WHERE processing_date = toDate('{{ ds }}')
        AND organizer_email != ''
        AND position(organizer_email, '@') = 0
    expect:
      invalid_count: 0
