# Silver Layer - Black Diamond Contact Employments (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contact_employments_raw
# Employment history for contacts
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contact employments data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-employments", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: contact_employments_raw

target:
  database: blackdiamond_silver
  table: contact_employments

# Transform specifications
transforms:
  # Employment string fields
  employer:
    transform: clean_string

  employer_name:
    transform: clean_string

  title:
    transform: clean_string

  job_title:
    transform: clean_string

  department:
    transform: clean_string

  industry:
    transform: clean_string

  # Date fields for employment period
  start_date:
    transform: parse_date

  end_date:
    transform: parse_date

# Deduplication - contact may have multiple employers
dedupe:
  partition_by:
    - contact_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "contact_id IS NOT NULL"
  - "contact_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one contact employment record exists"

  - type: not_null
    columns:
      - contact_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
