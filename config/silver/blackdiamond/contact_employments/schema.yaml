version: "1.0"
layer: silver
database: blackdiamond_silver
table: contact_employments

metadata:
  display_name: "Black Diamond Contact Employments (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond contact employment records from Bronze layer.
    Contains employment history including employer, title, occupation, and employment dates.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - contact_employments
    - pii
    - silver
    - dataset-aware
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - contact_id
    - employer_name
    - title
    - occupation
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.contact_employments_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - glynac_organization_id
    - contact_id
    - start_date
    - processing_date
  primary_key:
    - glynac_organization_id
    - contact_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: occupation_idx
      expression: occupation
      type: bloom_filter
      granularity: 1
    - name: is_current_idx
      expression: is_current
      type: set
      granularity: 4

columns:
  - name: contact_id
    type: String
    nullable: false
    description: "Contact identifier"
    pii: true
    example: "CNT-12345"
    
  - name: employer_name
    type: Nullable(Int32)
    nullable: true
    description: "Employer name"
    pii: true
    example: 1001
    
  - name: title
    type: Nullable(Int32)
    nullable: true
    description: "Job title"
    pii: true
    example: 2001
    
  - name: occupation
    type: String
    nullable: false
    description: "Occupation description"
    pii: true
    example: "Financial Advisor"
    
  - name: start_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Employment start date"
    example: "2020-01-15 00:00:00.000"
    
  - name: end_date
    type: Nullable(Int32)
    nullable: true
    description: "Employment end date"
    example: null
    
  - name: is_current
    type: UInt8
    nullable: false
    description: "Current employment flag (1=yes, 0=no)"
    allowed_values: [0, 1]
    example: 1
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.contact_employments_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"