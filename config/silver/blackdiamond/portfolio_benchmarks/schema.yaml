version: "1.0"
layer: silver
database: blackdiamond_silver
table: portfolio_benchmarks

metadata:
  display_name: "Black Diamond Portfolio Benchmarks (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond portfolio benchmarks mapping from Bronze layer.
    Links portfolios to performance benchmarks with effective date ranges.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - portfolio_benchmarks
    - mapping
    - performance
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.portfolio_benchmarks_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - portfolio_id
    - benchmark_id
  primary_key:
    - portfolio_id
    - benchmark_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: start_date_idx
      expression: start_date
      type: minmax
      granularity: 2

columns:
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio ID (foreign key)"
    primary_key: true
    example: "2000001"
    
  - name: benchmark_id
    type: String
    nullable: false
    description: "Benchmark ID (foreign key)"
    primary_key: true
    example: "f442c0c4-8794-e911-9116-005056b80814"
    
  - name: start_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Start date of benchmark assignment"
    example: "2022-04-25 00:00:00.000"
    
  - name: end_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "End date of benchmark assignment (null if active)"
    example: null
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.portfolio_benchmarks_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"