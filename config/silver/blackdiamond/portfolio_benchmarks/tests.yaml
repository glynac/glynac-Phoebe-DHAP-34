version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(portfolio_id IS NULL) as null_portfolio_id,
        countIf(portfolio_id = '') as empty_portfolio_id,
        countIf(benchmark_id IS NULL) as null_benchmark_id,
        countIf(benchmark_id = '') as empty_benchmark_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.portfolio_benchmarks
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_portfolio_id: 0
      empty_portfolio_id: 0
      null_benchmark_id: 0
      empty_benchmark_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: mapping_unique_per_partition
    type: uniqueness
    description: "Each portfolio-benchmark pair should be unique per processing_date"
    severity: error
    query: |
      SELECT portfolio_id, benchmark_id, processing_date, count() as cnt
      FROM blackdiamond_silver.portfolio_benchmarks
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY portfolio_id, benchmark_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_mappings_exist_in_bronze
    type: referential_integrity
    description: "All Silver mappings should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_mappings
      FROM blackdiamond_silver.portfolio_benchmarks s
      LEFT JOIN blackdiamond.portfolio_benchmarks_raw b
        ON s.portfolio_id = b.portfolio_id
        AND s.benchmark_id = b.benchmark_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.portfolio_id IS NULL
    expect:
      orphaned_mappings: 0
  
  - name: end_date_after_start_date
    type: assertion
    description: "End date should be after or equal to start date when both present"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.portfolio_benchmarks
      WHERE processing_date = toDate('{{ ds }}')
        AND start_date IS NOT NULL
        AND end_date IS NOT NULL
        AND end_date < start_date
    expect:
      invalid_count: 0
  
  - name: start_date_not_future
    type: assertion
    description: "Start date should not be in the future"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.portfolio_benchmarks
      WHERE processing_date = toDate('{{ ds }}')
        AND start_date > now()
    expect:
      invalid_count: 0
  
  - name: active_benchmarks_no_end_date
    type: assertion
    description: "Active benchmark assignments should have NULL end_date"
    severity: warning
    query: |
      SELECT count() as active_with_end_date
      FROM blackdiamond_silver.portfolio_benchmarks
      WHERE processing_date = toDate('{{ ds }}')
        AND end_date IS NOT NULL
        AND end_date > now()
    expect:
      active_with_end_date: 0