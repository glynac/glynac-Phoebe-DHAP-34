version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(benchmark_id IS NULL) as null_benchmark_id,
        countIf(benchmark_id = '') as empty_benchmark_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.benchmarks
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_benchmark_id: 0
      empty_benchmark_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: benchmark_id_unique_per_partition
    type: uniqueness
    description: "Benchmark ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT benchmark_id, processing_date, count() as cnt
      FROM blackdiamond_silver.benchmarks
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY benchmark_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_benchmarks_exist_in_bronze
    type: referential_integrity
    description: "All Silver benchmarks should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_benchmarks
      FROM blackdiamond_silver.benchmarks s
      LEFT JOIN blackdiamond.benchmarks_raw b
        ON s.benchmark_id = b.benchmark_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.benchmark_id IS NULL
    expect:
      orphaned_benchmarks: 0
  
  - name: no_empty_names
    type: assertion
    description: "Benchmark names should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.benchmarks
      WHERE processing_date = toDate('{{ ds }}')
        AND name = ''
    expect:
      invalid_count: 0