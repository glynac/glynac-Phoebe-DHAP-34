version: "1.0"
layer: silver
database: blackdiamond_silver
table: benchmarks

metadata:
  display_name: "Black Diamond Benchmarks (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond benchmark records from Bronze layer.
    Contains performance benchmarks used for portfolio comparison and evaluation.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - benchmarks
    - reference
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.benchmarks_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - benchmark_id
  primary_key:
    - benchmark_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: benchmark_name_idx
      expression: name
      type: bloom_filter
      granularity: 1

columns:
  - name: benchmark_id
    type: String
    nullable: false
    description: "Black Diamond benchmark ID (primary key)"
    primary_key: true
    example: "f442c0c4-8794-e911-9116-005056b80814"
    
  - name: name
    type: String
    nullable: false
    description: "Benchmark name"
    example: "6% ABSOLUTE RETURN"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.benchmarks_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"