version: "1.0"
layer: silver
database: blackdiamond_silver
table: portfolio_groups

metadata:
  display_name: "Black Diamond Portfolio Groups (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond portfolio group records from Bronze layer.
    Contains organizational groupings of portfolios for reporting and management purposes.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - portfolio_groups
    - reference
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.portfolio_groups_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - id
  primary_key:
    - id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: group_name_idx
      expression: name
      type: bloom_filter
      granularity: 1

columns:
  - name: id
    type: String
    nullable: false
    description: "Black Diamond portfolio group ID (primary key)"
    primary_key: true
    example: "150001"
    
  - name: name
    type: String
    nullable: false
    description: "Portfolio group name"
    example: "Steven Jose"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.portfolio_groups_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"