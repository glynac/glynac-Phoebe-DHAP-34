version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(id = '') as empty_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.portfolio_groups
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      empty_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: group_id_unique_per_partition
    type: uniqueness
    description: "Portfolio group ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT id, processing_date, count() as cnt
      FROM blackdiamond_silver.portfolio_groups
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_groups_exist_in_bronze
    type: referential_integrity
    description: "All Silver groups should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_groups
      FROM blackdiamond_silver.portfolio_groups s
      LEFT JOIN blackdiamond.portfolio_groups_raw b
        ON s.id = b.id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_groups: 0
  
  - name: groups_have_name
    type: assertion
    description: "Portfolio groups should have a name"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.portfolio_groups
      WHERE processing_date = toDate('{{ ds }}')
        AND name = ''
    expect:
      invalid_count: 0