# Silver Layer - Black Diamond Client Logins (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.client_logins_raw
# Client portal login activity and session data
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond client logins data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "client-logins", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: client_logins_raw

target:
  database: blackdiamond_silver
  table: client_logins

# Transform specifications
transforms:
  # DateTime parsing for login activity timestamps
  last_login:
    transform: parse_date
    target: last_login_at

  last_login_date:
    transform: parse_date

  login_date:
    transform: parse_date

  # String cleaning
  login_type:
    transform: clean_string

  portal_name:
    transform: clean_string

# Deduplication
# NOTE: client portal tables use user_id (not client_id) as the client FK
dedupe:
  partition_by:
    - user_id
    - processing_date
  order_by:
    - processing_date DESC

# Filters
# NOTE: user_id is Int64 - do NOT use != '' (causes type error in Parquet reader)
filters:
  - "user_id IS NOT NULL"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one client login record exists"

  - type: not_null
    columns:
      - user_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
