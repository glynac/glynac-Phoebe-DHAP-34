version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(goal_id IS NULL) as null_goal_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.standalone_goals
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_goal_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: standalone_goal_unique_per_partition
    type: uniqueness
    description: "Goal ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT glynac_organization_id, goal_id, processing_date, count() as cnt
      FROM blackdiamond_silver.standalone_goals
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY glynac_organization_id, goal_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_standalone_goals_exist_in_bronze
    type: referential_integrity
    description: "All Silver standalone goals should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_records
      FROM blackdiamond_silver.standalone_goals s
      LEFT JOIN blackdiamond.standalone_goals_raw b
        ON s.goal_id = b.goal_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.goal_id IS NULL
    expect:
      orphaned_records: 0
  
  - name: valid_goal_ids
    type: assertion
    description: "Goal IDs should be positive integers"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.standalone_goals
      WHERE processing_date = toDate('{{ ds }}')
        AND goal_id IS NOT NULL