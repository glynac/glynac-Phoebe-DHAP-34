# Silver Layer - Black Diamond Transaction Events (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.holdings_raw
# Note: Black Diamond uses "holdings" to track positions (result of transactions)
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond holdings/transaction data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "transaction-events", "auto-mode", "wealth-management", "holdings"]

source:
  database: blackdiamond
  table: holdings_raw

target:
  database: blackdiamond_silver
  table: transaction_events

# Transform overrides (only columns needing special handling)
# Bronze schema: id, account_id, asset_id, as_of_date, units, market_value,
# discretionary, supervised, billable, money_market, investment_discretion,
# voting_authority, price_factor, paydown_factor, coupon_rate, muni_state,
# call_date, yield, cash, maturity_date, accrual, long_holding, is_manual
transforms:
  # String cleaning (use actual Bronze column names)
  investment_discretion:
    transform: clean_string

  voting_authority:
    transform: clean_string

  # Date parsing (if stored as String in Bronze)
  as_of_date:
    transform: parse_date

  call_date:
    transform: parse_date

  maturity_date:
    transform: parse_date

  # Note: Numeric fields (units, market_value, etc.) pass through as-is

# Deduplication (Black Diamond holdings uses 'id' as primary key)
dedupe:
  partition_by:
    - id
    - glynac_organization_id
    - processing_date
  order_by:
    - processing_date DESC

# Filters (id is String type in Bronze)
filters:
  - "id IS NOT NULL"
  - "id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - id
      - glynac_organization_id
    severity: error
