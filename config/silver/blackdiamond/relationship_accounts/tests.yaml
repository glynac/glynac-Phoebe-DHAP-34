version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(relationship_id IS NULL) as null_relationship_id,
        countIf(relationship_id = '') as empty_relationship_id,
        countIf(account_id IS NULL) as null_account_id,
        countIf(account_id = '') as empty_account_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.relationship_accounts
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_relationship_id: 0
      empty_relationship_id: 0
      null_account_id: 0
      empty_account_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: mapping_unique_per_partition
    type: uniqueness
    description: "Each relationship-account pair should be unique per processing_date"
    severity: error
    query: |
      SELECT relationship_id, account_id, processing_date, count() as cnt
      FROM blackdiamond_silver.relationship_accounts
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY relationship_id, account_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_mappings_exist_in_bronze
    type: referential_integrity
    description: "All Silver mappings should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_mappings
      FROM blackdiamond_silver.relationship_accounts s
      LEFT JOIN blackdiamond.relationship_accounts_raw b
        ON s.relationship_id = b.relationship_id
        AND s.account_id = b.account_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.relationship_id IS NULL
    expect:
      orphaned_mappings: 0
  
  - name: valid_boolean_flags
    type: accepted_values
    description: "Boolean flags must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.relationship_accounts
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          include_in_net_worth NOT IN (0, 1)
          OR is_direct_assigned NOT IN (0, 1)
        )
    expect:
      invalid_count: 0