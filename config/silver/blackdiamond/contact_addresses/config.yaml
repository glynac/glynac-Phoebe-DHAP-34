# Silver Layer - Black Diamond Contact Addresses (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contact_addresses_raw
# Physical/mailing addresses for contacts (PII data)
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contact addresses data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-addresses", "auto-mode", "pii"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: contact_addresses_raw

target:
  database: blackdiamond_silver
  table: contact_addresses

# Transform specifications
transforms:
  # Address string fields
  street1:
    transform: clean_string

  street2:
    transform: clean_string

  address1:
    transform: clean_string

  address2:
    transform: clean_string

  city:
    transform: clean_string

  state:
    transform: clean_string

  postal_code:
    transform: clean_string

  zip:
    transform: clean_string

  country:
    transform: clean_string

  # Address type label
  address_type:
    transform: clean_string

  type:
    transform: clean_string

# Deduplication - contact may have multiple address types
dedupe:
  partition_by:
    - contact_id
    - address_type
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "contact_id IS NOT NULL"
  - "contact_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one contact address record exists"

  - type: not_null
    columns:
      - contact_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
