version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(id = '') as empty_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.teams
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      empty_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: team_id_unique_per_partition
    type: uniqueness
    description: "Team ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT id, processing_date, count() as cnt
      FROM blackdiamond_silver.teams
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_teams_exist_in_bronze
    type: referential_integrity
    description: "All Silver teams should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_teams
      FROM blackdiamond_silver.teams s
      LEFT JOIN blackdiamond.teams_raw b
        ON s.id = b.id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_teams: 0
  
  - name: teams_have_name
    type: assertion
    description: "Teams should have a name"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.teams
      WHERE processing_date = toDate('{{ ds }}')
        AND name = ''
    expect:
      invalid_count: 0
  
  - name: team_name_uniqueness
    type: assertion
    description: "Team names should be unique within organization"
    severity: warning
    query: |
      SELECT count() as duplicate_names
      FROM (
        SELECT name, glynac_organization_id, count() as cnt
        FROM blackdiamond_silver.teams
        WHERE processing_date = toDate('{{ ds }}')
          AND name != ''
        GROUP BY name, glynac_organization_id
        HAVING cnt > 1
      )
    expect:
      duplicate_names: 0
  
  - name: team_count_summary
    type: assertion
    description: "Summary of teams by organization"
    severity: info
    query: |
      SELECT
        count() as total_teams,
        count(DISTINCT glynac_organization_id) as organizations_with_teams,
        avg(length(name)) as avg_name_length
      FROM blackdiamond_silver.teams
      WHERE processing_date = toDate('{{ ds }}')
    expect_greater_than:
      total_teams: 0