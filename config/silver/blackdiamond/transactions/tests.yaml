version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT
        countIf(transaction_id IS NULL) as null_transaction_id,
        countIf(transaction_id = '') as empty_transaction_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_transaction_id: 0
      empty_transaction_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0

  - name: transaction_id_unique_per_partition
    type: uniqueness
    description: "Transaction ID should be unique per org and processing_date"
    severity: error
    query: |
      SELECT transaction_id, glynac_organization_id, processing_date, count() as cnt
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY transaction_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true

  - name: all_transactions_exist_in_bronze
    type: referential_integrity
    description: "All Silver transactions should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_transactions
      FROM blackdiamond_silver.transactions s
      LEFT JOIN blackdiamond.transactions_raw b
        ON s.transaction_id = b.transaction_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.transaction_id IS NULL
    expect:
      orphaned_transactions: 0

  - name: trade_date_not_future
    type: assertion
    description: "Trade date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
        AND trade_date > today()
    expect:
      invalid_count: 0

  - name: settle_date_not_far_future
    type: assertion
    description: "Settle date should not be more than 30 days in the future"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
        AND settle_date > today() + INTERVAL 30 DAY
    expect:
      invalid_count: 0

  - name: trade_before_settle
    type: assertion
    description: "Trade date should be before or equal to settle date when both present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
        AND trade_date IS NOT NULL
        AND settle_date IS NOT NULL
        AND trade_date > settle_date
    expect:
      invalid_count: 0

  - name: units_price_consistency
    type: assertion
    description: "Market value should approximately equal units * price for security transactions"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
        AND units != 0
        AND price != 0
        AND transaction_type IN ('Buy', 'Sell', 'Purchase', 'Sale')
        AND abs(toFloat64(market_value) - (toFloat64(units) * toFloat64(price))) > greatest(abs(toFloat64(market_value)) * 0.01, 1.0)
    expect:
      invalid_count: 0

  - name: transaction_type_distribution
    type: assertion
    description: "Monitor transaction type volumes"
    severity: info
    query: |
      SELECT
        transaction_type,
        count() as transaction_count,
        sum(toFloat64(market_value)) as total_value
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY transaction_type
      ORDER BY transaction_count DESC
    expect_greater_than_or_equal:
      transaction_count: 0

  - name: fee_summary
    type: assertion
    description: "Transaction and account fee summary"
    severity: info
    query: |
      SELECT
        countIf(transaction_fee != 0) as transactions_with_fee,
        sum(transaction_fee) as total_transaction_fees,
        sum(account_fee) as total_account_fees
      FROM blackdiamond_silver.transactions
      WHERE processing_date = toDate('{{ ds }}')
    expect_greater_than_or_equal:
      transactions_with_fee: 0
