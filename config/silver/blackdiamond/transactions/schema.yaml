version: "1.0"
layer: silver
database: blackdiamond_silver
table: transactions

metadata:
  display_name: "Black Diamond Transactions (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond transaction records from Bronze layer.
    Contains all account transactions including trades (buy/sell), dividends, interest,
    fees, transfers, and other account activities. Critical for performance calculation,
    cash flow analysis, and transaction reconciliation.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - transactions
    - trades
    - cash_flows
    - account_activity
    - silver
  data_classification: confidential
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.transactions_raw
    - blackdiamond_silver.accounts
    - blackdiamond_silver.holdings
    - blackdiamond_silver.assets
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - account_id
    - trade_date
    - transaction_id
  primary_key:
    - transaction_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: account_id_idx
      expression: account_id
      type: bloom_filter
      granularity: 1
    - name: holding_id_idx
      expression: holding_id
      type: bloom_filter
      granularity: 1
    - name: ticker_idx
      expression: ticker
      type: bloom_filter
      granularity: 1
    - name: cusip_idx
      expression: cusip
      type: bloom_filter
      granularity: 1
    - name: transaction_type_idx
      expression: transaction_type
      type: set
      granularity: 1
    - name: trade_date_idx
      expression: trade_date
      type: minmax
      granularity: 2
    - name: settle_date_idx
      expression: settle_date
      type: minmax
      granularity: 2

columns:
  - name: transaction_id
    type: Int64
    nullable: false
    description: "Transaction ID (primary key)"
    primary_key: true
    example: 123456789
    
  - name: holding_id
    type: String
    nullable: false
    description: "Holding ID (foreign key to holdings)"
    example: "H789012"
    
  - name: account_id
    type: String
    nullable: false
    description: "Account ID (foreign key to accounts)"
    example: "A123456"
    
  - name: account_number
    type: String
    nullable: false
    description: "Account number"
    example: "12345678"
    
  - name: asset_id
    type: Nullable(Int64)
    nullable: true
    description: "Asset ID (foreign key to assets)"
    example: 12345
    
  - name: ticker
    type: String
    nullable: false
    description: "Asset ticker symbol"
    example: "AAPL"
    
  - name: cusip
    type: String
    nullable: false
    description: "CUSIP identifier"
    example: "037833100"
    
  - name: display_cusip
    type: String
    nullable: false
    description: "Display-formatted CUSIP"
    example: "037833100"
    
  - name: alternate_id
    type: String
    nullable: false
    description: "Alternate asset identifier"
    example: "US0378331005"
    
  - name: market_value
    type: Float64
    nullable: false
    description: "Transaction market value/amount"
    example: 15000.00
    
  - name: units
    type: Float64
    nullable: false
    description: "Number of units/shares transacted"
    example: 100.0
    
  - name: price
    type: Float64
    nullable: false
    description: "Transaction price per unit"
    example: 150.00
    
  - name: transaction_fee
    type: Nullable(Int64)
    nullable: true
    description: "Transaction-level fee"
    example: 9
    
  - name: account_fee
    type: Nullable(Int64)
    nullable: true
    description: "Account-level fee"
    example: 0
    
  - name: sub_code
    type: String
    nullable: false
    description: "Transaction sub-code"
    example: "BUY"
    
  - name: trans_code
    type: String
    nullable: false
    description: "Transaction code"
    example: "SEC"
    
  - name: description
    type: String
    nullable: false
    description: "Transaction description"
    example: "Bought 100 shares of AAPL"
    
  - name: file_code_description
    type: String
    nullable: false
    description: "File code description"
    example: "Purchase"
    
  - name: return_date
    type: Nullable(Date)
    nullable: true
    description: "Return date (for returns/adjustments)"
    example: "2024-11-20"
    
  - name: settle_date
    type: Nullable(Date)
    nullable: true
    description: "Settlement date"
    example: "2024-11-20"
    
  - name: trade_date
    type: Nullable(Date)
    nullable: true
    description: "Trade execution date"
    example: "2024-11-18"
    
  - name: transaction_type
    type: String
    nullable: false
    description: "Transaction type (Buy, Sell, Dividend, Interest, etc.)"
    example: "Buy"
    
  - name: transaction_sub_type
    type: String
    nullable: false
    description: "Transaction sub-type for additional classification"
    example: "Equity Purchase"
    
  - name: external_contra_account_id
    type: Nullable(Int64)
    nullable: true
    description: "External contra account ID for transfers"
    example: 987654
    
  - name: notes
    type: String
    nullable: false
    description: "Transaction notes/comments"
    example: "Client requested purchase"
    
  - name: action
    type: String
    nullable: false
    description: "Transaction action code"
    example: "BUY"
    
  - name: external_flow_affect
    type: String
    nullable: false
    description: "External cash flow impact indicator"
    example: "Outflow"
    
  - name: issue_type
    type: String
    nullable: false
    description: "Security issue type"
    example: "Equity"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.transactions_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"