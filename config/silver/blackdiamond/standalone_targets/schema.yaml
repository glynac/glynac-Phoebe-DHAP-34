version: "1.0"
layer: silver
database: blackdiamond_silver
table: standalone_targets

metadata:
  display_name: "Black Diamond Standalone Targets (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond standalone target records from Bronze layer.
    Contains allocation target definitions including metadata and type classification 
    for portfolio management and rebalancing strategies.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - standalone_targets
    - financial
    - silver
    - asset_allocation
  data_classification: confidential
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.standalone_targets_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - glynac_organization_id
    - id
    - processing_date
  primary_key:
    - glynac_organization_id
    - id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: name_idx
      expression: name
      type: bloom_filter
      granularity: 1
    - name: target_type_idx
      expression: target_type
      type: set
      granularity: 4

columns:
  - name: id
    type: String
    nullable: false
    description: "Target identifier (primary key)"
    primary_key: true
    example: "TARGET-12345"
    
  - name: name
    type: String
    nullable: false
    description: "Target name"
    example: "Conservative Balanced Portfolio"
    
  - name: description
    type: String
    nullable: false
    description: "Target description"
    example: "60% Fixed Income, 40% Equity allocation for conservative investors"
    
  - name: target_type
    type: String
    nullable: false
    description: "Target type classification (e.g., Strategic, Tactical, Model)"
    example: "Strategic"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.standalone_targets_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"