version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(id = '') as empty_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.standalone_targets
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      empty_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: standalone_target_unique_per_partition
    type: uniqueness
    description: "Target ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT glynac_organization_id, id, processing_date, count() as cnt
      FROM blackdiamond_silver.standalone_targets
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY glynac_organization_id, id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_standalone_targets_exist_in_bronze
    type: referential_integrity
    description: "All Silver standalone targets should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_records
      FROM blackdiamond_silver.standalone_targets s
      LEFT JOIN blackdiamond.standalone_targets_raw b
        ON s.id = b.id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_records: 0