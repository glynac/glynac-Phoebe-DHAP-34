# Silver Layer - Black Diamond Client Teams (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.client_teams_raw
# Linking table: associates clients to advisory teams
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond client teams linking data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "client-teams", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: client_teams_raw

target:
  database: blackdiamond_silver
  table: client_teams

# Transform specifications
transforms:
  role:
    transform: clean_string

  team_name:
    transform: clean_string

# Deduplication - composite key for linking table
# NOTE: client portal tables use user_id (not client_id) as the client FK
dedupe:
  partition_by:
    - user_id
    - team_id
    - processing_date
  order_by:
    - processing_date DESC

# Filters
filters:
  - "user_id IS NOT NULL"
  - "user_id != ''"
  - "team_id IS NOT NULL"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one client-team assignment exists"

  - type: not_null
    columns:
      - user_id
      - team_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Link keys and partition columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
