version: "1.0"
layer: silver
database: blackdiamond_silver
table: client_teams

metadata:
  display_name: "Black Diamond Client Teams (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond client-team relationship records from Bronze layer.
    Links users/clients to their team assignments with deduplication on organization, user, and team name.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - client_teams
    - organizational
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - user_id
    - team_name
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.client_teams_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - glynac_organization_id
    - user_id
    - team_name
    - processing_date
  primary_key:
    - glynac_organization_id
    - user_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: team_name_idx
      expression: team_name
      type: bloom_filter
      granularity: 1

columns:
  - name: user_id
    type: Nullable(Int64)
    nullable: true
    description: "Black Diamond user/client ID"
    pii: true
    example: 12345
    
  - name: team_name
    type: String
    nullable: false
    description: "Team name the user belongs to"
    pii: true
    example: "Wealth Management Team A"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.client_teams_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"