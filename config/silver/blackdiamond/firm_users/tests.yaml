version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.firm_users
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: user_id_unique_per_partition
    type: uniqueness
    description: "User ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT id, processing_date, count() as cnt
      FROM blackdiamond_silver.firm_users
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_users_exist_in_bronze
    type: referential_integrity
    description: "All Silver users should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_users
      FROM blackdiamond_silver.firm_users s
      LEFT JOIN blackdiamond.firm_users_raw b
        ON s.id = b.id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_users: 0
  
  - name: users_have_name
    type: assertion
    description: "Users should have at least first or last name"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.firm_users
      WHERE processing_date = toDate('{{ ds }}')
        AND first_name = ''
        AND last_name = ''
    expect:
      invalid_count: 0
  
  - name: valid_email_format
    type: assertion
    description: "Email addresses should contain @ symbol when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.firm_users
      WHERE processing_date = toDate('{{ ds }}')
        AND email != ''
        AND position(email, '@') = 0
    expect:
      invalid_count: 0
  
  - name: unique_email_per_org
    type: uniqueness
    description: "Email addresses should be unique per organization"
    severity: warning
    query: |
      SELECT glynac_organization_id, email, count() as cnt
      FROM blackdiamond_silver.firm_users
      WHERE processing_date = toDate('{{ ds }}')
        AND email != ''
      GROUP BY glynac_organization_id, email
      HAVING cnt > 1
    expect_empty: true