# Silver Layer - Black Diamond Account Assigned to Portfolio (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.portfolio_accounts_raw
# Bronze columns: portfolio_id, account_id, ordinal

version: "1.0"

dag:
  description: "Transform and clean Black Diamond portfolio-account assignment data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "account-assigned-to-portfolio", "auto-mode", "wealth-management"]

source:
  database: blackdiamond
  table: portfolio_accounts_raw

target:
  database: blackdiamond_silver
  table: account_assigned_to_portfolio

transforms: {}

# Deduplication (composite key: portfolio_id + account_id)
dedupe:
  partition_by:
    - portfolio_id
    - account_id
    - glynac_organization_id
    - processing_date
  order_by:
    - processing_date DESC

filters:
  - "portfolio_id IS NOT NULL"
  - "portfolio_id != ''"
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - portfolio_id
      - account_id
      - glynac_organization_id
    severity: error
