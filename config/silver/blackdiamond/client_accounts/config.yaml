# Silver Layer - Black Diamond Client Accounts (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.client_accounts_raw
# Linking table: associates clients to their investment accounts
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond client accounts linking data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "client-accounts", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: client_accounts_raw

target:
  database: blackdiamond_silver
  table: client_accounts

# Transform specifications
transforms:
  # String cleaning for any label fields
  account_type:
    transform: clean_string

  role:
    transform: clean_string

  relationship_type:
    transform: clean_string

# Deduplication - composite key for linking table
dedupe:
  partition_by:
    - client_id
    - account_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "client_id IS NOT NULL"
  - "client_id != ''"
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one client-account link exists"

  - type: not_null
    columns:
      - client_id
      - account_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Link keys and partition columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
