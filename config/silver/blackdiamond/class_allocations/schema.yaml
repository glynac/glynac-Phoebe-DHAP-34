version: "1.0"
layer: silver
database: blackdiamond_silver
table: class_allocations

metadata:
  display_name: "Black Diamond Class Allocations (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond class allocation records from Bronze layer.
    Contains asset class breakdown by account with market values and supervision status.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - class_allocations
    - portfolio_analysis
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - account_id
    - total_emv
    - supervised_emv
    - unsupervised_emv
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.class_allocations_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - account_id
    - class_id
  primary_key:
    - account_id
    - class_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: class_name_idx
      expression: class_name
      type: set
      granularity: 4
    - name: as_of_date_idx
      expression: as_of_date
      type: minmax
      granularity: 2

columns:
  - name: account_id
    type: String
    nullable: false
    description: "Black Diamond account ID (foreign key)"
    primary_key: true
    pii: true
    example: "6000001"
    
  - name: class_id
    type: Nullable(Int64)
    nullable: true
    description: "Asset class ID"
    primary_key: true
    example: 35961
    
  - name: class_name
    type: String
    nullable: false
    description: "Asset class name"
    example: "Cash & Equivalents"
    
  - name: as_of_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date of allocation snapshot"
    example: "2025-12-31 00:00:00.000"
    
  - name: total_emv
    type: Float64
    nullable: false
    description: "Total ending market value for this class"
    pii: true
    example: 250000.0
    
  - name: supervised_emv
    type: Float64
    nullable: false
    description: "Supervised ending market value for this class"
    pii: true
    example: 250000.0
    
  - name: unsupervised_emv
    type: Float64
    nullable: false
    description: "Unsupervised ending market value for this class"
    pii: true
    example: 0.0
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.class_allocations_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"