version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: target_component_unique_per_partition
    type: uniqueness
    description: "Target component ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT glynac_organization_id, id, processing_date, count() as cnt
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY glynac_organization_id, id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_target_components_exist_in_bronze
    type: referential_integrity
    description: "All Silver target components should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_records
      FROM blackdiamond_silver.standalone_target_components s
      LEFT JOIN blackdiamond.standalone_target_components_raw b
        ON s.id = b.id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_records: 0
  
  - name: valid_component_ids
    type: assertion
    description: "Component IDs should be positive integers"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
        AND id IS NOT NULL
        AND id <= 0
    expect:
      invalid_count: 0
  
  - name: valid_allocation_range
    type: assertion
    description: "Allocations should be between 0 and 100 percent"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
        AND allocation != 0
        AND (allocation < 0 OR allocation > 100)
    expect:
      invalid_count: 0
  
  - name: tolerance_bounds_logical
    type: assertion
    description: "Lower tolerance should be less than or equal to upper tolerance"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
        AND tolerance_lower != 0
        AND tolerance_upper != 0
        AND tolerance_lower > tolerance_upper
    expect:
      invalid_count: 0
  
  - name: allocations_sum_to_100_per_target
    type: assertion
    description: "Total allocation per target should sum to approximately 100%"
    severity: warning
    query: |
      SELECT target_id, sum(allocation) as total_allocation
      FROM blackdiamond_silver.standalone_target_components
      WHERE processing_date = toDate('{{ ds }}')
        AND allocation != 0
      GROUP BY glynac_organization_id, target_id
      HAVING abs(total_allocation - 100) > 1
    expect_empty: true