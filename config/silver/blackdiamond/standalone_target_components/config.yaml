# Silver Layer - Black Diamond Standalone Target Components (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.standalone_target_components_raw
# Target model components not attached to a portfolio-level target
# Each component defines an asset allocation rule (symbol, weight, %)
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond standalone target components data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "standalone-target-components", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: standalone_target_components_raw

target:
  database: blackdiamond_silver
  table: standalone_target_components

# Transform specifications
transforms:
  # Component descriptors
  name:
    transform: clean_string

  description:
    transform: clean_string

  symbol:
    transform: clean_string

  asset_class:
    transform: clean_string

  component_type:
    transform: clean_string

  # Status
  status:
    transform: normalize_status

# Deduplication - id is the primary key (String, from targets schema pattern)
dedupe:
  partition_by:
    - id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "id IS NOT NULL"
  - "id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one standalone target component exists"

  - type: not_null
    columns:
      - id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Primary key and partition columns must not be NULL"

  - type: unique
    columns:
      - id
      - processing_date
    severity: warning
    description: "Component ID should be unique per processing date after dedup"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
