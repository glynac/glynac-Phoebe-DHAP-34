version: "1.0"
layer: silver
database: blackdiamond_silver
table: clients

metadata:
  display_name: "Black Diamond Clients"
  description: |
    Cleaned and transformed Black Diamond client records from Bronze layer.
    Contains client portal user information including credentials, profile details, 
    and activity metrics for client engagement tracking.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - clients
    - pii
    - silver
    - dataset-aware
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - user_id
    - username
    - email
    - first_name
    - last_name
    - external_contact_id
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.clients_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - glynac_organization_id
    - user_id
    - processing_date
  primary_key:
    - glynac_organization_id
    - user_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: username_idx
      expression: username
      type: bloom_filter
      granularity: 1
    - name: email_idx
      expression: email
      type: bloom_filter
      granularity: 1
    - name: status_idx
      expression: status
      type: set
      granularity: 4

columns:
  - name: user_id
    type: Nullable(Int64)
    nullable: true
    description: "Client user identifier (primary key)"
    primary_key: true
    pii: true
    example: 12345
    
  - name: username
    type: String
    nullable: false
    description: "Client portal username"
    pii: true
    example: "john.smith"
    
  - name: email
    type: String
    nullable: false
    description: "Client email address"
    pii: true
    example: "john.smith@example.com"
    
  - name: external_contact_id
    type: String
    nullable: false
    description: "External contact identifier from source CRM"
    pii: true
    example: "EXT-CNT-12345"
    
  - name: first_name
    type: String
    nullable: false
    description: "Client first name"
    pii: true
    example: "John"
    
  - name: last_name
    type: String
    nullable: false
    description: "Client last name"
    pii: true
    example: "Smith"
    
  - name: status
    type: String
    nullable: false
    description: "Client account status (e.g., Active, Inactive, Suspended)"
    example: "Active"
    
  - name: primary_contact
    type: String
    nullable: false
    description: "Primary contact designation"
    example: "Yes"
    
  - name: profile_name
    type: Nullable(Int32)
    nullable: true
    description: "Profile identifier (legacy)"
    example: 1001
    
  - name: profile_v2_name
    type: String
    nullable: false
    description: "Profile name (current version)"
    example: "Standard Client Portal Access"
    
  - name: accounts_assigned
    type: Nullable(Int64)
    nullable: true
    description: "Number of accounts assigned to client"
    example: 5
    
  - name: logins_count
    type: Nullable(Int64)
    nullable: true
    description: "Total number of logins"
    example: 127
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.clients_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"