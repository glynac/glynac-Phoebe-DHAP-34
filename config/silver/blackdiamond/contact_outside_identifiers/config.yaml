# Silver Layer - Black Diamond Contact Outside Identifiers (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contact_outside_identifiers_raw
# External/third-party identifiers for contacts (CRM IDs, SSO IDs, etc.)
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contact outside identifiers data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-outside-identifiers", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: contact_outside_identifiers_raw

target:
  database: blackdiamond_silver
  table: contact_outside_identifiers

# Transform specifications
transforms:
  # Identifier type and value
  identifier_type:
    transform: clean_string

  identifier_value:
    transform: clean_string

  source_system:
    transform: clean_string

  type:
    transform: clean_string

  value:
    transform: clean_string

# Deduplication - contact may have multiple external identifiers
dedupe:
  partition_by:
    - contact_id
    - identifier_type
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "contact_id IS NOT NULL"
  - "contact_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one contact outside identifier record exists"

  - type: not_null
    columns:
      - contact_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
