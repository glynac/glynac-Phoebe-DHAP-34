version: "1.0"
layer: silver
database: blackdiamond_silver
table: account_details

metadata:
  display_name: "Black Diamond Account Details (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond account details from Bronze layer.
    Includes account market values, gains/losses, and supervision status.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - account_details
    - financial
    - silver
    - pii
  data_classification: confidential
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.account_details_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - account_id
  primary_key:
    - account_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: account_id_idx
      expression: account_id
      type: bloom_filter
      granularity: 1
    - name: as_of_date_idx
      expression: as_of_date
      type: minmax
      granularity: 2

columns:
  - name: account_id
    type: String
    nullable: false
    description: "Black Diamond account identifier"
    primary_key: true
    pii: true
    example: "6000001"
    
  - name: as_of_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date when account details were captured"
    example: "2025-12-31 00:00:00.000"
    
  - name: max_account_as_of_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Maximum as-of date for this account"
    example: "2025-12-31 00:00:00.000"
    
  - name: total_emv
    type: Float64
    nullable: false
    description: "Total ending market value"
    pii: true
    example: 250000.0
    
  - name: supervised_emv
    type: Float64
    nullable: false
    description: "Supervised ending market value"
    pii: true
    example: 250000.0
    
  - name: unsupervised_emv
    type: Float64
    nullable: false
    description: "Unsupervised ending market value"
    pii: true
    example: 0.0
    
  - name: realized_short_term_gain_loss
    type: Nullable(Int32)
    nullable: true
    description: "Realized short-term capital gains/losses"
    example: 0
    
  - name: realized_long_term_gain_loss
    type: Nullable(Int32)
    nullable: true
    description: "Realized long-term capital gains/losses"
    example: 0
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.account_details_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"