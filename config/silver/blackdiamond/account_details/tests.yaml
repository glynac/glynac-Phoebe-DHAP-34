version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(account_id IS NULL) as null_account_id,
        countIf(account_id = '') as empty_account_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.account_details
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_account_id: 0
      empty_account_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: account_id_unique_per_partition
    type: uniqueness
    description: "account_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT account_id, processing_date, count() as cnt
      FROM blackdiamond_silver.account_details
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY account_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_accounts_exist_in_bronze
    type: referential_integrity
    description: "All Silver accounts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_accounts
      FROM blackdiamond_silver.account_details s
      LEFT JOIN blackdiamond.account_details_raw b
        ON s.account_id = b.account_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.account_id IS NULL
    expect:
      orphaned_accounts: 0
  
  - name: emv_values_non_negative
    type: assertion
    description: "Market values should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.account_details
      WHERE processing_date = toDate('{{ ds }}')
        AND (total_emv < 0 OR supervised_emv < 0 OR unsupervised_emv < 0)
    expect:
      invalid_count: 0
  
  - name: supervised_plus_unsupervised_equals_total
    type: assertion
    description: "Supervised + Unsupervised should equal Total EMV"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.account_details
      WHERE processing_date = toDate('{{ ds }}')
        AND abs((supervised_emv + unsupervised_emv) - total_emv) > 0.01
    expect:
      invalid_count: 0
  
  - name: as_of_date_not_future
    type: assertion
    description: "As-of date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.account_details
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date > now()
    expect:
      invalid_count: 0