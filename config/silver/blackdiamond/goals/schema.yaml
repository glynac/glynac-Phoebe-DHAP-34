version: "1.0"
layer: silver
database: blackdiamond_silver
table: goals

metadata:
  display_name: "Black Diamond Goals (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond goal records from Bronze layer.
    Contains portfolio investment goals with associated benchmarks for tracking performance.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - goals
    - portfolio_management
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.goals_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - goal_id
  primary_key:
    - goal_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: portfolio_id_idx
      expression: portfolio_id
      type: bloom_filter
      granularity: 1
    - name: goal_name_idx
      expression: name
      type: bloom_filter
      granularity: 1

columns:
  - name: goal_id
    type: Nullable(Int64)
    nullable: true
    description: "Black Diamond goal ID (primary key)"
    primary_key: true
    example: 800001
    
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio ID (foreign key)"
    example: "2000001"
    
  - name: name
    type: String
    nullable: false
    description: "Goal name/description"
    example: "Wealth Preservation"
    
  - name: ordinal
    type: Nullable(Float64)
    nullable: true
    description: "Display order for goal"
    example: 1.0
    
  - name: benchmark_id
    type: Nullable(Float64)
    nullable: true
    description: "Benchmark ID for performance comparison"
    example: 128.0
    
  - name: benchmark_name
    type: String
    nullable: false
    description: "Benchmark name"
    example: "6% ABSOLUTE RETURN"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.goals_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"