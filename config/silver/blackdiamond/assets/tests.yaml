version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(asset_id IS NULL) as null_asset_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.assets
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_asset_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: asset_id_unique_per_partition
    type: uniqueness
    description: "Asset ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT asset_id, processing_date, count() as cnt
      FROM blackdiamond_silver.assets
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY asset_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_assets_exist_in_bronze
    type: referential_integrity
    description: "All Silver assets should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_assets
      FROM blackdiamond_silver.assets s
      LEFT JOIN blackdiamond.assets_raw b
        ON s.asset_id = b.asset_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.asset_id IS NULL
    expect:
      orphaned_assets: 0
  
  - name: valid_boolean_flags
    type: accepted_values
    description: "Boolean flags must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.assets
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          cash NOT IN (0, 1)
          OR is_cash_equivalent NOT IN (0, 1)
          OR money_market NOT IN (0, 1)
          OR archived NOT IN (0, 1)
          OR billable NOT IN (0, 1)
          OR supervised NOT IN (0, 1)
          OR discretionary NOT IN (0, 1)
        )
    expect:
      invalid_count: 0
  
  - name: price_factor_positive
    type: assertion
    description: "Price factor should be positive"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.assets
      WHERE processing_date = toDate('{{ ds }}')
        AND price_factor <= 0
    expect:
      invalid_count: 0
  
  - name: yield_non_negative
    type: assertion
    description: "Yield should not be negative"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.assets
      WHERE processing_date = toDate('{{ ds }}')
        AND yield < 0
    expect:
      invalid_count: 0