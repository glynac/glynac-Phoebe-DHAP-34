version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(entity_type IS NULL) as null_entity_type,
        countIf(entity_type = '') as empty_entity_type,
        countIf(entity_id IS NULL) as null_entity_id,
        countIf(entity_id = '') as empty_entity_id,
        countIf(label IS NULL) as null_label,
        countIf(label = '') as empty_label,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.outside_identifiers
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_entity_type: 0
      empty_entity_type: 0
      null_entity_id: 0
      empty_entity_id: 0
      null_label: 0
      empty_label: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: identifier_unique_per_entity
    type: uniqueness
    description: "Each entity should have only one value per label per processing_date"
    severity: error
    query: |
      SELECT entity_type, entity_id, label, processing_date, count() as cnt
      FROM blackdiamond_silver.outside_identifiers
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY entity_type, entity_id, label, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_identifiers_exist_in_bronze
    type: referential_integrity
    description: "All Silver identifiers should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_identifiers
      FROM blackdiamond_silver.outside_identifiers s
      LEFT JOIN blackdiamond.outside_identifiers_raw b
        ON s.entity_type = b.entity_type
        AND s.entity_id = b.entity_id
        AND s.label = b.label
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.entity_type IS NULL
    expect:
      orphaned_identifiers: 0
  
  - name: no_empty_values
    type: assertion
    description: "Identifier values should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.outside_identifiers
      WHERE processing_date = toDate('{{ ds }}')
        AND value = ''
    expect:
      invalid_count: 0