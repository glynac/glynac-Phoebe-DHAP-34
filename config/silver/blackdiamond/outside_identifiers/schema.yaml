version: "1.0"
layer: silver
database: blackdiamond_silver
table: outside_identifiers

metadata:
  display_name: "Black Diamond Outside Identifiers (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond outside identifiers from Bronze layer.
    Contains external reference identifiers for various entity types (accounts, portfolios, etc.)
    used for integration with external systems.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - outside_identifiers
    - external_references
    - metadata
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.outside_identifiers_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - entity_type
    - entity_id
    - label
  primary_key:
    - entity_type
    - entity_id
    - label
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: entity_type_idx
      expression: entity_type
      type: set
      granularity: 4
    - name: label_idx
      expression: label
      type: set
      granularity: 4

columns:
  - name: entity_type
    type: String
    nullable: false
    description: "Type of entity (account, portfolio, contact, etc.)"
    primary_key: true
    example: "account"
    
  - name: entity_id
    type: String
    nullable: false
    description: "Black Diamond entity ID"
    primary_key: true
    example: "6000001"
    
  - name: label
    type: String
    nullable: false
    description: "Identifier label/type"
    primary_key: true
    example: "external_account_id"
    
  - name: value
    type: String
    nullable: false
    description: "Identifier value"
    example: "EXT-ACC-12345"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.outside_identifiers_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"