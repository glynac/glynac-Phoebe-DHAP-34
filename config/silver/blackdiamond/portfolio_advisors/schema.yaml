version: "1.0"
layer: silver
database: blackdiamond_silver
table: portfolio_advisors

metadata:
  display_name: "Black Diamond Portfolio Advisors (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond portfolio advisors mapping from Bronze layer.
    Links portfolios to assigned advisors with advisor name information.
    Contains PII - advisor names.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - portfolio_advisors
    - mapping
    - advisors
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - first_name
    - last_name
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.portfolio_advisors_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - portfolio_id
    - advisor_id
  primary_key:
    - portfolio_id
    - advisor_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: advisor_id_idx
      expression: advisor_id
      type: bloom_filter
      granularity: 1
    - name: last_name_idx
      expression: last_name
      type: bloom_filter
      granularity: 1

columns:
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio ID (foreign key)"
    primary_key: true
    example: "2000001"
    
  - name: advisor_id
    type: String
    nullable: false
    description: "Advisor ID (foreign key)"
    primary_key: true
    pii: true
    example: "150001"
    
  - name: first_name
    type: String
    nullable: false
    description: "Advisor first name"
    pii: true
    example: "Steven"
    
  - name: last_name
    type: String
    nullable: false
    description: "Advisor last name"
    pii: true
    example: "Jose"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.portfolio_advisors_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"