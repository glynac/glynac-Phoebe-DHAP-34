version: "1.0"
layer: silver
database: blackdiamond_silver
table: target_components

metadata:
  display_name: "Black Diamond Target Components (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond target component records from Bronze layer.
    Contains target allocation model components showing how investment targets are
    composed of different asset classes, strategies, or securities with their
    respective allocation percentages. Used for portfolio rebalancing and allocation drift analysis.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - target_components
    - target_allocations
    - portfolio_models
    - rebalancing
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.target_components_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - target_id
    - composition
  primary_key:
    - target_id
    - composition
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: target_id_idx
      expression: target_id
      type: bloom_filter
      granularity: 1

columns:
  - name: target_id
    type: String
    nullable: false
    description: "Target allocation model ID"
    primary_key: true
    example: "T001"
    
  - name: composition
    type: String
    nullable: false
    description: "Component name/composition (asset class, strategy, security)"
    primary_key: true
    example: "US Large Cap Equities"
    
  - name: allocation
    type: Float64
    nullable: false
    description: "Target allocation percentage (0-100)"
    example: 25.50
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.target_components_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"