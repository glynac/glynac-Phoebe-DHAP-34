# tests.yaml
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(id = '') as empty_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      empty_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: contact_profile_unique_per_partition
    type: uniqueness
    description: "Contact profile ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT glynac_organization_id, id, processing_date, count() as cnt
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY glynac_organization_id, id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_contact_profiles_exist_in_bronze
    type: referential_integrity
    description: "All Silver contact profiles should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_records
      FROM blackdiamond_silver.contact_profiles s
      LEFT JOIN blackdiamond.contact_profiles_raw b
        ON s.id = b.id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_records: 0
  
  - name: valid_boolean_flags
    type: accepted_values
    description: "Boolean flags must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
        AND is_disabled NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: date_of_birth_before_death
    type: assertion
    description: "Date of birth should be before date of death"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
        AND date_of_birth IS NOT NULL
        AND date_of_death IS NOT NULL
        AND date_of_birth > date_of_death
    expect:
      invalid_count: 0
  
  - name: date_of_birth_not_future
    type: assertion
    description: "Date of birth should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
        AND date_of_birth > now()
    expect:
      invalid_count: 0
  
  - name: valid_retirement_age
    type: assertion
    description: "Retirement age should be reasonable (18-100)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
        AND retirement_age != 0
        AND (retirement_age < 18 OR retirement_age > 100)
    expect:
      invalid_count: 0
  
  - name: has_name_information
    type: assertion
    description: "Contact should have at least first or last name"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.contact_profiles
      WHERE processing_date = toDate('{{ ds }}')
        AND (first_name = '' OR first_name IS NULL)
        AND (last_name = '' OR last_name IS NULL)
    expect:
      invalid_count: 0