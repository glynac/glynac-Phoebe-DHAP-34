# Silver Layer - Black Diamond Contact Profiles (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contact_profiles_raw
# Extended profile and demographic data for contacts
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contact profiles data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-profiles", "auto-mode", "pii"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: contact_profiles_raw

target:
  database: blackdiamond_silver
  table: contact_profiles

# Transform specifications
transforms:
  # Profile string fields
  occupation:
    transform: clean_string

  employer:
    transform: clean_string

  marital_status:
    transform: normalize_status

  citizenship:
    transform: clean_string

  country_of_birth:
    transform: clean_string

  language:
    transform: clean_string

  # Date fields
  date_of_birth:
    transform: parse_date

  anniversary_date:
    transform: parse_date

  # Status fields
  status:
    transform: normalize_status

# Deduplication - one profile per contact
dedupe:
  partition_by:
    - contact_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "contact_id IS NOT NULL"
  - "contact_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one contact profile record exists"

  - type: not_null
    columns:
      - contact_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: unique
    columns:
      - contact_id
      - processing_date
    severity: warning
    description: "One profile per contact per processing date"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
