version: "1.0"
layer: silver
database: blackdiamond_silver
table: relationship_contacts

metadata:
  display_name: "Black Diamond Relationship Contacts (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond relationship-contact mapping from Bronze layer.
    Links contacts (individuals) to client relationships (households) with primary/secondary flags.
    Each relationship typically has one primary contact who is the main account holder.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - relationships
    - contacts
    - mappings
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.relationship_contacts_raw
    - blackdiamond_silver.relationships
    - blackdiamond_silver.contacts
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - relationship_id
    - contact_id
  primary_key:
    - relationship_id
    - contact_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: primary_contact_idx
      expression: is_primary
      type: set
      granularity: 1
    - name: secondary_contact_idx
      expression: is_secondary
      type: set
      granularity: 1

columns:
  - name: relationship_id
    type: String
    nullable: false
    description: "Black Diamond relationship ID"
    primary_key: true
    example: "z0150001"
    
  - name: contact_id
    type: String
    nullable: false
    description: "Black Diamond contact ID"
    primary_key: true
    example: "a1b2c3d4-e5f6-4a5b-8c9d-1e2f3a4b5c6d"
    
  - name: is_primary
    type: Bool
    nullable: false
    description: "Primary contact flag - main account holder for this relationship"
    example: true
    
  - name: is_secondary
    type: Bool
    nullable: false
    description: "Secondary contact flag - additional stakeholder in relationship"
    example: false
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.relationship_contacts_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"