version: "1.0"
layer: silver
database: blackdiamond_silver
table: contacts

metadata:
  display_name: "Black Diamond Contacts (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond contact records from Bronze layer.
    Contains client/contact personal information including names, roles, and member types.
    HIGHLY SENSITIVE - Contains PII.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - contacts
    - clients
    - silver
    - pii
    - sensitive
  data_classification: highly_confidential
  contains_pii: true
  pii_columns:
    - id
    - salutation
    - first_name
    - middle_name
    - last_name
    - suffix
    - nickname
    - user_id
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.contacts_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - id
  primary_key:
    - id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: last_name_idx
      expression: last_name
      type: bloom_filter
      granularity: 1
    - name: member_role_idx
      expression: member_role
      type: set
      granularity: 4

columns:
  - name: id
    type: String
    nullable: false
    description: "Black Diamond contact ID (primary key)"
    primary_key: true
    pii: true
    example: "a1b2c3d4-e5f6-4a5b-8c9d-1e2f3a4b5c6d"
    
  - name: salutation
    type: String
    nullable: false
    description: "Contact salutation/title"
    pii: true
    example: "Mr."
    
  - name: first_name
    type: String
    nullable: false
    description: "Contact first name"
    pii: true
    example: "Marcus"
    
  - name: middle_name
    type: String
    nullable: false
    description: "Contact middle name"
    pii: true
    example: ""
    
  - name: last_name
    type: String
    nullable: false
    description: "Contact last name"
    pii: true
    example: "Bennett"
    
  - name: suffix
    type: String
    nullable: false
    description: "Contact name suffix"
    pii: true
    example: ""
    
  - name: nickname
    type: String
    nullable: false
    description: "Contact nickname"
    pii: true
    example: ""
    
  - name: user_id
    type: String
    nullable: false
    description: "User ID if contact has login access"
    pii: true
    example: "8000001"
    
  - name: member_type_id
    type: Nullable(Int64)
    nullable: true
    description: "Member type identifier"
    example: 0
    
  - name: member_type
    type: Nullable(Int64)
    nullable: true
    description: "Member type code"
    example: 0
    
  - name: member_role
    type: String
    nullable: false
    description: "Contact role description"
    example: "Primary Account Holder"
    
  - name: team
    type: Nullable(Int32)
    nullable: true
    description: "Team identifier"
    example: null
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.contacts_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"