version: "1.0"
layer: silver
database: blackdiamond_silver
table: relationship_portfolios

metadata:
  display_name: "Black Diamond Relationship Portfolios (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond relationship-portfolio mapping from Bronze layer.
    Links portfolios to client relationships (households) with primary portfolio designation
    and client visibility flags. Each relationship typically has one primary portfolio.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - relationships
    - portfolios
    - mappings
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.relationship_portfolios_raw
    - blackdiamond_silver.relationships
    - blackdiamond_silver.portfolios
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - relationship_id
    - portfolio_id
  primary_key:
    - relationship_id
    - portfolio_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: primary_portfolio_idx
      expression: is_primary
      type: set
      granularity: 1
    - name: client_visible_idx
      expression: client_visible
      type: set
      granularity: 1

columns:
  - name: relationship_id
    type: String
    nullable: false
    description: "Black Diamond relationship ID (foreign key to relationships)"
    primary_key: true
    example: "z0150001"
    
  - name: portfolio_id
    type: String
    nullable: false
    description: "Black Diamond portfolio ID (foreign key to portfolios)"
    primary_key: true
    example: "2000001"
    
  - name: is_primary
    type: Bool
    nullable: false
    description: "Primary portfolio flag - main portfolio for this relationship"
    example: true
    
  - name: client_visible
    type: Bool
    nullable: false
    description: "Client visibility flag - whether portfolio appears in client portal"
    example: true
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.relationship_portfolios_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"