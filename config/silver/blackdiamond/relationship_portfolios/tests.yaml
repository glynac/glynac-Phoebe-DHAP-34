version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(relationship_id IS NULL) as null_relationship_id,
        countIf(relationship_id = '') as empty_relationship_id,
        countIf(portfolio_id IS NULL) as null_portfolio_id,
        countIf(portfolio_id = '') as empty_portfolio_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.relationship_portfolios
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_relationship_id: 0
      empty_relationship_id: 0
      null_portfolio_id: 0
      empty_portfolio_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: relationship_portfolio_unique_per_partition
    type: uniqueness
    description: "Relationship-Portfolio pair should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT relationship_id, portfolio_id, processing_date, count() as cnt
      FROM blackdiamond_silver.relationship_portfolios
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY relationship_id, portfolio_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: relationships_exist
    type: referential_integrity
    description: "All relationship_ids must exist in relationships table"
    severity: error
    query: |
      SELECT count() as orphaned_relationships
      FROM blackdiamond_silver.relationship_portfolios rp
      LEFT JOIN blackdiamond_silver.relationships r
        ON rp.relationship_id = r.id
        AND rp.processing_date = r.processing_date
        AND rp.glynac_organization_id = r.glynac_organization_id
      WHERE rp.processing_date = toDate('{{ ds }}')
        AND r.id IS NULL
    expect:
      orphaned_relationships: 0
  
  - name: portfolios_exist
    type: referential_integrity
    description: "All portfolio_ids must exist in portfolios table"
    severity: error
    query: |
      SELECT count() as orphaned_portfolios
      FROM blackdiamond_silver.relationship_portfolios rp
      LEFT JOIN blackdiamond_silver.portfolios p
        ON rp.portfolio_id = p.id
        AND rp.processing_date = p.processing_date
        AND rp.glynac_organization_id = p.glynac_organization_id
      WHERE rp.processing_date = toDate('{{ ds }}')
        AND p.id IS NULL
    expect:
      orphaned_portfolios: 0
  
  - name: primary_portfolio_uniqueness
    type: assertion
    description: "Each relationship should have at most one primary portfolio"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM (
        SELECT relationship_id, count() as primary_count
        FROM blackdiamond_silver.relationship_portfolios
        WHERE processing_date = toDate('{{ ds }}')
          AND is_primary = true
        GROUP BY relationship_id
        HAVING primary_count > 1
      )
    expect:
      invalid_count: 0
  
  - name: all_mappings_exist_in_bronze
    type: referential_integrity
    description: "All Silver mappings should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_mappings
      FROM blackdiamond_silver.relationship_portfolios s
      LEFT JOIN blackdiamond.relationship_portfolios_raw b
        ON s.relationship_id = b.relationship_id
        AND s.portfolio_id = b.portfolio_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.relationship_id IS NULL
    expect:
      orphaned_mappings: 0
  
  - name: visible_portfolios_are_primary_or_secondary
    type: assertion
    description: "Client visible portfolios should have some designation"
    severity: info
    query: |
      SELECT count() as visible_non_primary_count
      FROM blackdiamond_silver.relationship_portfolios
      WHERE processing_date = toDate('{{ ds }}')
        AND client_visible = true
        AND is_primary = false
    expect_greater_than_or_equal:
      visible_non_primary_count: 0