version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(account_id IS NULL) as null_account_id,
        countIf(account_id = '') as empty_account_id,
        countIf(class_id IS NULL) as null_class_id,
        countIf(segment_id IS NULL) as null_segment_id,
        countIf(as_of_date IS NULL) as null_as_of_date,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_account_id: 0
      empty_account_id: 0
      null_class_id: 0
      null_segment_id: 0
      null_as_of_date: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: segment_allocation_unique_per_partition
    type: uniqueness
    description: "Account-Class-Segment-Date combination should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT account_id, class_id, segment_id, as_of_date, processing_date, count() as cnt
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY account_id, class_id, segment_id, as_of_date, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: accounts_exist
    type: referential_integrity
    description: "All account_ids must exist in accounts table"
    severity: error
    query: |
      SELECT count() as orphaned_accounts
      FROM blackdiamond_silver.segment_allocations sa
      LEFT JOIN blackdiamond_silver.accounts a
        ON sa.account_id = a.id
        AND sa.processing_date = a.processing_date
        AND sa.glynac_organization_id = a.glynac_organization_id
      WHERE sa.processing_date = toDate('{{ ds }}')
        AND a.id IS NULL
    expect:
      orphaned_accounts: 0
  
  - name: all_allocations_exist_in_bronze
    type: referential_integrity
    description: "All Silver allocations should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_allocations
      FROM blackdiamond_silver.segment_allocations s
      LEFT JOIN blackdiamond.segment_allocations_raw b
        ON s.account_id = b.account_id
        AND s.class_id = b.class_id
        AND s.segment_id = b.segment_id
        AND s.as_of_date = toDate(parseDateTime64BestEffortOrNull(toString(b.as_of_date)))
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.account_id IS NULL
    expect:
      orphaned_allocations: 0
  
  - name: market_value_consistency
    type: assertion
    description: "Total EMV should equal supervised + unsupervised EMV"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
        AND abs(total_emv - (supervised_emv + unsupervised_emv)) > 0.01
    expect:
      invalid_count: 0
  
  - name: non_negative_values
    type: assertion
    description: "Market values should be non-negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
        AND (total_emv < 0 OR supervised_emv < 0 OR unsupervised_emv < 0)
    expect:
      invalid_count: 0
  
  - name: as_of_date_not_future
    type: assertion
    description: "As-of date should not be in the future"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date > today()
    expect:
      invalid_count: 0
  
  - name: as_of_date_reasonable_range
    type: assertion
    description: "As-of date should be within reasonable range (not older than 10 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date < today() - INTERVAL 10 YEAR
    expect:
      invalid_count: 0
  
  - name: class_segment_names_populated
    type: assertion
    description: "Class and segment names should be populated when IDs exist"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (class_id != 0 AND class_name = '')
          OR (segment_id != 0 AND segment_name = '')
        )
    expect:
      invalid_count: 0
  
  - name: allocation_coverage_by_account
    type: assertion
    description: "Monitor accounts with allocation data"
    severity: info
    query: |
      SELECT
        count(DISTINCT account_id) as accounts_with_allocations,
        sum(total_emv) as total_market_value,
        avg(total_emv) as avg_market_value_per_segment
      FROM blackdiamond_silver.segment_allocations
      WHERE processing_date = toDate('{{ ds }}')
    expect_greater_than:
      accounts_with_allocations: 0
      total_market_value: 0