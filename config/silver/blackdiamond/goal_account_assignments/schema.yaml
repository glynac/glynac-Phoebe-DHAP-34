version: "1.0"
layer: silver
database: blackdiamond_silver
table: goal_account_assignments

metadata:
  display_name: "Black Diamond Goal Account Assignments (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond goal account assignment records from Bronze layer.
    Links financial goals to specific accounts and portfolios for goal tracking and management.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - goal_account_assignments
    - financial
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - account_number
    - account_name
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.goal_account_assignments_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - glynac_organization_id
    - goal_id
    - account_number
    - processing_date
  primary_key:
    - glynac_organization_id
    - goal_id
    - account_number
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: portfolio_id_idx
      expression: portfolio_id
      type: bloom_filter
      granularity: 1
    - name: account_number_idx
      expression: account_number
      type: bloom_filter
      granularity: 1

columns:
  - name: goal_id
    type: Nullable(Int64)
    nullable: true
    description: "Financial goal identifier"
    example: 5001
    
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio identifier"
    example: "PORT-12345"
    
  - name: account_number
    type: String
    nullable: false
    description: "Account number assigned to goal"
    pii: true
    example: "ACC-67890"
    
  - name: account_name
    type: String
    nullable: false
    description: "Account name"
    pii: true
    example: "Retirement Savings Account"
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.goal_account_assignments_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"