# Silver Layer - Black Diamond Goal Account Assignments (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.goal_account_assignments_raw
# Linking table: associates investment goals to specific accounts
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond goal account assignments data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "goal-account-assignments", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: goal_account_assignments_raw

target:
  database: blackdiamond_silver
  table: goal_account_assignments

# Transform specifications
transforms:
  # Assignment type/role labels
  assignment_type:
    transform: clean_string

  role:
    transform: clean_string

  # Date of assignment
  assigned_date:
    transform: parse_date

  effective_date:
    transform: parse_date

# Deduplication - composite key for goal-account linking table
dedupe:
  partition_by:
    - goal_id
    - account_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "goal_id IS NOT NULL"
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one goal-account assignment exists"

  - type: not_null
    columns:
      - goal_id
      - account_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Link keys and partition columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
