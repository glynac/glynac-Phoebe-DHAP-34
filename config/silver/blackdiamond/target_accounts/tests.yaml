version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(target_id IS NULL) as null_target_id,
        countIf(target_id = '') as empty_target_id,
        countIf(account_number IS NULL) as null_account_number,
        countIf(account_number = '') as empty_account_number,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.target_accounts
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_target_id: 0
      empty_target_id: 0
      null_account_number: 0
      empty_account_number: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: target_account_unique_per_partition
    type: uniqueness
    description: "Target-account assignment should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT glynac_organization_id, target_id, account_number, processing_date, count() as cnt
      FROM blackdiamond_silver.target_accounts
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY glynac_organization_id, target_id, account_number, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_target_accounts_exist_in_bronze
    type: referential_integrity
    description: "All Silver target accounts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_records
      FROM blackdiamond_silver.target_accounts s
      LEFT JOIN blackdiamond.target_accounts_raw b
        ON s.target_id = b.target_id
        AND s.account_number = b.account_number
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.target_id IS NULL
    expect:
      orphaned_records: 0