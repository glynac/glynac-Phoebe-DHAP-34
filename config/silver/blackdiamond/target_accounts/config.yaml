# Silver Layer - Black Diamond Target Accounts (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.target_accounts_raw
# Linking table: accounts associated with a specific investment target model
# Identifies which accounts are being managed against a target allocation
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond target accounts data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "target-accounts", "auto-mode"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: target_accounts_raw

target:
  database: blackdiamond_silver
  table: target_accounts

# Transform specifications
transforms:
  # Account type and custodian labels
  account_type:
    transform: clean_string

  custodian:
    transform: clean_string

  role:
    transform: clean_string

# Deduplication - composite key: target + account
dedupe:
  partition_by:
    - target_id
    - account_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "target_id IS NOT NULL"
  - "target_id != ''"
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one target-account assignment exists"

  - type: not_null
    columns:
      - target_id
      - account_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Link keys and partition columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
