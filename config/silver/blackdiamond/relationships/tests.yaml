version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(id IS NULL) as null_id,
        countIf(id = '') as empty_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM blackdiamond_silver.relationships
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_id: 0
      empty_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: relationship_id_unique_per_partition
    type: uniqueness
    description: "Relationship ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT id, processing_date, count() as cnt
      FROM blackdiamond_silver.relationships
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_relationships_exist_in_bronze
    type: referential_integrity
    description: "All Silver relationships should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_relationships
      FROM blackdiamond_silver.relationships s
      LEFT JOIN blackdiamond.relationships_raw b
        ON s.id = b.id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.id IS NULL
    expect:
      orphaned_relationships: 0
  
  - name: relationships_have_name
    type: assertion
    description: "Relationships should have a name"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.relationships
      WHERE processing_date = toDate('{{ ds }}')
        AND name = ''
    expect:
      invalid_count: 0
  
  - name: inception_date_not_future
    type: assertion
    description: "Inception date should not be in the future"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.relationships
      WHERE processing_date = toDate('{{ ds }}')
        AND inception_date > now()
    expect:
      invalid_count: 0
  
  - name: termination_after_inception
    type: assertion
    description: "Termination date should be after inception date when both present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM blackdiamond_silver.relationships
      WHERE processing_date = toDate('{{ ds }}')
        AND inception_date IS NOT NULL
        AND termination_date IS NOT NULL
        AND toDateTime64(termination_date, 3) < inception_date
    expect:
      invalid_count: 0