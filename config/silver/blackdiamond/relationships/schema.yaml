version: "1.0"
layer: silver
database: blackdiamond_silver
table: relationships

metadata:
  display_name: "Black Diamond Relationships (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond relationship records from Bronze layer.
    Contains client relationship/household definitions with inception dates,
    CRM source, and financial team templates.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - relationships
    - clients
    - households
    - silver
  data_classification: internal
  contains_pii: true
  pii_columns:
    - name
    - display_name
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.relationships_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - id
  primary_key:
    - id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: relationship_name_idx
      expression: name
      type: bloom_filter
      granularity: 1
    - name: inception_date_idx
      expression: inception_date
      type: minmax
      granularity: 2

columns:
  - name: id
    type: String
    nullable: false
    description: "Black Diamond relationship ID (primary key)"
    primary_key: true
    example: "z0150001"
    
  - name: name
    type: String
    nullable: false
    description: "Relationship/household name"
    example: "Marcus Bennett Household"
    
  - name: display_name
    type: String
    nullable: false
    description: "Display name for relationship"
    example: ""
    
  - name: inception_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Relationship start date"
    example: "2022-04-25 00:00:00.000"
    
  - name: termination_date
    type: Nullable(Int32)
    nullable: true
    description: "Relationship termination date"
    example: null
    
  - name: crm_source
    type: String
    nullable: false
    description: "CRM system source"
    example: "Black Diamond"
    
  - name: client_type_id
    type: Nullable(Int64)
    nullable: true
    description: "Client type identifier"
    example: 0
    
  - name: financial_team_template_id
    type: Nullable(Int32)
    nullable: true
    description: "Financial team template ID"
    example: null
    
  - name: financial_team_template_name
    type: Nullable(Int32)
    nullable: true
    description: "Financial team template name"
    example: null
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.relationships_raw"
    
  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"