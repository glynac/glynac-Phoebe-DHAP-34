# Silver Layer - Black Diamond Contact Emails (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contact_emails_raw
# Email addresses for contacts (PII data)
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contact emails data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-emails", "auto-mode", "pii"]
  schedule_interval: "dataset"

source:
  database: blackdiamond
  table: contact_emails_raw

target:
  database: blackdiamond_silver
  table: contact_emails

# Transform specifications
transforms:
  # Email fields - normalize to lowercase
  email:
    transform: clean_email

  email_address:
    transform: clean_email

  # Label/type fields
  email_type:
    transform: clean_string

  type:
    transform: clean_string

# Deduplication - contact may have multiple email types
dedupe:
  partition_by:
    - contact_id
    - email_type
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "contact_id IS NOT NULL"
  - "contact_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Lookback days
lookback_days: 90

# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error
    description: "Ensure at least one contact email record exists"

  - type: not_null
    columns:
      - contact_id
      - glynac_organization_id
      - processing_date
    severity: error
    description: "Key columns must not be NULL"

  - type: freshness
    max_age_hours: 48
    severity: warning
    description: "Data should be refreshed within 48 hours"
