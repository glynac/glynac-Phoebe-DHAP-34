# Silver Layer - Black Diamond Contact Created (AUTO MODE)
# Schema inferred from Bronze: blackdiamond.contacts_raw
# Bronze columns: id, salutation, first_name, middle_name, last_name, suffix,
#   nickname, user_id, member_type_id, member_type, member_role, team

version: "1.0"

dag:
  description: "Transform and clean Black Diamond contacts data from Bronze to Silver"
  tags: ["silver", "blackdiamond", "contact-created", "auto-mode", "wealth-management"]

source:
  database: blackdiamond
  table: contacts_raw

target:
  database: blackdiamond_silver
  table: contact_created

transforms:
  salutation:
    transform: clean_string

  first_name:
    transform: clean_string

  middle_name:
    transform: clean_string

  last_name:
    transform: clean_string

  suffix:
    transform: clean_string

  nickname:
    transform: clean_string

  member_role:
    transform: clean_string

dedupe:
  partition_by:
    - id
    - glynac_organization_id
    - processing_date
  order_by:
    - processing_date DESC

filters:
  - "id IS NOT NULL"
  - "id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - id
      - glynac_organization_id
    severity: error
