version: "1.0"
layer: silver
database: blackdiamond_silver
table: targets

metadata:
  display_name: "Black Diamond Targets (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond target allocation model records from Bronze layer.
    Contains target/model definitions assigned to portfolios or accounts, including
    model name, description, effective date ranges, and hierarchical level.
    Used for portfolio rebalancing, allocation monitoring, and drift analysis.
  
  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - targets
    - allocation_models
    - portfolio_models
    - rebalancing
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.targets_raw
    - blackdiamond_silver.portfolios
    - blackdiamond_silver.accounts
  downstream_dependencies:
    - blackdiamond_silver.target_components

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - id
  primary_key:
    - id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: name_idx
      expression: name
      type: bloom_filter
      granularity: 1
    - name: portfolio_id_idx
      expression: portfolio_id
      type: bloom_filter
      granularity: 1
    - name: start_date_idx
      expression: start_date
      type: minmax
      granularity: 2
    - name: end_date_idx
      expression: end_date
      type: minmax
      granularity: 2

columns:
  - name: id
    type: String
    nullable: false
    description: "Black Diamond target ID (primary key)"
    primary_key: true
    example: "T001"
    
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio ID this target is assigned to (foreign key to portfolios)"
    example: "2000001"
    
  - name: account_id
    type: Nullable(Int32)
    nullable: true
    description: "Account ID this target is assigned to (optional, for account-level targets)"
    example: 123456
    
  - name: name
    type: String
    nullable: false
    description: "Target allocation model name"
    example: "Moderate Growth"
    
  - name: description
    type: String
    nullable: false
    description: "Target model description"
    example: "Balanced 60/40 equity/fixed income allocation"
    
  - name: start_date
    type: Nullable(Date)
    nullable: true
    description: "Target effective start date"
    example: "2024-01-01"
    
  - name: end_date
    type: Nullable(Date)
    nullable: true
    description: "Target effective end date"
    example: "2024-12-31"
    
  - name: target_level
    type: Nullable(Int64)
    nullable: true
    description: "Hierarchical level of target (0=portfolio, 1=account, 2+=sub-levels)"
    example: 0
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.targets_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"