version: "1.0"
layer: silver
database: blackdiamond_silver
table: portfolio_accounts_not_assigned

metadata:
  display_name: "Black Diamond Portfolio Accounts Not Assigned (Cleaned)"
  description: |
    Cleaned and transformed Black Diamond portfolio accounts not assigned from Bronze layer.
    Represents accounts that exist in portfolios but have not been assigned to any group or model.

  owner: ai-team
  domain: blackdiamond
  tags:
    - blackdiamond
    - portfolio_accounts_not_assigned
    - mapping
    - silver
  data_classification: internal
  contains_pii: false
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - blackdiamond.portfolio_accounts_not_assigned_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - portfolio_id
    - account_number
  primary_key:
    - portfolio_id
    - account_number
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: account_number_idx
      expression: account_number
      type: bloom_filter
      granularity: 1

columns:
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio ID (foreign key)"
    primary_key: true
    example: "2000001"

  - name: account_number
    type: String
    nullable: false
    description: "Account number (foreign key)"
    primary_key: true
    example: "ACC-123456"

  - name: account_name
    type: String
    nullable: false
    description: "Account display name"
    example: "John Smith Retirement"

  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"

  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"

  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"

  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "blackdiamond.portfolio_accounts_not_assigned_raw"

  - name: _source_timestamp
    type: Nullable(Date)
    nullable: true
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"
