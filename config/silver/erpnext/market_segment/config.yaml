# Silver Layer - ERPNext Market Segment (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform ERPNext market_segment from Bronze to Silver"
  tags: ["silver", "erpnext", "market_segment", "auto-mode", "single-tenant"]

source:
  database: erpnext
  table: market_segment_raw

target:
  database: erpnext_silver
  table: market_segment

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [name, partition]
  order_by: [modified DESC]

filters:
  - "name IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
