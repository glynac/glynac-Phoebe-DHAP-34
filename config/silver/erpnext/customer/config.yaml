# Silver Layer - ERPNext Customer (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform ERPNext customer from Bronze to Silver"
  tags: ["silver", "erpnext", "customer", "auto-mode", "single-tenant"]

source:
  database: nexterp
  table: customer_raw

target:
  database: nexterp_silver
  table: customer

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  customer_name:
    transform: clean_string
  customer_type:
    transform: clean_string
  territory:
    transform: clean_string

dedupe:
  partition_by: [name, partition]
  order_by: [modified DESC]

filters:
  - "name IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
