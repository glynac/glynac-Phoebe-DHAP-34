# Silver Layer - ERPNext Sales Person (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform ERPNext sales_person from Bronze to Silver"
  tags: ["silver", "erpnext", "sales_person", "auto-mode", "single-tenant"]

source:
  database: nexterp
  table: sales_person_raw

target:
  database: nexterp_silver
  table: sales_person

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  sales_person_name:
    transform: clean_string

dedupe:
  partition_by: [name, partition]
  order_by: [modified DESC]

filters:
  - "name IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
