# Silver Layer - ERPNext Territory (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform ERPNext territory from Bronze to Silver"
  tags: ["silver", "erpnext", "territory", "auto-mode", "single-tenant"]

source:
  database: erpnext
  table: territory_raw

target:
  database: erpnext_silver
  table: territory

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  territory_name:
    transform: clean_string

dedupe:
  partition_by: [name, partition]
  order_by: [modified DESC]

filters:
  - "name IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
