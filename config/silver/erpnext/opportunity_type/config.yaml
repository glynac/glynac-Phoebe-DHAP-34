# Silver Layer - ERPNext Opportunity Type (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform ERPNext opportunity_type from Bronze to Silver"
  tags: ["silver", "erpnext", "opportunity_type", "auto-mode", "single-tenant"]

source:
  database: erpnext
  table: opportunity_type_raw

target:
  database: erpnext_silver
  table: opportunity_type

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [name, partition]
  order_by: [modified DESC]

filters:
  - "name IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
