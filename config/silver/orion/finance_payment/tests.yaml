  - name: payment_type_not_empty
    type: assertion
    description: "Payment type should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND (payment_type IS NULL OR payment_type = '')
    expect:
      invalid_count: 0