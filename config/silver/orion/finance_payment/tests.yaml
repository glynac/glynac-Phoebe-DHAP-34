    expect:
      invalid_count: 0
  
  - name: payment_date_not_future
    type: assertion
    description: "Payment date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND payment_date > now()
    expect:
      invalid_count: 0
  
  - name: cleared_date_after_payment
    type: assertion
    description: "Cleared date should be after or equal to payment date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND payment_date IS NOT NULL
        AND cleared_date IS NOT NULL
        AND cleared_date < payment_date
    expect:
      invalid_count: 0
  
  - name: completed_payments_have_payment_date
    type: assertion
    description: "Completed payments should have payment date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND payment_status IN ('completed', 'cleared')
        AND payment_date IS NULL
    expect:
      invalid_count: 0
  
  - name: cleared_payments_have_cleared_date
    type: assertion
    description: "Cleared payments should have cleared date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND payment_status = 'cleared'
        AND cleared_date IS NULL
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date > now()
    expect:
      invalid_count: 0
  
  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0
  
  - name: method_not_empty
    type: assertion
    description: "Payment method should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_payment
