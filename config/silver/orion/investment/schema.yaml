version: "1.0"
layer: silver
database: orion_silver
table: investment


metadata:
  display_name: "Orion Investments (Cleaned)"
  description: |
    Cleaned and transformed Orion investment data from Bronze layer.
    Represents investment holdings with valuation, performance tracking,
    and risk assessment information.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - investment
    - financial
    - portfolio
    - holdings
    - silver
    - pii
  data_classification: highly_confidential
  contains_pii: true
  pii_columns:
    - amount
    - quantity
    - current_value
    - gain_loss
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - orion.investment_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - investment_id
  primary_key:
    - investment_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: investment_status_idx
      expression: investment_status
      type: set
      granularity: 4
    - name: investment_type_idx
      expression: investment_type
      type: set
      granularity: 4
    - name: risk_rating_idx
      expression: risk_rating
      type: set
      granularity: 4
    - name: account_id_idx
      expression: account_id
      type: minmax
      granularity: 2
    - name: portfolio_id_idx
      expression: portfolio_id
      type: minmax
      granularity: 2

columns:
  - name: investment_id
    type: String
    nullable: false
    description: "Unique investment identifier (primary key)"
    primary_key: true
    example: "inv-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation (primary key)"
    example: "org-xyz789"
    
  # Investment classification
  - name: record_type
    type: String
    nullable: false
    description: "Investment record type"
    example: "equity_investment"
    
  - name: investment_external_id
    type: String
    nullable: false
    description: "External system investment identifier"
    example: "EXT-INV-12345"
    
  - name: investment_type
    type: String
    nullable: false
    description: "Type of investment"
    example: "stock"
    
  - name: investment_status
    type: String
    nullable: false
    description: "Current investment status"
    example: "active"
    
  # Relationships
  - name: account_id
    type: String
    nullable: false
    description: "Account identifier"
    example: "acc-def456"
    
  - name: portfolio_id
    type: String
    nullable: false
    description: "Portfolio identifier"
    example: "port-ghi789"
    
  - name: asset_id
    type: String
    nullable: false
    description: "Asset identifier"
    example: "asset-jkl012"
    
  - name: asset_name
    type: String
    nullable: false
    description: "Asset name"
    example: "Apple Inc."
    
  # Investment details
  - name: amount
    type: Decimal(15, 2)
    nullable: false
    description: "Investment amount"
    pii: true
    example: 50000.00
    
  - name: currency
    type: String
    nullable: false
    description: "Currency code"
    example: "USD"
    
  - name: quantity
    type: Decimal(15, 4)
    nullable: false
    description: "Number of units"
    pii: true
    example: 100.0000
    
  - name: purchase_price
    type: Decimal(15, 4)
    nullable: false
    description: "Purchase price per unit"
    example: 500.0000
    
  - name: current_price
    type: Decimal(15, 4)
    nullable: false
    description: "Current market price per unit"
    example: 650.0000
    
  - name: current_value
    type: Decimal(15, 2)
    nullable: false
    description: "Current market value"
    pii: true
    example: 65000.00
    
  # Performance metrics
  - name: gain_loss
    type: Decimal(15, 2)
    nullable: false
    description: "Gain or loss amount"
    pii: true
    example: 15000.00
    
  - name: gain_loss_percentage
    type: Decimal(8, 2)
    nullable: false
    description: "Gain or loss percentage"
    example: 30.00
    
  - name: yield_rate
    type: Decimal(8, 4)
    nullable: false
    description: "Yield rate as percentage"
    example: 3.5000
    
  # Risk assessment
  - name: risk_rating
    type: String
    nullable: false
    description: "Risk rating classification"
    example: "moderate"
    
  # Tax and dates
  - name: is_tax_advantaged
    type: UInt8
    nullable: false
    description: "Whether investment is tax advantaged"
    allowed_values: [0, 1]
    example: 1
    
  - name: purchase_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date when investment was purchased"
    example: "2024-01-15 00:00:00.000"
    
  - name: maturity_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Investment maturity date"
    example: "2029-01-15 00:00:00.000"
    
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Record creation date"
    example: "2024-01-15 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-13 14:20:00.000"
    
  # Additional information
  - name: tags
    type: String
    nullable: false
    description: "Classification tags"
    example: "growth,long_term"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-13"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-13 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-13 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.investment_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-13 14:30:22.123"