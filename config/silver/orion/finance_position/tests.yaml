# ============================================================
# DATA QUALITY TESTS: SILVER.ORION_FINANCE_POSITION
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(position_record_id IS NULL) as null_position_record_id,
        countIf(position_record_id = '') as empty_position_record_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(position_status IS NULL) as null_position_status,
        countIf(position_status = '') as empty_position_status,
        countIf(processing_date IS NULL) as null_processing_date
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_position_record_id: 0
      empty_position_record_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_position_status: 0
      empty_position_status: 0
      null_processing_date: 0
  
  - name: position_record_id_unique_per_org_per_partition
    type: uniqueness
    description: "position_record_id should be unique per org per processing_date"
    severity: error
    query: |
      SELECT position_record_id, glynac_organization_id, processing_date, count() as cnt
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY position_record_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_finance_positions_exist_in_bronze
    type: referential_integrity
    description: "All Silver finance positions should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_finance_positions
      FROM orion_silver.finance_position s
      LEFT JOIN orion.finance_position_raw b
        ON s.position_record_id = b.position_record_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.position_record_id IS NULL
    expect:
      orphaned_finance_positions: 0
  
  - name: portfolio_id_not_empty
    type: assertion
    description: "Portfolio ID should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND (portfolio_id IS NULL OR portfolio_id = '')
    expect:
      invalid_count: 0
  
  - name: account_id_not_empty
    type: assertion
    description: "Account ID should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND (account_id IS NULL OR account_id = '')
    expect:
      invalid_count: 0
  
  - name: asset_id_not_empty
    type: assertion
    description: "Asset ID should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND (asset_id IS NULL OR asset_id = '')
    expect:
      invalid_count: 0
  
  - name: symbol_not_empty
    type: assertion
    description: "Symbol should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND (symbol IS NULL OR symbol = '')
    expect:
      invalid_count: 0
  
  - name: quantity_positive
    type: assertion
    description: "Quantity should be positive for long positions"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND position_type = 'long'
        AND quantity <= 0
    expect:
      invalid_count: 0
  
  - name: cost_basis_non_negative
    type: assertion
    description: "Cost basis should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND cost_basis < 0
    expect:
      invalid_count: 0
  
  - name: market_value_non_negative
    type: assertion
    description: "Market value should not be negative"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND market_value < 0
    expect:
      invalid_count: 0
  
  - name: current_price_positive
    type: assertion
    description: "Current price should be positive when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND current_price < 0
    expect:
      invalid_count: 0
  
  - name: cost_basis_per_share_calculation
    type: assertion
    description: "Cost basis per share should match total divided by quantity"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND quantity > 0
        AND cost_basis > 0
        AND abs((cost_basis / quantity) - cost_basis_per_share) > 0.01
    expect:
      invalid_count: 0
  
  - name: market_value_calculation
    type: assertion
    description: "Market value should match quantity times current price"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND quantity > 0
        AND current_price > 0
        AND abs((quantity * current_price) - market_value) > 0.10
    expect:
      invalid_count: 0
  
  - name: unrealized_gain_loss_calculation
    type: assertion
    description: "Unrealized gain/loss should match market value minus cost basis"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND abs((market_value - cost_basis) - unrealized_gain_loss) > 0.10
    expect:
      invalid_count: 0
  
  - name: unrealized_gain_loss_percent_calculation
    type: assertion
    description: "Unrealized gain/loss percent should match calculation"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND cost_basis > 0
        AND abs(((unrealized_gain_loss / cost_basis) * 100) - unrealized_gain_loss_percent) > 0.10
    expect:
      invalid_count: 0
  
  - name: allocation_percentage_valid_range
    type: assertion
    description: "Allocation percentage should be between 0 and 100"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND (allocation_percentage < 0 OR allocation_percentage > 100)
    expect:
      invalid_count: 0
  
  - name: valid_currency_code
    type: assertion
    description: "Currency should be 3-character code when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND currency != ''
        AND length(currency) != 3
    expect:
      invalid_count: 0
  
  - name: open_date_not_future
    type: assertion
    description: "Open date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND open_date > now()
    expect:
      invalid_count: 0
  
  - name: days_held_non_negative
    type: assertion
    description: "Days held should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND days_held < 0
    expect:
      invalid_count: 0
  
  - name: days_held_reasonable
    type: assertion
    description: "Days held should be reasonable given open date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND open_date IS NOT NULL
        AND abs(dateDiff('day', open_date, now()) - days_held) > 7
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date > now()
    expect:
      invalid_count: 0
  
  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_position
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0