version: "1.0"
layer: silver
database: orion_silver
table: lead


metadata:
  display_name: "Orion Leads (Cleaned)"
  description: |
    Cleaned and transformed Orion lead data from Bronze layer.
    Represents sales leads with contact information, scoring,
    and qualification tracking.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - lead
    - sales
    - crm
    - prospecting
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - first_name
    - last_name
    - email
    - phone
    - company
    - estimated_value
  update_frequency: hourly
  retention_days: 2555  # ~7 years
  upstream_dependencies:
    - orion.lead_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - lead_id
  primary_key:
    - lead_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: lead_status_idx
      expression: lead_status
      type: set
      granularity: 4
    - name: lead_type_idx
      expression: lead_type
      type: set
      granularity: 4
    - name: lead_source_idx
      expression: lead_source
      type: set
      granularity: 4
    - name: owner_id_idx
      expression: owner_id
      type: minmax
      granularity: 2

columns:
  - name: lead_id
    type: String
    nullable: false
    description: "Unique lead identifier (primary key)"
    primary_key: true
    example: "lead-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation (primary key)"
    example: "org-xyz789"
    
  # Lead classification
  - name: lead_type
    type: String
    nullable: false
    description: "Type of lead"
    example: "inbound"
    
  - name: lead_status
    type: String
    nullable: false
    description: "Current lead status"
    example: "qualified"
    
  - name: lead_source
    type: String
    nullable: false
    description: "Source where lead originated"
    example: "website"
    
  - name: lead_score
    type: Int32
    nullable: false
    description: "Lead qualification score"
    example: 85
    
  # Personal information (PII)
  - name: first_name
    type: String
    nullable: false
    description: "Lead's first name"
    pii: true
    example: "John"
    
  - name: last_name
    type: String
    nullable: false
    description: "Lead's last name"
    pii: true
    example: "Doe"
    
  - name: email
    type: String
    nullable: false
    description: "Contact email address"
    pii: true
    example: "john.doe@example.com"
    
  - name: phone
    type: String
    nullable: false
    description: "Contact phone number"
    pii: true
    example: "+1-555-0100"
    
  # Company information (PII)
  - name: company
    type: String
    nullable: false
    description: "Company name"
    pii: true
    example: "Acme Corporation"
    
  - name: job_title
    type: String
    nullable: false
    description: "Job title"
    example: "VP of Sales"
    
  - name: industry
    type: String
    nullable: false
    description: "Industry classification"
    example: "Technology"
    
  # Lead management
  - name: owner_id
    type: String
    nullable: false
    description: "Sales rep who owns the lead"
    example: "usr-def456"
    
  - name: estimated_value
    type: Decimal(15, 2)
    nullable: false
    description: "Estimated deal value"
    pii: true
    example: 50000.00
    
  # Dates
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Lead creation date"
    example: "2025-01-10 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-13 14:20:00.000"
    
  - name: last_activity_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last activity date"
    example: "2025-01-13 09:15:00.000"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-13"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-13 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-13 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.lead_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-13 14:30:22.123"