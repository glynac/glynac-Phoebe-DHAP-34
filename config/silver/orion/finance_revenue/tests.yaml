      SELECT count() as invalid_count
      FROM orion_silver.finance_revenue
      WHERE processing_date = toDate('{{ ds }}')
        AND recognition_date > now()
    expect:
      invalid_count: 0
  
  - name: recognized_revenue_has_recognition_date
    type: assertion
    description: "Recognized revenue should have recognition date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.finance_revenue
      WHERE processing_date = toDate('{{ ds }}')
        AND revenue_status = 'recognized'
        AND recognition_date IS NULL
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
