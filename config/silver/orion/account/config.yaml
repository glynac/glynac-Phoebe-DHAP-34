# Silver Layer - Orion Account (AUTO MODE)
# Schema inferred from Bronze: orion.account_raw

version: "1.0"

dag:
  schedule_interval: "dataset"
  tags: ["silver", "orion", "account", "auto-mode"]

source:
  database: orion
  table: account_raw

target:
  database: orion_silver
  table: account

# Transform overrides
transforms:
  # Status normalization
  account_status:
    target: status_normalized
    transform: normalize_status

  # String cleaning
  account_name:
    transform: clean_string

  account_number:
    transform: clean_string

  account_type:
    transform: clean_string

  description:
    transform: clean_string

  # Email
  email:
    transform: clean_email

  # Money fields
  balance:
    transform: parse_money

  available_balance:
    transform: parse_money

  # Dates
  open_date:
    transform: parse_date

  close_date:
    transform: parse_date

  created_at:
    transform: parse_date

  updated_at:
    transform: parse_date

lookback_days: 90

dedupe:
  partition_by:
    - rec_id
    - processing_date
  order_by:
    - processing_timestamp DESC

filters:
  - "rec_id IS NOT NULL"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - rec_id
      - glynac_organization_id
    severity: error
