# Silver Layer - Orion Account (AUTO MODE - COMPREHENSIVE)
# Schema inferred from Bronze: orion.account_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

# ============================================================
# METADATA
# ============================================================
metadata:
  display_name: "Orion Accounts (Cleaned)"
  description: |
    Cleaned and transformed Orion account data from Bronze layer.
    Includes account details, balances, status, and institution information.

  owner: data-engineering
  domain: orion
  tags:
    - silver
    - orion
    - account
    - financial
    - pii

  data_classification: confidential
  contains_pii: true
  pii_columns:
    - account_number
    - account_name
    - email
    - balance
    - available_balance

  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records

  upstream_dependencies:
    - orion.account_raw
  downstream_dependencies: []

# ============================================================
# CLICKHOUSE SETTINGS
# ============================================================
clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at

  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - account_id
  primary_key:
    - account_id

  ttl: "processing_date + INTERVAL 2555 DAY"

  settings:
    index_granularity: 8192

  indexes:
    - name: status_idx
      expression: status_normalized
      type: set
      granularity: 4

    - name: account_type_idx
      expression: account_type
      type: bloom_filter
      granularity: 1

# ============================================================
# DAG SETTINGS
# ============================================================
dag:
  description: "Transform and clean Orion account data from Bronze to Silver"
  tags: ["silver", "orion", "account", "auto-mode"]

# ============================================================
# SOURCE & TARGET
# ============================================================
source:
  database: orion
  table: account_raw

target:
  database: orion_silver
  table: account

# ============================================================
# TRANSFORMS
# ============================================================
# NOTE: Only apply transforms to columns that NEED transformation
# If Bronze column is already correct type (e.g., Float64), don't add transform
transforms:
  # Status normalization
  account_status:
    target: status_normalized
    transform: normalize_status

  # String cleaning
  account_name:
    transform: clean_string

  account_number:
    transform: clean_string

  account_type:
    transform: clean_string

  description:
    transform: clean_string

  # Email
  email:
    transform: clean_email

  # Note: balance, available_balance are already Float64 in Bronze - no transform needed

  # Dates (only if stored as String in Bronze)
  open_date:
    transform: parse_date

  close_date:
    transform: parse_date

  created_at:
    transform: parse_date

  updated_at:
    transform: parse_date

# ============================================================
# EXCLUDE COLUMNS
# ============================================================
exclude:
  - batch_status
  - message_type

# ============================================================
# DEDUPLICATION
# ============================================================
dedupe:
  partition_by:
    - account_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# ============================================================
# FILTERS
# ============================================================
filters:
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# ============================================================
# TESTS - COMPREHENSIVE
# ============================================================
tests:
  # Basic
  - type: row_count
    min: 1
    severity: error

  # Required columns
  - type: not_null
    columns:
      - account_id
      - glynac_organization_id
      - processing_date
    severity: error

  # Uniqueness
  - type: unique
    columns:
      - account_id
      - processing_date
    severity: error

  # Status values
  - type: accepted_values
    column: status_normalized
    values: ["active", "closed", "pending", "unknown"]
    severity: error

  # Balance checks
  - type: custom
    name: balance_non_negative
    description: "Balances should not be negative"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM {{ target_table }}
      WHERE processing_date = toDate('{{ ds }}')
        AND balance < 0

  - type: custom
    name: available_lte_balance
    description: "Available balance should not exceed current balance"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM {{ target_table }}
      WHERE processing_date = toDate('{{ ds }}')
        AND available_balance > balance

  # Date sanity
  - type: custom
    name: open_date_not_future
    description: "Account open date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM {{ target_table }}
      WHERE processing_date = toDate('{{ ds }}')
        AND open_date > now()
