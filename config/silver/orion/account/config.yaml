# Silver Layer - Orion Account (AUTO MODE)
# Schema inferred from Bronze: orion.account_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Orion account data from Bronze to Silver"
  tags: ["silver", "orion", "account", "auto-mode"]

source:
  database: orion
  table: account_raw

target:
  database: orion_silver
  table: account

# Transform overrides (only columns needing special handling)
transforms:
  # Status normalization
  account_status:
    target: status_normalized
    transform: normalize_status

  # String cleaning
  account_name:
    transform: clean_string

  account_number:
    transform: clean_string

  account_type:
    transform: clean_string

  description:
    transform: clean_string

  # Email
  email:
    transform: clean_email

  # Money fields
  balance:
    transform: parse_money

  available_balance:
    transform: parse_money

  # Dates
  open_date:
    transform: parse_date

  close_date:
    transform: parse_date

  created_at:
    transform: parse_date

  updated_at:
    transform: parse_date

# Deduplication (Orion uses account_id, not rec_id)
dedupe:
  partition_by:
    - account_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "account_id IS NOT NULL"
  - "account_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - account_id
      - glynac_organization_id
    severity: error
