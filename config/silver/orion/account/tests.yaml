# ============================================================
# DATA QUALITY TESTS: SILVER.ORION_ACCOUNT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(account_id IS NULL) as null_account_id,
        countIf(account_id = '') as empty_account_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(account_status IS NULL) as null_account_status,
        countIf(account_status = '') as empty_account_status,
        countIf(processing_date IS NULL) as null_processing_date
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_account_id: 0
      empty_account_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_account_status: 0
      empty_account_status: 0
      null_processing_date: 0
  
  - name: account_id_unique_per_org_per_partition
    type: uniqueness
    description: "account_id should be unique per org per processing_date (after dedup)"
    severity: error
    query: |
      SELECT account_id, glynac_organization_id, processing_date, count() as cnt
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY account_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_accounts_exist_in_bronze
    type: referential_integrity
    description: "All Silver accounts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_accounts
      FROM orion_silver.account s
      LEFT JOIN orion.account_raw b
        ON s.account_id = b.account_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.account_id IS NULL
    expect:
      orphaned_accounts: 0
  
  - name: valid_account_status_values
    type: accepted_values
    description: "account_status must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND account_status NOT IN ('active', 'inactive', 'suspended', 'trial')
    expect:
      invalid_count: 0
  
  - name: max_users_positive
    type: assertion
    description: "max_users should be positive"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND max_users <= 0
    expect:
      invalid_count: 0
  
  - name: current_users_non_negative
    type: assertion
    description: "current_users should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND current_users < 0
    expect:
      invalid_count: 0
  
  - name: current_users_not_exceed_max
    type: assertion
    description: "current_users should not exceed max_users"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND current_users > max_users
    expect:
      invalid_count: 0
  
  - name: valid_email_format
    type: assertion
    description: "Email should contain @ and . when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND email != ''
        AND (email NOT LIKE '%@%.%')
    expect:
      invalid_count: 0
  
  - name: valid_domain_format
    type: assertion
    description: "Domain should contain at least one dot when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND domain != ''
        AND domain NOT LIKE '%.%'
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date > now()
    expect:
      invalid_count: 0
  
  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0
  
  - name: account_name_not_empty
    type: assertion
    description: "Account name should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.account
      WHERE processing_date = toDate('{{ ds }}')
        AND (account_name IS NULL OR account_name = '')
    expect:
      invalid_count: 0