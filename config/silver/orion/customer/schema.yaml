version: "1.0"
layer: silver
database: orion_silver
table: customer


metadata:
  display_name: "Orion Customers (Cleaned)"
  description: |
    Cleaned and transformed Orion customer data from Bronze layer.
    Represents business customers/clients with company information,
    contact details, and relationship management data.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - customer
    - crm
    - business
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - company_name
    - phone
    - email
    - annual_revenue
  update_frequency: hourly
  retention_days: 2555  # ~7 years
  upstream_dependencies:
    - orion.customer_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - customer_id
  primary_key:
    - customer_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: customer_status_idx
      expression: customer_status
      type: set
      granularity: 4
    - name: customer_type_idx
      expression: customer_type
      type: set
      granularity: 4
    - name: customer_segment_idx
      expression: customer_segment
      type: set
      granularity: 4
    - name: industry_idx
      expression: industry
      type: set
      granularity: 4

columns:
  - name: customer_id
    type: String
    nullable: false
    description: "Unique customer identifier (primary key)"
    primary_key: true
    example: "cust-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-xyz789"
    
  # Customer classification
  - name: customer_type
    type: String
    nullable: false
    description: "Type of customer (enterprise, SMB, etc.)"
    example: "enterprise"
    
  - name: customer_segment
    type: String
    nullable: false
    description: "Customer segment classification"
    example: "strategic"
    
  - name: customer_status
    type: String
    nullable: false
    description: "Current customer status"
    example: "active"
    
  # Company information (PII)
  - name: company_name
    type: String
    nullable: false
    description: "Company name"
    pii: true
    example: "Acme Corporation"
    
  - name: industry
    type: String
    nullable: false
    description: "Industry classification"
    example: "Technology"
    
  - name: company_size
    type: String
    nullable: false
    description: "Company size category"
    example: "51-200"
    
  - name: annual_revenue
    type: Int64
    nullable: false
    description: "Annual revenue amount"
    pii: true
    example: 5000000
    
  # Contact information (PII)
  - name: website
    type: String
    nullable: false
    description: "Company website URL"
    example: "https://www.acme.com"
    
  - name: phone
    type: String
    nullable: false
    description: "Primary phone number"
    pii: true
    example: "+1-555-0100"
    
  - name: email
    type: String
    nullable: false
    description: "Primary email address"
    pii: true
    example: "contact@acme.com"
    
  # Relationship management
  - name: customer_since
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date when customer relationship started"
    example: "2023-06-15 00:00:00.000"
    
  - name: account_manager_id
    type: String
    nullable: false
    description: "ID of assigned account manager"
    example: "usr-def456"
    
  - name: source
    type: String
    nullable: false
    description: "Customer acquisition source"
    example: "direct_sales"
    
  # Dates
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Record creation date"
    example: "2023-06-15 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-05 14:20:00.000"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-05"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-05 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-05 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.customer_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-05 14:30:22.123"