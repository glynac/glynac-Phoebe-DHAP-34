# Silver Layer - Orion Customer (AUTO MODE)
# Schema inferred from Bronze: orion.customer_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Orion customer data from Bronze to Silver"
  tags: ["silver", "orion", "customer", "auto-mode"]

source:
  database: orion
  table: customer_raw

target:
  database: orion_silver
  table: customer

# Transform overrides (only columns needing special handling)
transforms:
  # Status normalization
  customer_status:
    target: status_normalized
    transform: normalize_status

  # String cleaning
  first_name:
    transform: clean_string

  last_name:
    transform: clean_string

  full_name:
    transform: clean_string

  company_name:
    transform: clean_string

  customer_type:
    transform: clean_string

  # Contact info
  email:
    transform: clean_email

  phone:
    transform: clean_phone

  mobile_phone:
    transform: clean_phone

  # Address
  address:
    transform: clean_string

  city:
    transform: clean_string

  state:
    transform: clean_string

  zip_code:
    transform: clean_string

  country:
    transform: clean_string

  # Dates
  date_of_birth:
    transform: parse_date

  created_at:
    transform: parse_date

  updated_at:
    transform: parse_date

# Deduplication (Orion uses customer_id, not rec_id)
dedupe:
  partition_by:
    - customer_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "customer_id IS NOT NULL"
  - "customer_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - customer_id
      - glynac_organization_id
    severity: error
