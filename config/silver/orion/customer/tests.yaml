    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND annual_revenue < 0
    expect:
      invalid_count: 0
  
  - name: account_manager_not_empty
    type: assertion
    description: "Account manager ID should not be empty"
    severity: warning
    query: |
      SELECT count() as invalid_count
