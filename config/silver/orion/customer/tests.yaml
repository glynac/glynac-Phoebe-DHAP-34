    expect:
      invalid_count: 0
  
  - name: customer_since_not_future
    type: assertion
    description: "Customer since date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND customer_since > now()
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
