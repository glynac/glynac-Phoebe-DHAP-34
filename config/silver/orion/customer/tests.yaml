    expect:
      invalid_count: 0
  
  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0
  
  - name: customer_since_after_created
    type: assertion
    description: "Customer since should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND customer_since IS NOT NULL
        AND customer_since < created_date
    expect:
      invalid_count: 0
  
  - name: customer_status_not_empty
    type: assertion
    description: "Customer status should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND (customer_status IS NULL OR customer_status = '')
    expect:
      invalid_count: 0
  
  - name: valid_website_format
    type: assertion
    description: "Website should contain dot when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.customer
      WHERE processing_date = toDate('{{ ds }}')
        AND website != ''
        AND website NOT LIKE '%.%'
    expect:
      invalid_count: 0