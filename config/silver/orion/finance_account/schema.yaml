version: "1.0"
layer: silver
database: orion_silver
table: finance_account


metadata:
  display_name: "Orion Finance Accounts (Cleaned)"
  description: |
    Cleaned and transformed Orion financial account data from Bronze layer.
    Represents banking and financial accounts with balance information,
    institution details, and account settings.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - finance_account
    - financial
    - banking
    - accounts
    - silver
    - pii
  data_classification: highly_confidential
  contains_pii: true
  pii_columns:
    - account_number
    - routing_number
    - balance
    - available_balance
    - pending_balance
    - institution
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - orion.finance_account_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - finance_account_id
  primary_key:
    - finance_account_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: account_status_idx
      expression: account_status
      type: set
      granularity: 4
    - name: account_type_idx
      expression: account_type
      type: set
      granularity: 4
    - name: currency_idx
      expression: currency
      type: set
      granularity: 4
    - name: customer_id_idx
      expression: customer_id
      type: minmax
      granularity: 2

columns:
  - name: finance_account_id
    type: String
    nullable: false
    description: "Unique financial account identifier (primary key)"
    primary_key: true
    example: "fin-acc-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-xyz789"
    
  # Account identifiers
  - name: account_number
    type: String
    nullable: false
    description: "Full account number"
    pii: true
    example: "1234567890"
    
  - name: account_number_masked
    type: String
    nullable: false
    description: "Masked account number for display"
    example: "****7890"
    
  - name: account_name
    type: String
    nullable: false
    description: "Account name/description"
    example: "Main Checking Account"
    
  # Account classification
  - name: account_type
    type: String
    nullable: false
    description: "Type of financial account"
    example: "checking"
    
  - name: category
    type: String
    nullable: false
    description: "Account category"
    example: "cash"
    
  - name: account_status
    type: String
    nullable: false
    description: "Current account status"
    example: "active"
    
  # Financial details
  - name: currency
    type: String
    nullable: false
    description: "Account currency code"
    example: "USD"
    
  - name: balance
    type: Decimal(15, 2)
    nullable: false
    description: "Current account balance"
    pii: true
    example: 15000.50
    
  - name: available_balance
    type: Decimal(15, 2)
    nullable: false
    description: "Available balance for withdrawal"
    pii: true
    example: 14500.50
    
  - name: pending_balance
    type: Decimal(15, 2)
    nullable: false
    description: "Pending transaction balance"
    pii: true
    example: 500.00
    
  - name: interest_rate
    type: Decimal(8, 4)
    nullable: false
    description: "Interest rate as decimal"
    example: 2.5000
    
  # Relationships
  - name: account_id
    type: String
    nullable: false
    description: "Reference to parent Orion account"
    example: "acc-def456"
    
  - name: organization_id
    type: String
    nullable: false
    description: "Organization identifier"
    example: "org-ghi789"
    
  - name: owner_user_id
    type: String
    nullable: false
    description: "User ID of account owner"
    example: "usr-jkl012"
    
  - name: customer_id
    type: String
    nullable: false
    description: "Customer/client identifier"
    example: "cust-mno345"
    
  # Institution details (PII)
  - name: institution
    type: String
    nullable: false
    description: "Financial institution name"
    pii: true
    example: "Chase Bank"
    
  - name: routing_number
    type: String
    nullable: false
    description: "Bank routing number"
    pii: true
    example: "021000021"
    
  # Settings
  - name: settings
    type: String
    nullable: false
    description: "Account settings"
    example: '{"alerts":true,"overdraft_protection":false}'
    
  # Dates
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Account creation date"
    example: "2024-01-15 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-05 14:20:00.000"
    
  - name: last_activity
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last account activity timestamp"
    example: "2025-01-05 09:15:30.000"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-05"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-05 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-05 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.finance_account_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-05 14:30:22.123"