version: "1.0"
layer: silver
database: orion_silver
table: role


metadata:
  display_name: "Orion Roles (Cleaned)"
  description: |
    Cleaned and transformed Orion role data from Bronze layer.
    Represents user roles with permissions, access control,
    and organizational assignments.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - role
    - permissions
    - access_control
    - security
    - silver
  data_classification: confidential
  contains_pii: false
  update_frequency: hourly
  retention_days: 2555  # ~7 years
  upstream_dependencies:
    - orion.role_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - role_id
  primary_key:
    - role_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: role_status_idx
      expression: role_status
      type: set
      granularity: 4
    - name: role_type_idx
      expression: role_type
      type: set
      granularity: 4
    - name: is_system_role_idx
      expression: is_system_role
      type: set
      granularity: 4
    - name: organization_id_idx
      expression: organization_id
      type: minmax
      granularity: 2

columns:
  - name: role_id
    type: String
    nullable: false
    description: "Unique role identifier (primary key)"
    primary_key: true
    example: "role-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation (primary key)"
    example: "org-xyz789"
    
  # Role classification
  - name: role_type
    type: String
    nullable: false
    description: "Type of role"
    example: "custom"
    
  - name: role_status
    type: String
    nullable: false
    description: "Current role status"
    example: "active"
    
  - name: is_system_role
    type: UInt8
    nullable: false
    description: "Whether this is a system-defined role"
    allowed_values: [0, 1]
    example: 0
    
  # Role details
  - name: role_name
    type: String
    nullable: false
    description: "Role name"
    example: "account_manager"
    
  - name: display_name
    type: String
    nullable: false
    description: "Display name for role"
    example: "Account Manager"
    
  - name: description
    type: String
    nullable: false
    description: "Role description"
    example: "Manages client accounts and relationships"
    
  # Relationships
  - name: organization_id
    type: String
    nullable: false
    description: "Organization identifier"
    example: "org-def456"
    
  # Permissions
  - name: permissions
    type: String
    nullable: false
    description: "Role permissions"
    example: '["read_accounts","write_accounts","read_contacts"]'
    
  # Dates
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Role creation date"
    example: "2024-01-15 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-13 14:20:00.000"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-13"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-13 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-13 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.role_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-13 14:30:22.123"