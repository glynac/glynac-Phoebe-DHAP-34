# ============================================================
# DATA QUALITY TESTS: SILVER.ORION_ROLE
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(role_id IS NULL) as null_role_id,
        countIf(role_id = '') as empty_role_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(role_status IS NULL) as null_role_status,
        countIf(role_status = '') as empty_role_status,
        countIf(processing_date IS NULL) as null_processing_date
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_role_id: 0
      empty_role_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_role_status: 0
      empty_role_status: 0
      null_processing_date: 0
  
  - name: role_id_unique_per_org_per_partition
    type: uniqueness
    description: "role_id should be unique per org per processing_date"
    severity: error
    query: |
      SELECT role_id, glynac_organization_id, processing_date, count() as cnt
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY role_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_roles_exist_in_bronze
    type: referential_integrity
    description: "All Silver roles should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_roles
      FROM orion_silver.role s
      LEFT JOIN orion.role_raw b
        ON s.role_id = b.role_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.role_id IS NULL
    expect:
      orphaned_roles: 0
  
  - name: valid_is_system_role_values
    type: accepted_values
    description: "is_system_role must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND is_system_role NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: role_name_not_empty
    type: assertion
    description: "Role name should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND (role_name IS NULL OR role_name = '')
    expect:
      invalid_count: 0
  
  - name: display_name_not_empty
    type: assertion
    description: "Display name should not be empty"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND (display_name IS NULL OR display_name = '')
    expect:
      invalid_count: 0
  
  - name: role_type_not_empty
    type: assertion
    description: "Role type should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND (role_type IS NULL OR role_type = '')
    expect:
      invalid_count: 0
  
  - name: organization_id_not_empty
    type: assertion
    description: "Organization ID should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND (organization_id IS NULL OR organization_id = '')
    expect:
      invalid_count: 0
  
  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date > now()
    expect:
      invalid_count: 0
  
  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0
  
  - name: active_roles_have_permissions
    type: assertion
    description: "Active roles should have permissions defined"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.role
      WHERE processing_date = toDate('{{ ds }}')
        AND role_status = 'active'
        AND (permissions IS NULL OR permissions = '' OR permissions = '[]')
    expect:
      invalid_count: 0