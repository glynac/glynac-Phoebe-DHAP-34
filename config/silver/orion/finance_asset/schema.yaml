version: "1.0"
layer: silver
database: orion_silver
table: finance_asset


metadata:
  display_name: "Orion Finance Assets (Cleaned)"
  description: |
    Cleaned and transformed Orion financial asset/security data from Bronze layer.
    Represents investment securities including stocks, bonds, ETFs, mutual funds
    with pricing, market data, and classification information.
  
  owner: ai-team
  domain: orion
  tags:
    - orion
    - finance_asset
    - securities
    - investments
    - market_data
    - financial
    - silver
  data_classification: confidential
  contains_pii: false
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - orion.finance_asset_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - glynac_organization_id
    - asset_record_id
  primary_key:
    - asset_record_id
    - glynac_organization_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: symbol_idx
      expression: symbol
      type: minmax
      granularity: 2
    - name: asset_class_idx
      expression: asset_class
      type: set
      granularity: 4
    - name: asset_type_idx
      expression: asset_type
      type: set
      granularity: 4
    - name: exchange_idx
      expression: exchange
      type: set
      granularity: 4
    - name: sector_idx
      expression: sector
      type: set
      granularity: 4

columns:
  - name: asset_record_id
    type: String
    nullable: false
    description: "Unique asset record identifier (primary key)"
    primary_key: true
    example: "asset-rec-abc123"
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-xyz789"
    
  # Record classification
  - name: asset_record_type
    type: String
    nullable: false
    description: "Type of asset record"
    example: "security"
    
  - name: asset_id
    type: String
    nullable: false
    description: "Asset identifier"
    example: "asset-def456"
    
  # Basic identifiers
  - name: symbol
    type: String
    nullable: false
    description: "Trading symbol/ticker"
    example: "AAPL"
    
  - name: name
    type: String
    nullable: false
    description: "Full name of the asset/security"
    example: "Apple Inc."
    
  # Classification
  - name: asset_class
    type: String
    nullable: false
    description: "Asset class (equity, fixed income, etc.)"
    example: "equity"
    
  - name: asset_subclass
    type: String
    nullable: false
    description: "Asset subclass"
    example: "common_stock"
    
  - name: asset_type
    type: String
    nullable: false
    description: "Specific asset type"
    example: "stock"
    
  # Pricing information
  - name: current_price
    type: Decimal(15, 4)
    nullable: false
    description: "Current market price (converted from float)"
    example: 175.5000
    
  - name: price_currency
    type: String
    nullable: false
    description: "Currency of the price"
    example: "USD"
    
  - name: exchange
    type: String
    nullable: false
    description: "Exchange where asset is traded"
    example: "NASDAQ"
    
  # Company/issuer information
  - name: sector
    type: String
    nullable: false
    description: "Business sector"
    example: "Technology"
    
  - name: industry
    type: String
    nullable: false
    description: "Industry classification"
    example: "Consumer Electronics"
    
  - name: country
    type: String
    nullable: false
    description: "Country of domicile"
    example: "USA"
    
  - name: issuer
    type: String
    nullable: false
    description: "Issuer name"
    example: "Apple Inc."
    
  # Market metrics (for equities)
  - name: market_cap
    type: Decimal(20, 2)
    nullable: false
    description: "Market capitalization (converted from float)"
    example: 2750000000000.00
    
  - name: pe_ratio
    type: Decimal(10, 2)
    nullable: false
    description: "Price-to-earnings ratio (converted from float)"
    example: 28.50
    
  - name: dividend_yield
    type: Decimal(8, 4)
    nullable: false
    description: "Dividend yield as percentage (converted from float)"
    example: 0.5500
    
  - name: beta
    type: Decimal(8, 4)
    nullable: false
    description: "Beta coefficient (volatility measure, converted from float)"
    example: 1.2500
    
  - name: fifty_two_week_high
    type: Decimal(15, 4)
    nullable: false
    description: "52-week high price (converted from float)"
    example: 199.6200
    
  - name: fifty_two_week_low
    type: Decimal(15, 4)
    nullable: false
    description: "52-week low price (converted from float)"
    example: 124.1700
    
  # Bond-specific fields
  - name: maturity_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Maturity date for bonds"
    example: "2030-12-31 00:00:00.000"
    
  - name: coupon_rate
    type: Decimal(8, 4)
    nullable: false
    description: "Coupon rate for bonds as percentage (converted from float)"
    example: 3.7500
    
  # Metadata
  - name: tags
    type: String
    nullable: false
    description: "Classification tags (comma-separated or JSON)"
    example: "blue_chip,large_cap,tech"
    
  - name: description
    type: String
    nullable: false
    description: "Asset description"
    example: "Leading technology company manufacturing consumer electronics"
    
  # Dates
  - name: created_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Record creation date"
    example: "2024-01-15 10:30:00.000"
    
  - name: modified_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Last modification date"
    example: "2025-01-05 14:20:00.000"
    
  # Batch metadata
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-01-05"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when data was processed"
    example: "2025-01-05 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-01-05 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "orion.finance_asset_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-01-05 14:30:22.123"