# ============================================================
# DATA QUALITY TESTS: SILVER.ORION_USER
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(user_id IS NULL) as null_user_id,
        countIf(user_id = '') as empty_user_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_timestamp IS NULL) as null_processing_ts,
        countIf(processing_date IS NULL) as null_processing_date
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_user_id: 0
      empty_user_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_ts: 0
      null_processing_date: 0

  - name: user_id_unique_per_org_per_partition
    type: uniqueness
    description: "user_id should be unique per org per processing_date"
    severity: error
    query: |
      SELECT user_id, glynac_organization_id, processing_date, count() as cnt
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY user_id, glynac_organization_id, processing_date
      HAVING cnt > 1
    expect_empty: true

  - name: all_users_exist_in_bronze
    type: referential_integrity
    description: "All Silver users should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_users
      FROM orion_silver.user s
      LEFT JOIN orion.user_raw b
        ON s.user_id = b.user_id
        AND s.glynac_organization_id = b.glynac_organization_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.user_id IS NULL
    expect:
      orphaned_users: 0

  - name: valid_email_format
    type: assertion
    description: "Email should contain @ and . when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND email != ''
        AND (email NOT LIKE '%@%.%')
    expect:
      invalid_count: 0

  - name: user_status_values
    type: accepted_values
    description: "user_status must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND user_status NOT IN ('active', 'inactive', 'suspended')
    expect:
      invalid_count: 0

  - name: is_active_boolean
    type: assertion
    description: "is_active should be boolean (true/false)"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND is_active NOT IN (0,1)
    expect:
      invalid_count: 0

  - name: created_date_not_future
    type: assertion
    description: "Created date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date > now()
    expect:
      invalid_count: 0

  - name: modified_date_after_created
    type: assertion
    description: "Modified date should be after or equal to created date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND created_date IS NOT NULL
        AND modified_date IS NOT NULL
        AND modified_date < created_date
    expect:
      invalid_count: 0

  - name: username_not_empty
    type: assertion
    description: "Username should not be empty"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM orion_silver.user
      WHERE processing_date = toDate('{{ ds }}')
        AND (username IS NULL OR username = '')
    expect:
      invalid_count: 0
