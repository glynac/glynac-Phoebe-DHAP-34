# Silver Layer - Orion Transaction (AUTO MODE)
# Schema inferred from Bronze: orion.transaction_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Orion transaction data from Bronze to Silver"
  tags: ["silver", "orion", "transaction", "auto-mode"]

source:
  database: orion
  table: transaction_raw

target:
  database: orion_silver
  table: transaction

# Transform overrides (only columns needing special handling)
transforms:
  # Status normalization
  transaction_status:
    target: status_normalized
    transform: normalize_status

  # String cleaning
  transaction_type:
    transform: clean_string

  description:
    transform: clean_string

  category:
    transform: clean_string

  subcategory:
    transform: clean_string

  reference_number:
    transform: clean_string

  memo:
    transform: clean_string

  # Money fields
  amount:
    transform: parse_money

  fee:
    transform: parse_money

  tax:
    transform: parse_money

  net_amount:
    transform: parse_money

  balance_after:
    transform: parse_money

  # Dates
  transaction_date:
    transform: parse_date

  settlement_date:
    transform: parse_date

  created_at:
    transform: parse_date

  updated_at:
    transform: parse_date

# Deduplication (Orion uses transaction_id, not rec_id)
dedupe:
  partition_by:
    - transaction_id
    - processing_date
  order_by:
    - processing_timestamp DESC

# Filters
filters:
  - "transaction_id IS NOT NULL"
  - "transaction_id != ''"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - transaction_id
      - glynac_organization_id
    severity: error
