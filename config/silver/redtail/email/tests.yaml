    expect:
      invalid_count: 0
  
  - name: clicks_require_opens
    type: assertion
    description: "Click count should not exceed open count"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND click_count > open_count
    expect:
      invalid_count: 0
  
  - name: attachments_count_non_negative
    type: assertion
    description: "Attachments count should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND attachments_count < 0
    expect:
      invalid_count: 0
  
  - name: has_attachments_consistency
    type: assertion
    description: "has_attachments should be true when attachments_count > 0"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND attachments_count > 0
        AND has_attachments = false
    expect:
      invalid_count: 0
  
  - name: attachments_count_reasonable
    type: assertion
    description: "Attachments count should be reasonable (< 50)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND attachments_count > 50
    expect:
      invalid_count: 0
  
  - name: subject_present_for_sent
    type: assertion
    description: "Sent emails should have a subject"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized IN ('sent', 'delivered')
        AND subject = ''
    expect:
      invalid_count: 0
  
  - name: body_present_for_sent
    type: assertion
    description: "Sent emails should have body content (text or HTML)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized IN ('sent', 'delivered')
        AND body_text = ''
        AND body_html = ''
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: bounced_emails_not_read
    type: assertion
    description: "Bounced emails should not be marked as read"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'bounced'
        AND is_read = true
    expect:
      invalid_count: 0
  
  - name: draft_emails_not_sent
    type: assertion
    description: "Draft emails should not have sent_date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_email
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'draft'
        AND sent_date IS NOT NULL
    expect:
      invalid_count: 0