# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_CALL
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(call_id IS NULL) as null_call_id,
        countIf(call_id = 0) as zero_call_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date,
        countIf(contact_id = 0) as zero_contact_id,
        countIf(user_id = 0) as zero_user_id
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_call_id: 0
      zero_call_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
      zero_contact_id: 0
      zero_user_id: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: call_id_unique_per_partition
    type: uniqueness
    description: "call_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT call_id, processing_date, count() as cnt
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY call_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_calls_exist_in_bronze
    type: referential_integrity
    description: "All Silver calls should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_calls
      FROM silver.redtail_call s
      LEFT JOIN redtail.call_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = toDate(b.processing_timestamp)
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_calls: 0
  
  - name: duration_consistency
    type: assertion
    description: "Duration in minutes should match seconds (allowing rounding)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND abs(duration_minutes - (duration_seconds / 60)) > 1
    expect:
      invalid_count: 0
  
  - name: duration_non_negative
    type: assertion
    description: "Call duration should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND (duration_seconds < 0 OR duration_minutes < 0)
    expect:
      invalid_count: 0
  
  - name: duration_reasonable
    type: assertion
    description: "Call duration should be reasonable (< 8 hours)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND duration_seconds > 28800  -- 8 hours
    expect:
      invalid_count: 0
  
  - name: call_date_not_future
    type: assertion
    description: "Call date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND call_date > now()
    expect:
      invalid_count: 0
  
  - name: call_date_reasonable
    type: assertion
    description: "Call date should be reasonable (within last 10 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND call_date IS NOT NULL
        AND call_date < now() - INTERVAL 10 YEAR
    expect:
      invalid_count: 0
  
  - name: follow_up_date_not_past
    type: assertion
    description: "Follow-up date should not be in the past when follow-up required"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND follow_up_required = 1
        AND follow_up_date IS NOT NULL
        AND follow_up_date < now()
    expect:
      invalid_count: 0
  
  - name: follow_up_date_when_required
    type: assertion
    description: "When follow-up required, should have follow-up date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND follow_up_required = 1
        AND (follow_up_date IS NULL OR follow_up_date = toDateTime64('1970-01-01', 3))
    expect:
      invalid_count: 0
  
  - name: recording_url_when_has_recording
    type: assertion
    description: "When has_recording=1, should have recording_url"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND has_recording = 1
        AND recording_url = ''
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: valid_call_types
    type: accepted_values
    description: "Call type should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND call_type != ''
        AND call_type NOT IN ('Inbound', 'Outbound', 'Missed', 'Internal', 'Transferred')
    expect:
      invalid_count: 0
  
  - name: valid_call_status
    type: accepted_values
    description: "Call status should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND call_status != ''
        AND call_status NOT IN ('Completed', 'Scheduled', 'Cancelled', 'No Answer', 'Voicemail', 'Busy')
    expect:
      invalid_count: 0
  
  - name: phone_number_format_valid
    type: assertion
    description: "Phone number should have reasonable length when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_call
      WHERE processing_date = toDate('{{ ds }}')
        AND phone_number != ''
        AND (length(phone_number) < 7 OR length(phone_number) > 20)
    expect:
      invalid_count: 0