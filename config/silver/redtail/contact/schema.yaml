version: "1.0"
layer: silver
database: redtail_silver
table: contacts

metadata:
  display_name: "Redtail Contacts (Cleaned)"
  description: |
    Cleaned and transformed Redtail contact records from Bronze layer.
    Contains individual and company contact information including personal details,
    contact methods, employment information, and contact status.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - contacts
    - clients
    - individuals
    - silver
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - first_name
    - last_name
    - full_name
    - email
    - phone
    - phone_2
    - mobile
    - work_phone
    - home_phone
    - fax
    - address_line1
    - city
    - state
    - zip_code
    - date_of_birth
  update_frequency: daily
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.contact_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - contact_id
  primary_key:
    - contact_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192
  indexes:
    - name: contact_id_idx
      expression: contact_id
      type: bloom_filter
      granularity: 1
    - name: glynac_organization_id_idx
      expression: glynac_organization_id
      type: bloom_filter
      granularity: 1

columns:
  - name: contact_id
    type: Int64
    nullable: false
    description: "Redtail contact ID (primary key)"
    primary_key: true
    example: 12345678
    
  - name: rec_id
    type: Nullable(Int64)
    nullable: true
    description: "Record ID"
    example: 87654321
    
  - name: first_name
    type: String
    nullable: false
    description: "Contact first name"
    pii: true
    example: "John"
    
  - name: last_name
    type: String
    nullable: false
    description: "Contact last name"
    pii: true
    example: "Smith"
    
  - name: full_name
    type: String
    nullable: false
    description: "Full contact name"
    pii: true
    example: "John Smith"
    
  - name: prefix
    type: String
    nullable: false
    description: "Name prefix (Mr., Mrs., Dr., etc.)"
    example: "Mr."
    
  - name: email
    type: String
    nullable: false
    description: "Primary email address"
    pii: true
    example: "john.smith@example.com"
    
  - name: phone_number
    type: String
    nullable: false
    description: "Primary phone number"
    pii: true
    example: "555-123-4567"
    
  - name: phone_number2
    type: String
    nullable: false
    description: "Secondary phone number"
    pii: true
    example: "555-987-6543"
    
  - name: mobile_phone
    type: String
    nullable: false
    description: "Mobile phone number"
    pii: true
    example: "555-111-2222"
    
  - name: work_phone
    type: String
    nullable: false
    description: "Work phone number"
    pii: true
    example: "555-333-4444"
    
  - name: home_phone
    type: String
    nullable: false
    description: "Home phone number"
    pii: true
    example: "555-555-6666"
    
  - name: fax_number
    type: String
    nullable: false
    description: "Fax number"
    pii: true
    example: "555-777-8888"
    
  - name: address1
    type: String
    nullable: false
    description: "Street address"
    pii: true
    example: "123 Main Street"
    
  - name: city
    type: String
    nullable: false
    description: "City"
    pii: true
    example: "San Francisco"
    
  - name: state
    type: String
    nullable: false
    description: "State/province"
    example: "CA"
    
  - name: zip_code
    type: String
    nullable: false
    description: "Postal/ZIP code"
    pii: true
    example: "94105"
    
  - name: country
    type: String
    nullable: false
    description: "Country"
    example: "USA"
    
  - name: date_of_birth
    type: Nullable(Date)
    nullable: true
    description: "Date of birth"
    pii: true
    example: "1980-05-15"
    
  - name: gender
    type: String
    nullable: false
    description: "Gender"
    example: "Male"
    
  - name: marital_status
    type: String
    nullable: false
    description: "Marital status"
    example: "Married"
    
  - name: occupation
    type: String
    nullable: false
    description: "Occupation"
    example: "Software Engineer"
    
  - name: company_name
    type: String
    nullable: false
    description: "Employer/company name"
    example: "Tech Corp"
    
  - name: job_title
    type: String
    nullable: false
    description: "Job title"
    example: "Senior Engineer"
    
  - name: contact_type
    type: String
    nullable: false
    description: "Contact classification type"
    example: "Client"
    
  - name: contact_status
    type: String
    nullable: false
    description: "Current status of contact"
    example: "Active"
    
  - name: assigned_to
    type: Nullable(Int64)
    nullable: true
    description: "User ID contact is assigned to"
    example: 1001
    
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Record creation timestamp"
    example: "2024-01-15 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Record last edit timestamp"
    example: "2024-11-18 14:22:00.000"
    
  - name: scan_id
    type: String
    nullable: false
    description: "Scan batch identifier"
    example: "scan_20241118_001"
    
  - name: batch_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Batch processing timestamp"
    example: "2024-11-18 12:00:00.000"
    
  - name: batch_number
    type: Nullable(Int64)
    nullable: true
    description: "Batch sequence number"
    example: 42
    
  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-18"
    
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-18 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.contact_raw"
    
  - name: _source_timestamp
    type: Date
    nullable: false
    description: "Source processing date"
    system_column: true
    example: "2025-11-18"