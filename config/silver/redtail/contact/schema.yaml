version: "1.0"
layer: silver
database: redtail_silver
table: contact


metadata:
  display_name: "Redtail Contacts (Cleaned)"
  description: |
    Cleaned and transformed Redtail contact data from Bronze layer.
    Represents all contacts including clients, prospects, leads, and general contacts
    with personal, professional, and contact information.
  
  owner: data-engineering
  domain: redtail
  tags:
    - redtail
    - contacts
    - clients
    - crm
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - first_name
    - last_name
    - full_name
    - email
    - phone
    - phone_2
    - mobile
    - work_phone
    - home_phone
    - fax
    - address_line1
    - city
    - state
    - zip_code
    - date_of_birth
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.contact_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: email_idx
      expression: email
      type: bloom_filter
      granularity: 1
    - name: contact_type_idx
      expression: contact_type
      type: set
      granularity: 4
    - name: status_idx
      expression: status
      type: set
      granularity: 4

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Name fields
  - name: first_name
    type: String
    nullable: false
    description: "Contact's first name (trimmed)"
    pii: true
    example: "John"
    
  - name: last_name
    type: String
    nullable: false
    description: "Contact's last name (trimmed)"
    pii: true
    example: "Doe"
    
  - name: full_name
    type: String
    nullable: false
    description: "Contact's full name (trimmed)"
    pii: true
    example: "John Doe"
    
  - name: salutation
    type: String
    nullable: false
    description: "Name prefix/salutation (Mr., Mrs., Dr., etc.) (trimmed)"
    example: "Mr."
    
  # Contact information
  - name: email
    type: String
    nullable: false
    description: "Primary email address (trimmed)"
    pii: true
    example: "john.doe@example.com"
    
  # Phone numbers
  - name: phone
    type: String
    nullable: false
    description: "Primary phone number (trimmed)"
    pii: true
    example: "555-123-4567"
    
  - name: phone_2
    type: String
    nullable: false
    description: "Secondary phone number (trimmed)"
    pii: true
    example: "555-987-6543"
    
  - name: mobile
    type: String
    nullable: false
    description: "Mobile phone number (trimmed)"
    pii: true
    example: "555-111-2222"
    
  - name: work_phone
    type: String
    nullable: false
    description: "Work phone number (trimmed)"
    pii: true
    example: "555-333-4444"
    
  - name: home_phone
    type: String
    nullable: false
    description: "Home phone number (trimmed)"
    pii: true
    example: "555-555-6666"
    
  - name: fax
    type: String
    nullable: false
    description: "Fax number (trimmed)"
    pii: true
    example: "555-777-8888"
    
  # Address information
  - name: address_line1
    type: String
    nullable: false
    description: "Primary address line (trimmed)"
    pii: true
    example: "123 Main Street"
    
  - name: city
    type: String
    nullable: false
    description: "City (trimmed)"
    pii: true
    example: "San Francisco"
    
  - name: state
    type: String
    nullable: false
    description: "State/province (trimmed)"
    pii: true
    example: "CA"
    
  - name: zip_code
    type: String
    nullable: false
    description: "Postal/ZIP code (trimmed)"
    pii: true
    example: "94102"
    
  - name: country
    type: String
    nullable: false
    description: "Country (trimmed, default USA)"
    example: "USA"
    
  # Personal information
  - name: date_of_birth
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date of birth (parsed from string)"
    pii: true
    example: "1980-05-15 00:00:00.000"
    
  - name: gender
    type: String
    nullable: false
    description: "Gender (trimmed)"
    example: "Male"
    
  - name: marital_status
    type: String
    nullable: false
    description: "Marital status (trimmed)"
    example: "Married"
    
  # Professional information
  - name: company
    type: String
    nullable: false
    description: "Company name (trimmed)"
    example: "Acme Corporation"
    
  - name: job_title
    type: String
    nullable: false
    description: "Job title (trimmed)"
    example: "Senior Engineer"
    
  - name: occupation
    type: String
    nullable: false
    description: "Occupation/profession (trimmed)"
    example: "Software Engineer"
    
  # Contact classification
  - name: contact_type
    type: String
    nullable: false
    description: "Type of contact (Contact, Client, Prospect, Lead) (trimmed)"
    example: "Client"
    
  - name: status
    type: String
    nullable: false
    description: "Contact status (trimmed)"
    example: "Active"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized status (active/inactive/archived)"
    allowed_values: [active, inactive, archived]
    example: "active"
    
  # Foreign key
  - name: owner_id
    type: Int32
    nullable: false
    description: "User ID who owns/manages this contact (assigned_to in Bronze)"
    example: 42
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2020-01-15 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-28 14:20:00.000"
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.contact_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"