# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_CONTACT
# ============================================================
# Version: 2.0
# Updated: 2026-01-10
# Changes: Added PII naming convention validation
# ============================================================
version: "1.0"

tests:
  # ========================================
  # BASIC DATA QUALITY CHECKS
  # ========================================

  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0

  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true

  - name: all_contacts_exist_in_bronze
    type: referential_integrity
    description: "All Silver contacts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_contacts
      FROM silver.redtail_contact s
      LEFT JOIN redtail.contact_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_contacts: 0

  - name: name_fields_present
    type: assertion
    description: "At least one name field should be present"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND first_name_hash = ''
        AND last_name_hash = ''
        AND full_name_hash = ''
    expect:
      invalid_count: 0

  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('active', 'inactive', 'archived')
    expect:
      invalid_count: 0

  # ========================================
  # PII NAMING CONVENTION VALIDATION (NEW)
  # ========================================

  - name: email_hash_contains_tokens
    type: assertion
    description: "CRITICAL: email_hash must contain tokens, not raw email addresses"
    severity: error
    query: |
      SELECT count() as raw_email_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND email_hash != ''
        AND email_hash NOT LIKE '%_TOKEN_%'
        AND email_hash LIKE '%@%'
    expect:
      raw_email_count: 0

  - name: name_hashes_contain_tokens
    type: assertion
    description: "CRITICAL: name_hash fields must contain tokens, not raw names"
    severity: error
    query: |
      SELECT count() as raw_name_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (first_name_hash != '' AND first_name_hash NOT LIKE '%_TOKEN_%' AND length(first_name_hash) < 15)
          OR (last_name_hash != '' AND last_name_hash NOT LIKE '%_TOKEN_%' AND length(last_name_hash) < 15)
          OR (full_name_hash != '' AND full_name_hash NOT LIKE '%_TOKEN_%' AND length(full_name_hash) < 15)
        )
    expect:
      raw_name_count: 0

  - name: phone_hashes_contain_tokens
    type: assertion
    description: "CRITICAL: phone_hash fields must contain tokens, not raw phone numbers"
    severity: error
    query: |
      SELECT count() as raw_phone_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (phone_hash != '' AND phone_hash NOT LIKE '%_TOKEN_%' AND match(phone_hash, '^[0-9\-\(\) ]+$'))
          OR (mobile_hash != '' AND mobile_hash NOT LIKE '%_TOKEN_%' AND match(mobile_hash, '^[0-9\-\(\) ]+$'))
          OR (work_phone_hash != '' AND work_phone_hash NOT LIKE '%_TOKEN_%' AND match(work_phone_hash, '^[0-9\-\(\) ]+$'))
        )
    expect:
      raw_phone_count: 0

  - name: address_hashes_contain_tokens
    type: assertion
    description: "CRITICAL: address_hash fields must contain tokens, not raw addresses"
    severity: error
    query: |
      SELECT count() as raw_address_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (address_hash != '' AND address_hash NOT LIKE '%_TOKEN_%' AND length(address_hash) < 20)
          OR (city_hash != '' AND city_hash NOT LIKE '%_TOKEN_%' AND length(city_hash) < 15)
          OR (zip_hash != '' AND zip_hash NOT LIKE '%_TOKEN_%' AND match(zip_hash, '^[0-9\-]+$'))
        )
    expect:
      raw_address_count: 0

  - name: pii_token_format_validation
    type: assertion
    description: "CRITICAL: All *_hash columns with values must contain proper token format"
    severity: error
    query: |
      SELECT count() as invalid_token_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (email_hash != '' AND email_hash NOT LIKE '%TOKEN%')
          OR (first_name_hash != '' AND first_name_hash NOT LIKE '%TOKEN%')
          OR (last_name_hash != '' AND last_name_hash NOT LIKE '%TOKEN%')
          OR (phone_hash != '' AND phone_hash NOT LIKE '%TOKEN%')
          OR (address_hash != '' AND address_hash NOT LIKE '%TOKEN%')
        )
    expect:
      invalid_token_count: 0

  # ========================================
  # BUSINESS LOGIC VALIDATION
  # ========================================

  - name: dob_not_future
    type: assertion
    description: "Date of birth should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND dob_hash > now()
    expect:
      invalid_count: 0

  - name: dob_reasonable
    type: assertion
    description: "Date of birth should be reasonable (not more than 120 years ago)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND dob_hash IS NOT NULL
        AND dob_hash < now() - INTERVAL 120 YEAR
    expect:
      invalid_count: 0

  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0

  - name: valid_contact_types
    type: accepted_values
    description: "Contact type should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_contact
      WHERE processing_date = toDate('{{ ds }}')
        AND contact_type != ''
        AND contact_type NOT IN ('Contact', 'Client', 'Prospect', 'Lead')
    expect:
      invalid_count: 0
