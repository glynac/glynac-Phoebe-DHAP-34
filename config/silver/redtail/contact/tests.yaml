version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(contact_id IS NULL) as null_contact_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_contact_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: contact_id_unique_per_partition
    type: uniqueness
    description: "Contact ID should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT contact_id, processing_date, count() as cnt
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY contact_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_contacts_exist_in_bronze
    type: referential_integrity
    description: "All Silver contacts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_contacts
      FROM redtail_silver.contact s
      LEFT JOIN redtail.contact_raw b
        ON s.contact_id = b.contact_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.contact_id IS NULL
    expect:
      orphaned_contacts: 0
  
  - name: contacts_have_name
    type: assertion
    description: "Contacts should have at least first name or last name or full name"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND first_name = ''
        AND last_name = ''
        AND full_name = ''
    expect:
      invalid_count: 0
  
  - name: email_format_validation
    type: assertion
    description: "Email addresses should be properly formatted when present"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND email != ''
        AND NOT match(email, '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}$')
    expect:
      invalid_count: 0
  
  - name: date_of_birth_not_future
    type: assertion
    description: "Date of birth should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND date_of_birth > today()
    expect:
      invalid_count: 0
  
  - name: date_of_birth_reasonable_range
    type: assertion
    description: "Date of birth should be within reasonable range (18-120 years ago)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND date_of_birth IS NOT NULL
        AND (
          date_of_birth < today() - INTERVAL 120 YEAR
          OR date_of_birth > today() - INTERVAL 18 YEAR
        )
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Record edit timestamp should be after or equal to creation timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: contact_status_values
    type: assertion
    description: "Contact status should be from expected values"
    severity: info
    query: |
      SELECT DISTINCT contact_status, count() as cnt
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
        AND contact_status NOT IN ('Active', 'Inactive', 'Prospect', 'Former Client', '')
      GROUP BY contact_status
    expect_empty: true
  
  - name: pii_data_present
    type: assertion
    description: "Monitor PII field population rates"
    severity: info
    query: |
      SELECT
        countIf(email != '') as has_email,
        countIf(phone_number != '' OR mobile_phone != '' OR home_phone != '') as has_phone,
        countIf(address1 != '') as has_address,
        count() as total_contacts
      FROM redtail_silver.contact
      WHERE processing_date = toDate('{{ ds }}')
    expect_greater_than:
      has_email: 0
      has_phone: 0