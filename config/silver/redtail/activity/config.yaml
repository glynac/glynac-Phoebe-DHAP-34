# Silver Layer - Redtail Activity (AUTO MODE)
# Schema inferred from Bronze: redtail.activity_raw
# Settings inherited from _defaults.yaml unless overridden

version: "1.0"

dag:
  description: "Transform and clean Redtail activity data from Bronze to Silver"
  tags: ["silver", "redtail", "activity", "auto-mode"]

source:
  database: redtail
  table: activity_raw

target:
  database: redtail_silver
  table: activity

# Transform overrides - only specify columns needing special handling
transforms:
  # Normalize activity status
  activity_status:
    target: status_normalized
    transform: normalize_status

  # Clean string fields
  subject:
    transform: clean_string

  description:
    transform: clean_string

  category:
    transform: clean_string

  subcategory:
    transform: clean_string

  outcome:
    transform: clean_string

  location:
    transform: clean_string

  notes:
    transform: clean_string

  tags:
    transform: clean_string

  # Parse dates
  activity_date:
    transform: parse_date

  follow_up_date:
    transform: parse_date

  rec_add:
    transform: parse_date

  rec_edit:
    transform: parse_date

  processing_timestamp:
    transform: parse_date

# Exclude internal fields
exclude:
  - batch_status
  - message_type

# Lookback days
lookback_days: 90

# Deduplication
dedupe:
  partition_by:
    - rec_id
    - processing_date
  order_by:
    - processing_timestamp DESC
    - batch_number DESC

# Filters
filters:
  - "rec_id IS NOT NULL"
  - "rec_id != 0"
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# Tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - rec_id
      - glynac_organization_id
      - activity_id
    severity: error
