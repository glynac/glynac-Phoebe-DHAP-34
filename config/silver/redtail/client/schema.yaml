version: "1.0"
layer: silver
database: redtail_silver
table: client


metadata:
  display_name: "Redtail Clients (Cleaned)"
  description: |
    Cleaned and transformed Redtail client data from Bronze layer.
    Represents all client relationships with classification, service level,
    risk profile, AUM, and important dates for financial advisory firms.
  
  owner: data-engineering
  domain: redtail
  tags:
    - redtail
    - clients
    - crm
    - silver
    - pii
    - financial
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - client_number
    - notes
    - assets_under_management
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.client_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: client_type_idx
      expression: client_type
      type: set
      granularity: 4
    - name: status_idx
      expression: client_status
      type: set
      granularity: 4
    - name: contact_id_idx
      expression: contact_id
      type: bloom_filter
      granularity: 1
    - name: service_level_idx
      expression: service_level
      type: set
      granularity: 4
    - name: risk_profile_idx
      expression: risk_profile
      type: set
      granularity: 4

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Client identifiers
  - name: client_id
    type: Int32
    nullable: false
    description: "Unique client identifier in Redtail"
    example: 98765
    
  - name: contact_id
    type: Int32
    nullable: false
    description: "Foreign key to contact record"
    example: 42
    
  - name: client_number
    type: String
    nullable: false
    description: "Client account/reference number (trimmed)"
    pii: true
    example: "CLT-2025-001"
    
  # Client classification
  - name: client_type
    type: String
    nullable: false
    description: "Type of client relationship (Individual, Joint, Corporate, Trust) (trimmed)"
    example: "Individual"
    
  - name: client_status
    type: String
    nullable: false
    description: "Current status of client relationship (trimmed)"
    example: "Active"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized status (active/inactive/archived/prospect)"
    allowed_values: [active, inactive, archived, prospect]
    example: "active"
    
  # Service details
  - name: service_level
    type: String
    nullable: false
    description: "Service tier/level for client (Premium, Standard, Basic) (trimmed)"
    example: "Premium"
    
  - name: risk_profile
    type: String
    nullable: false
    description: "Risk tolerance profile (Conservative, Moderate, Aggressive) (trimmed)"
    example: "Moderate"
    
  # Financial data
  - name: assets_under_management
    type: Decimal64(2)
    nullable: false
    description: "Total assets under management (parsed from string, currency symbols removed)"
    pii: true
    example: 1500000.00
    
  # Important dates
  - name: onboarding_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date when client was onboarded (parsed from string)"
    example: "2020-03-15 00:00:00.000"
    
  - name: review_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Next scheduled review date (parsed from string)"
    example: "2025-12-15 00:00:00.000"
    
  # Notes
  - name: notes
    type: String
    nullable: false
    description: "Client notes and additional information (trimmed)"
    pii: true
    example: "Prefers quarterly reviews, interested in ESG investments"
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2020-03-15 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-28 14:20:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who created the record"
    example: 7
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 7
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.client_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"