# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_CLIENT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(client_id IS NULL) as null_client_id,
        countIf(client_id = 0) as zero_client_id,
        countIf(contact_id = 0) as zero_contact_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_client_id: 0
      zero_client_id: 0
      zero_contact_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: client_id_unique_per_partition
    type: uniqueness
    description: "client_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT client_id, processing_date, count() as cnt
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY client_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_clients_exist_in_bronze
    type: referential_integrity
    description: "All Silver clients should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_clients
      FROM silver.redtail_client s
      LEFT JOIN redtail.client_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_clients: 0
  
  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('active', 'inactive', 'archived', 'prospect')
    expect:
      invalid_count: 0
  
  - name: aum_non_negative
    type: assertion
    description: "Assets under management should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND aum < 0
    expect:
      invalid_count: 0
  
  - name: aum_reasonable_range
    type: assertion
    description: "AUM should be in reasonable range (< $1 billion per client)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND aum > 1000000000
    expect:
      invalid_count: 0
  
  - name: annual_revenue_non_negative
    type: assertion
    description: "Annual revenue should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND annual_revenue < 0
    expect:
      invalid_count: 0
  
  - name: annual_revenue_reasonable
    type: assertion
    description: "Annual revenue should be reasonable (< 10% of AUM)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND aum > 0
        AND annual_revenue > (aum * 0.1)
    expect:
      invalid_count: 0
  
  - name: client_since_not_future
    type: assertion
    description: "Client since date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND client_since > now()
    expect:
      invalid_count: 0
  
  - name: client_since_reasonable
    type: assertion
    description: "Client since date should be reasonable (within last 50 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND client_since IS NOT NULL
        AND client_since < now() - INTERVAL 50 YEAR
    expect:
      invalid_count: 0
  
  - name: next_review_date_after_client_since
    type: assertion
    description: "Next review date should be after client since date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND client_since IS NOT NULL
        AND next_review_date IS NOT NULL
        AND next_review_date < client_since
    expect:
      invalid_count: 0
  
  - name: next_review_date_reasonable_future
    type: assertion
    description: "Next review date should not be more than 5 years in future"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND next_review_date IS NOT NULL
        AND next_review_date > now() + INTERVAL 5 YEAR
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: valid_service_levels
    type: accepted_values
    description: "Service level should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND service_level != ''
        AND service_level NOT IN ('Premium', 'Standard', 'Basic', 'VIP', 'Executive', 'Elite')
    expect:
      invalid_count: 0
  
  - name: valid_risk_tolerance
    type: accepted_values
    description: "Risk tolerance should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND risk_tolerance != ''
        AND risk_tolerance NOT IN ('Conservative', 'Moderate', 'Aggressive', 'Moderately Conservative', 'Moderately Aggressive')
    expect:
      invalid_count: 0
  
  - name: valid_investment_objectives
    type: accepted_values
    description: "Investment objective should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND investment_objective != ''
        AND investment_objective NOT IN ('Growth', 'Income', 'Preservation', 'Balanced', 'Growth and Income', 'Capital Appreciation', 'Tax Efficiency')
    expect:
      invalid_count: 0
  
  - name: active_clients_have_aum
    type: assertion
    description: "Active clients should typically have AUM > 0"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'active'
        AND is_active = true
        AND aum = 0
    expect:
      invalid_count: 0
  
  - name: is_active_status_consistency
    type: assertion
    description: "is_active flag should match status_normalized"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          (is_active = true AND status_normalized IN ('inactive', 'archived'))
          OR
          (is_active = false AND status_normalized = 'active')
        )
    expect:
      invalid_count: 0
  
  - name: client_number_format_valid
    type: assertion
    description: "Client number should not be empty for active clients"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_client
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'active'
        AND is_active = true
        AND client_number = ''
    expect:
      invalid_count: 0