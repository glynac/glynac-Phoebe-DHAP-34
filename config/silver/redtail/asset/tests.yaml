# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_ASSET
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(account_id IS NULL) as null_account_id,
        countIf(account_id = 0) as zero_account_id,
        countIf(investment_id IS NULL) as null_investment_id,
        countIf(investment_id = 0) as zero_investment_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_account_id: 0
      zero_account_id: 0
      null_investment_id: 0
      zero_investment_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_assets_exist_in_bronze
    type: referential_integrity
    description: "All Silver assets should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_assets
      FROM silver.redtail_asset s
      LEFT JOIN redtail.asset_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_assets: 0
  
  - name: valid_is_active_values
    type: accepted_values
    description: "is_active must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND is_active NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: valid_is_core_position_values
    type: accepted_values
    description: "is_core_position must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND is_core_position NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: quantity_positive
    type: assertion
    description: "Quantity should be positive"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND quantity <= 0
    expect:
      invalid_count: 0
  
  - name: cost_basis_non_negative
    type: assertion
    description: "Cost basis should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND cost_basis < 0
    expect:
      invalid_count: 0
  
  - name: current_value_non_negative
    type: assertion
    description: "Current value should not be negative"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND current_value < 0
    expect:
      invalid_count: 0
  
  - name: allocation_percent_valid_range
    type: assertion
    description: "Allocation percent should be between 0 and 100"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND (allocation_percent < 0 OR allocation_percent > 100)
    expect:
      invalid_count: 0
  
  - name: target_allocation_valid_range
    type: assertion
    description: "Target allocation should be between 0 and 100"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND (target_allocation < 0 OR target_allocation > 100)
    expect:
      invalid_count: 0
  
  - name: purchase_date_not_future
    type: assertion
    description: "Purchase date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND purchase_date > now()
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: gain_loss_calculation_reasonable
    type: assertion
    description: "Unrealized gain/loss should equal current_value - cost_basis (within tolerance)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_asset
      WHERE processing_date = toDate('{{ ds }}')
        AND abs((current_value - cost_basis) - unrealized_gain_loss) > 0.10
    expect:
      invalid_count: 0