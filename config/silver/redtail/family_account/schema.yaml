version: "1.0"
layer: silver
database: redtail_silver
table: family_account


metadata:
  display_name: "Redtail Family Accounts (Cleaned)"
  description: |
    Cleaned and transformed Redtail family account data from Bronze layer.
    Represents family-level account groupings with account numbers, status,
    and total account values for wealth management and family office operations.
  
  owner: ai
  domain: redtail
  tags:
    - redtail
    - family_accounts
    - accounts
    - crm
    - silver
    - pii
    - financial
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - family_name
    - account_number
    - total_value
    - notes
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.family_account_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: family_id_idx
      expression: family_id
      type: bloom_filter
      granularity: 1
    - name: account_status_idx
      expression: account_status
      type: set
      granularity: 4
    - name: family_name_idx
      expression: family_name
      type: bloom_filter
      granularity: 1

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Family account identifiers
  - name: family_id
    type: Int32
    nullable: false
    description: "Unique family identifier"
    example: 98765
    
  - name: family_name
    type: String
    nullable: false
    description: "Family or household name (trimmed)"
    pii: true
    example: "The Smith Family"
    
  - name: account_number
    type: String
    nullable: false
    description: "Account reference number (trimmed)"
    pii: true
    example: "FAM-2025-001"
    
  # Account status
  - name: account_status
    type: String
    nullable: false
    description: "Current status of the family account (trimmed)"
    example: "Active"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized status (active/inactive/closed/suspended)"
    allowed_values: [active, inactive, closed, suspended]
    example: "active"
    
  # Financial data
  - name: total_value
    type: Decimal64(2)
    nullable: false
    description: "Total account value across all family members (parsed from string, currency symbols removed)"
    pii: true
    example: 5000000.00
    
  # Notes
  - name: notes
    type: String
    nullable: false
    description: "Additional notes about the family account (trimmed)"
    pii: true
    example: "Multi-generational wealth planning, quarterly family meetings"
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2020-01-15 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-28 14:20:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who created the record"
    example: 7
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 7
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.family_account_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"