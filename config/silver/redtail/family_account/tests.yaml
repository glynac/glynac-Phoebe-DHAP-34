# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_FAMILY_ACCOUNT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(family_id IS NULL) as null_family_id,
        countIf(family_id = 0) as zero_family_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_family_id: 0
      zero_family_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: family_id_unique_per_partition
    type: uniqueness
    description: "family_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT family_id, processing_date, count() as cnt
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY family_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_family_accounts_exist_in_bronze
    type: referential_integrity
    description: "All Silver family accounts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_family_accounts
      FROM silver.redtail_family_account s
      LEFT JOIN redtail.family_account_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_family_accounts: 0
  
  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('active', 'inactive', 'closed', 'suspended')
    expect:
      invalid_count: 0
  
  - name: total_value_non_negative
    type: assertion
    description: "Total value should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND total_value < 0
    expect:
      invalid_count: 0
  
  - name: total_value_reasonable_range
    type: assertion
    description: "Total value should be in reasonable range (< $10 billion per family)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND total_value > 10000000000
    expect:
      invalid_count: 0
  
  - name: family_name_present
    type: assertion
    description: "Family name should be present for active accounts"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'active'
        AND family_name = ''
    expect:
      invalid_count: 0
  
  - name: account_number_present
    type: assertion
    description: "Account number should be present for active accounts"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'active'
        AND account_number = ''
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: active_accounts_have_value
    type: assertion
    description: "Active family accounts should typically have total_value > 0"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'active'
        AND total_value = 0
    expect:
      invalid_count: 0
  
  - name: closed_accounts_reasonable_value
    type: assertion
    description: "Closed accounts should typically have zero or minimal value"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'closed'
        AND total_value > 1000
    expect:
      invalid_count: 0
  
  - name: rec_add_reasonable
    type: assertion
    description: "Record add date should be reasonable (within last 50 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_add < now() - INTERVAL 50 YEAR
    expect:
      invalid_count: 0
  
  - name: rec_add_not_future
    type: assertion
    description: "Record add date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_family_account
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add > now()
    expect:
      invalid_count: 0