version: "1.0"
layer: silver
database: redtail_silver
table: portfolio_allocation


metadata:
  display_name: "Redtail Portfolio Allocations (Cleaned)"
  description: |
    Cleaned and transformed Redtail portfolio allocation data from Bronze layer.
    Represents investment allocations within portfolios including target, current,
    min/max percentages, core holdings designation, and active status.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - portfolio_allocation
    - investments
    - portfolios
    - financials
    - crm
    - silver
    - pii
    - financial
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - investment_data
    - notes
    - target_percentage
    - current_percentage
    - min_percentage
    - max_percentage
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.portfolio_allocation_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: record_id_idx
      expression: record_id
      type: bloom_filter
      granularity: 1
    - name: portfolio_id_idx
      expression: portfolio_id
      type: bloom_filter
      granularity: 1
    - name: investment_id_idx
      expression: investment_id
      type: bloom_filter
      granularity: 1
    - name: is_core_holding_idx
      expression: is_core_holding
      type: set
      granularity: 4
    - name: is_active_idx
      expression: is_active
      type: set
      granularity: 4

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Identifiers
  - name: record_id
    type: Int32
    nullable: false
    description: "Unique portfolio allocation record identifier"
    example: 98765
    
  - name: portfolio_id
    type: Int32
    nullable: false
    description: "Foreign key to portfolio record"
    example: 42
    
  - name: investment_id
    type: Int32
    nullable: false
    description: "Foreign key to investment record"
    example: 123
    
  # Allocation percentages
  - name: target_percentage
    type: Decimal64(4)
    nullable: false
    description: "Target allocation percentage"
    pii: true
    example: 25.0000
    
  - name: current_percentage
    type: Decimal64(4)
    nullable: false
    description: "Current allocation percentage"
    pii: true
    example: 26.5000
    
  - name: min_percentage
    type: Decimal64(4)
    nullable: false
    description: "Minimum allowed allocation percentage"
    pii: true
    example: 20.0000
    
  - name: max_percentage
    type: Decimal64(4)
    nullable: false
    description: "Maximum allowed allocation percentage"
    pii: true
    example: 30.0000
    
  # Additional data
  - name: investment_data
    type: String
    nullable: false
    description: "Additional investment data or metadata"
    pii: true
    example: "Large Cap US Equity, Growth Focus"
    
  - name: notes
    type: String
    nullable: false
    description: "Notes about this allocation"
    pii: true
    example: "Slightly overweight, rebalancing planned for Q1"
    
  # Flags
  - name: is_core_holding
    type: Bool
    nullable: false
    description: "Whether this is a core portfolio holding"
    example: true
    
  - name: is_active
    type: Bool
    nullable: false
    description: "Whether this allocation is currently active"
    example: true
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail"
    example: "2025-11-28 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail"
    example: "2025-11-28 14:20:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who created the record"
    example: 7
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 7
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.portfolio_allocation_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"