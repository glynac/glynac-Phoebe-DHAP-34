# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_PROSPECT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(prospect_id IS NULL) as null_prospect_id,
        countIf(prospect_id = 0) as zero_prospect_id,
        countIf(contact_id = 0) as zero_contact_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_prospect_id: 0
      zero_prospect_id: 0
      zero_contact_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: prospect_id_unique_per_partition
    type: uniqueness
    description: "prospect_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT prospect_id, processing_date, count() as cnt
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY prospect_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_prospects_exist_in_bronze
    type: referential_integrity
    description: "All Silver prospects should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_prospects
      FROM silver.redtail_prospect s
      LEFT JOIN redtail.prospect_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_prospects: 0
  
  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('qualified', 'active', 'converted', 'closed', 'inactive', 'lost')
    expect:
      invalid_count: 0
  
  - name: valid_stage_normalized
    type: accepted_values
    description: "stage_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND stage_normalized NOT IN ('discovery', 'qualification', 'proposal', 'negotiation', 'closed_won', 'closed_lost', 'contract')
    expect:
      invalid_count: 0
  
  - name: expected_revenue_non_negative
    type: assertion
    description: "Expected revenue should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND expected_revenue < 0
    expect:
      invalid_count: 0
  
  - name: expected_revenue_reasonable_range
    type: assertion
    description: "Expected revenue should be in reasonable range (< $100 million)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND expected_revenue > 100000000
    expect:
      invalid_count: 0
  
  - name: probability_valid_range
    type: assertion
    description: "Probability should be between 0 and 100"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND (probability < 0 OR probability > 100)
    expect:
      invalid_count: 0
  
  - name: expected_close_date_reasonable_future
    type: assertion
    description: "Expected close date should not be too far in future (< 5 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND expected_close_date IS NOT NULL
        AND expected_close_date > now() + INTERVAL 5 YEAR
    expect:
      invalid_count: 0
  
  - name: expected_close_date_after_rec_add
    type: assertion
    description: "Expected close date should be after record creation"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND expected_close_date IS NOT NULL
        AND expected_close_date < rec_add
    expect:
      invalid_count: 0
  
  - name: closed_won_stage_consistency
    type: assertion
    description: "Closed won stage should have status as converted or closed"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND stage_normalized = 'closed_won'
        AND status_normalized NOT IN ('converted', 'closed')
    expect:
      invalid_count: 0
  
  - name: closed_lost_stage_consistency
    type: assertion
    description: "Closed lost stage should have status as lost or closed"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND stage_normalized = 'closed_lost'
        AND status_normalized NOT IN ('lost', 'closed', 'inactive')
    expect:
      invalid_count: 0
  
  - name: closed_won_probability_high
    type: assertion
    description: "Closed won prospects should have probability of 100"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND stage_normalized = 'closed_won'
        AND probability != 100
    expect:
      invalid_count: 0
  
  - name: closed_lost_probability_low
    type: assertion
    description: "Closed lost prospects should have probability of 0"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND stage_normalized = 'closed_lost'
        AND probability != 0
    expect:
      invalid_count: 0
  
  - name: active_prospects_have_revenue
    type: assertion
    description: "Active prospects should typically have expected_revenue > 0"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized IN ('active', 'qualified')
        AND expected_revenue = 0
    expect:
      invalid_count: 0
  
  - name: active_prospects_have_close_date
    type: assertion
    description: "Active prospects should have expected close date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized IN ('active', 'qualified')
        AND expected_close_date IS NULL
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: rec_add_not_future
    type: assertion
    description: "Record add date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add > now()
    expect:
      invalid_count: 0
  
  - name: rec_add_reasonable
    type: assertion
    description: "Record add date should be reasonable (within last 20 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_add < now() - INTERVAL 20 YEAR
    expect:
      invalid_count: 0
  
  - name: valid_sources
    type: accepted_values
    description: "Prospect source should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_prospect
      WHERE processing_date = toDate('{{ ds }}')
        AND source != ''
        AND source NOT IN ('Website', 'Referral', 'Event', 'Cold Call', 'Email Campaign', 'Social Media', 'Partner', 'Advertisement', 'Trade Show', 'Direct Mail', 'Lead Conversion')
    expect:
      invalid_count: 0