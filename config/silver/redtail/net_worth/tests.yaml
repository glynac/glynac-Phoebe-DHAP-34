# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_NET_WORTH
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(record_id IS NULL) as null_record_id,
        countIf(record_id = 0) as zero_record_id,
        countIf(contact_id = 0) as zero_contact_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_record_id: 0
      zero_record_id: 0
      zero_contact_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: record_id_unique_per_partition
    type: uniqueness
    description: "record_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT record_id, processing_date, count() as cnt
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY record_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_net_worth_exist_in_bronze
    type: referential_integrity
    description: "All Silver net worth records should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_net_worth
      FROM silver.redtail_net_worth s
      LEFT JOIN redtail.net_worth_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_net_worth: 0
  
  - name: all_assets_non_negative
    type: assertion
    description: "All asset values should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND (cash_and_equivalents < 0 
          OR investments < 0 
          OR retirement_accounts < 0 
          OR real_estate < 0 
          OR business_interests < 0 
          OR personal_property < 0 
          OR other_assets < 0 
          OR total_assets < 0)
    expect:
      invalid_count: 0
  
  - name: all_liabilities_non_negative
    type: assertion
    description: "All liability values should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND (short_term_liabilities < 0 
          OR mortgages < 0 
          OR loans < 0 
          OR other_liabilities < 0 
          OR total_liabilities < 0)
    expect:
      invalid_count: 0
  
  - name: total_assets_calculation
    type: assertion
    description: "Total assets should equal sum of individual asset categories (within tolerance)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND abs(total_assets - (cash_and_equivalents + investments + retirement_accounts + real_estate + business_interests + personal_property + other_assets)) > 1
    expect:
      invalid_count: 0
  
  - name: total_liabilities_calculation
    type: assertion
    description: "Total liabilities should equal sum of individual liability categories (within tolerance)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND abs(total_liabilities - (short_term_liabilities + mortgages + loans + other_liabilities)) > 1
    expect:
      invalid_count: 0
  
  - name: net_worth_calculation
    type: assertion
    description: "Net worth should equal total_assets - total_liabilities (within tolerance)"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND abs(net_worth_amount - (total_assets - total_liabilities)) > 1
    expect:
      invalid_count: 0
  
  - name: as_of_date_not_future
    type: assertion
    description: "As of date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date > now()
    expect:
      invalid_count: 0
  
  - name: as_of_date_reasonable
    type: assertion
    description: "As of date should be reasonable (within last 50 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date IS NOT NULL
        AND as_of_date < now() - INTERVAL 50 YEAR
    expect:
      invalid_count: 0
  
  - name: total_assets_reasonable_range
    type: assertion
    description: "Total assets should be in reasonable range (< $1 billion)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND total_assets > 1000000000
    expect:
      invalid_count: 0
  
  - name: total_liabilities_reasonable_range
    type: assertion
    description: "Total liabilities should be in reasonable range (< $100 million)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND total_liabilities > 100000000
    expect:
      invalid_count: 0
  
  - name: net_worth_reasonable_range
    type: assertion
    description: "Net worth should be in reasonable range (-$50M to $1B)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND (net_worth_amount < -50000000 OR net_worth_amount > 1000000000)
    expect:
      invalid_count: 0
  
  - name: liabilities_not_exceed_assets_significantly
    type: assertion
    description: "Liabilities should not exceed assets by more than 50% (reasonable debt ratio)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND total_assets > 0
        AND total_liabilities > (total_assets * 1.5)
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: rec_add_not_future
    type: assertion
    description: "Record add date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add > now()
    expect:
      invalid_count: 0
  
  - name: as_of_date_after_or_equal_rec_add
    type: assertion
    description: "As of date should be on or after record creation date"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND as_of_date IS NOT NULL
        AND toDate(as_of_date) < toDate(rec_add)
    expect:
      invalid_count: 0
  
  - name: contact_single_net_worth_per_as_of_date
    type: uniqueness
    description: "Each contact should have at most one net worth record per as_of_date"
    severity: warning
    query: |
      SELECT contact_id, toDate(as_of_date) as as_of_dt, processing_date, count() as cnt
      FROM silver.redtail_net_worth
      WHERE processing_date = toDate('{{ ds }}')
        AND as_of_date IS NOT NULL
      GROUP BY contact_id, as_of_dt, processing_date
      HAVING cnt > 1
    expect_empty: true