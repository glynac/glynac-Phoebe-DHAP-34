version: "1.0"
layer: silver
database: redtail_silver
table: net_worth


metadata:
  display_name: "Redtail Net Worth Statements (Cleaned)"
  description: |
    Cleaned and transformed Redtail net worth data from Bronze layer.
    Represents detailed financial position statements with assets, liabilities,
    and net worth calculations for contacts at specific points in time.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - net_worth
    - financials
    - assets
    - liabilities
    - crm
    - silver
    - pii
    - financial
  data_classification: highly_confidential
  contains_pii: true
  pii_columns:
    - cash_and_equivalents
    - investments
    - retirement_accounts
    - real_estate
    - business_interests
    - personal_property
    - other_assets
    - total_assets
    - short_term_liabilities
    - mortgages
    - loans
    - other_liabilities
    - total_liabilities
    - net_worth_amount
    - notes
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.net_worth_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: record_id_idx
      expression: record_id
      type: bloom_filter
      granularity: 1
    - name: contact_id_idx
      expression: contact_id
      type: bloom_filter
      granularity: 1
    - name: as_of_date_idx
      expression: as_of_date
      type: minmax
      granularity: 4

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Identifiers
  - name: record_id
    type: Int32
    nullable: false
    description: "Unique net worth statement record identifier"
    example: 98765
    
  - name: contact_id
    type: Int32
    nullable: false
    description: "Foreign key to contact record"
    example: 42
    
  # As of date
  - name: as_of_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date this net worth statement is effective as of (parsed from string)"
    example: "2025-11-30 00:00:00.000"
    
  # Assets
  - name: cash_and_equivalents
    type: Decimal64(2)
    nullable: false
    description: "Cash and cash equivalent assets (parsed from string, currency symbols removed)"
    pii: true
    example: 250000.00
    
  - name: investments
    type: Decimal64(2)
    nullable: false
    description: "Investment portfolio value (parsed from string, currency symbols removed)"
    pii: true
    example: 1500000.00
    
  - name: retirement_accounts
    type: Decimal64(2)
    nullable: false
    description: "Retirement account balances (IRA, 401k, etc.) (parsed from string, currency symbols removed)"
    pii: true
    example: 800000.00
    
  - name: real_estate
    type: Decimal64(2)
    nullable: false
    description: "Real estate property values (parsed from string, currency symbols removed)"
    pii: true
    example: 1200000.00
    
  - name: business_interests
    type: Decimal64(2)
    nullable: false
    description: "Business ownership and interests value (parsed from string, currency symbols removed)"
    pii: true
    example: 500000.00
    
  - name: personal_property
    type: Decimal64(2)
    nullable: false
    description: "Personal property value (vehicles, jewelry, etc.) (parsed from string, currency symbols removed)"
    pii: true
    example: 150000.00
    
  - name: other_assets
    type: Decimal64(2)
    nullable: false
    description: "Other miscellaneous assets (parsed from string, currency symbols removed)"
    pii: true
    example: 50000.00
    
  - name: total_assets
    type: Decimal64(2)
    nullable: false
    description: "Total of all assets (parsed from string, currency symbols removed)"
    pii: true
    example: 4450000.00
    
  # Liabilities
  - name: short_term_liabilities
    type: Decimal64(2)
    nullable: false
    description: "Short-term debts and liabilities (parsed from string, currency symbols removed)"
    pii: true
    example: 25000.00
    
  - name: mortgages
    type: Decimal64(2)
    nullable: false
    description: "Mortgage loan balances (parsed from string, currency symbols removed)"
    pii: true
    example: 600000.00
    
  - name: loans
    type: Decimal64(2)
    nullable: false
    description: "Other loan balances (parsed from string, currency symbols removed)"
    pii: true
    example: 100000.00
    
  - name: other_liabilities
    type: Decimal64(2)
    nullable: false
    description: "Other miscellaneous liabilities (parsed from string, currency symbols removed)"
    pii: true
    example: 25000.00
    
  - name: total_liabilities
    type: Decimal64(2)
    nullable: false
    description: "Total of all liabilities (parsed from string, currency symbols removed)"
    pii: true
    example: 750000.00
    
  # Net worth
  - name: net_worth_amount
    type: Decimal64(2)
    nullable: false
    description: "Net worth (total_assets - total_liabilities) (parsed from string, currency symbols removed)"
    pii: true
    example: 3700000.00
    
  # Notes
  - name: notes
    type: String
    nullable: false
    description: "Additional notes about the net worth statement (trimmed)"
    pii: true
    example: "Annual review, real estate values updated based on recent appraisal"
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2025-11-30 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-30 14:20:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who created the record"
    example: 7
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 7
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.net_worth_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"