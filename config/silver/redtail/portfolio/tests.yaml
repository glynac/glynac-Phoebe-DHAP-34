# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_PORTFOLIO
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(portfolio_name = '') as empty_portfolio_name,
        countIf(portfolio_code = '') as empty_portfolio_code,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_org_id: 0
      empty_org_id: 0
      empty_portfolio_name: 0
      empty_portfolio_code: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: portfolio_code_unique_per_partition
    type: uniqueness
    description: "portfolio_code should be unique per processing_date"
    severity: error
    query: |
      SELECT portfolio_code, processing_date, count() as cnt
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND portfolio_code != ''
      GROUP BY portfolio_code, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_portfolios_exist_in_bronze
    type: referential_integrity
    description: "All Silver portfolios should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_portfolios
      FROM silver.redtail_portfolio s
      LEFT JOIN redtail.portfolio_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_portfolios: 0
  
  - name: valid_is_active_values
    type: accepted_values
    description: "is_active must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND is_active NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: valid_is_model_values
    type: accepted_values
    description: "is_model must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND is_model NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: return_percentages_reasonable
    type: assertion
    description: "Return percentages should be reasonable (-100% to +200%)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND (
          target_return < -100 OR target_return > 200
          OR ytd_return < -100 OR ytd_return > 200
          OR one_year_return < -100 OR one_year_return > 200
          OR three_year_return < -100 OR three_year_return > 200
          OR five_year_return < -100 OR five_year_return > 200
          OR inception_return < -100 OR inception_return > 200
        )
    expect:
      invalid_count: 0
  
  - name: inception_date_not_future
    type: assertion
    description: "Inception date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND inception_date > now()
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: valid_risk_levels
    type: accepted_values
    description: "Risk level should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_portfolio
      WHERE processing_date = toDate('{{ ds }}')
        AND risk_level != ''
        AND risk_level NOT IN ('Low', 'Medium', 'High', 'Conservative', 'Moderate', 'Aggressive')
    expect:
      invalid_count: 0