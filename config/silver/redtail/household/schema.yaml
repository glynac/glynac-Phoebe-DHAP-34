version: "1.0"
layer: silver
database: redtail_silver
table: household


metadata:
  display_name: "Redtail Households (Cleaned)"
  description: |
    Cleaned and transformed Redtail household data from Bronze layer.
    Represents household groupings with primary contact, type, status,
    financial metrics (net worth, income), and address information.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - households
    - crm
    - silver
    - pii
    - financial
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - household_name
    - household_number
    - total_net_worth
    - total_income
    - address_line1
    - address_line2
    - city
    - state
    - zip_code
    - notes
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.household_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: household_id_idx
      expression: household_id
      type: bloom_filter
      granularity: 1
    - name: household_type_idx
      expression: household_type
      type: set
      granularity: 4
    - name: household_status_idx
      expression: household_status
      type: set
      granularity: 4
    - name: primary_contact_id_idx
      expression: primary_contact_id
      type: bloom_filter
      granularity: 1
    - name: household_name_idx
      expression: household_name
      type: bloom_filter
      granularity: 1

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Household identifiers
  - name: household_id
    type: Int32
    nullable: false
    description: "Unique household identifier"
    example: 98765
    
  - name: household_name
    type: String
    nullable: false
    description: "Household name (trimmed)"
    pii: true
    example: "The Johnson Household"
    
  - name: household_number
    type: String
    nullable: false
    description: "Household reference number (trimmed)"
    pii: true
    example: "HH-2025-001"
    
  - name: primary_contact_id
    type: Int32
    nullable: false
    description: "Foreign key to primary contact record for this household"
    example: 42
    
  # Household classification
  - name: household_type
    type: String
    nullable: false
    description: "Type of household (Single, Married, Family, Multi-generational) (trimmed)"
    example: "Family"
    
  - name: household_status
    type: String
    nullable: false
    description: "Current status of household (trimmed)"
    example: "Active"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized status (active/inactive/archived)"
    allowed_values: [active, inactive, archived]
    example: "active"
    
  # Financial data
  - name: total_net_worth
    type: Decimal64(2)
    nullable: false
    description: "Total household net worth (parsed from string, currency symbols removed)"
    pii: true
    example: 3500000.00
    
  - name: total_income
    type: Decimal64(2)
    nullable: false
    description: "Total household annual income (parsed from string, currency symbols removed)"
    pii: true
    example: 250000.00
    
  # Address information
  - name: address_line1
    type: String
    nullable: false
    description: "Primary address line (trimmed)"
    pii: true
    example: "123 Main Street"
    
  - name: address_line2
    type: String
    nullable: false
    description: "Secondary address line (trimmed)"
    pii: true
    example: "Apt 4B"
    
  - name: city
    type: String
    nullable: false
    description: "City (trimmed)"
    pii: true
    example: "San Francisco"
    
  - name: state
    type: String
    nullable: false
    description: "State/province (trimmed)"
    pii: true
    example: "CA"
    
  - name: zip_code
    type: String
    nullable: false
    description: "Postal/ZIP code (trimmed)"
    pii: true
    example: "94102"
    
  - name: country
    type: String
    nullable: false
    description: "Country (trimmed, default USA)"
    example: "USA"
    
  # Notes
  - name: notes
    type: String
    nullable: false
    description: "Additional notes about the household (trimmed)"
    pii: true
    example: "Prefers annual reviews, interested in estate planning"
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2020-01-15 10:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-28 14:20:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who created the record"
    example: 7
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 7
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.household_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"