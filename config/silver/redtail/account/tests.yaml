# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_ACCOUNT
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_accounts_exist_in_bronze
    type: referential_integrity
    description: "All Silver accounts should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_accounts
      FROM silver.redtail_account s
      LEFT JOIN redtail.account_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_accounts: 0
  
  - name: valid_is_active_values
    type: accepted_values
    description: "is_active must be 0 or 1"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND is_active NOT IN (0, 1)
    expect:
      invalid_count: 0
  
  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('active', 'closed', 'pending', 'unknown')
    expect:
      invalid_count: 0
  
  - name: balances_non_negative
    type: assertion
    description: "Balances should not be negative"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND (current_balance < 0 OR available_balance < 0)
    expect:
      invalid_count: 0
  
  - name: available_balance_lte_current
    type: assertion
    description: "Available balance should not exceed current balance"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND available_balance > current_balance
    expect:
      invalid_count: 0
  
  - name: valid_currency_codes
    type: accepted_values
    description: "Currency codes should be valid 3-letter codes"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND currency != ''
        AND length(currency) != 3
    expect:
      invalid_count: 0
  
  - name: open_date_not_future
    type: assertion
    description: "Account open date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND open_date > now()
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_account
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0