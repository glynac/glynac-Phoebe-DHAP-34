version: "1.0"
layer: silver
database: redtail_silver
table: transaction


metadata:
  display_name: "Redtail Transactions (Cleaned)"
  description: |
    Cleaned and transformed Redtail transaction data from Bronze layer.
    Represents financial transactions including deposits, withdrawals, trades,
    fees, dividends, and other account movements.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - transactions
    - financial
    - trades
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - amount
    - fees
    - investment_data
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.transaction_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: transaction_number_idx
      expression: transaction_number
      type: bloom_filter
      granularity: 1
    - name: transaction_type_idx
      expression: transaction_type
      type: set
      granularity: 4
    - name: account_id_idx
      expression: account_id
      type: minmax
      granularity: 2
    - name: transaction_date_idx
      expression: transaction_date
      type: minmax
      granularity: 2

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Transaction identifiers
  - name: transaction_number
    type: String
    nullable: false
    description: "Unique transaction number (trimmed)"
    example: "TXN-2025-001234"
    
  - name: transaction_type
    type: String
    nullable: false
    description: "Type of transaction (Deposit, Withdrawal, Buy, Sell, Fee, Dividend, etc.)"
    example: "Buy"
    
  # Foreign keys
  - name: account_id
    type: Int32
    nullable: false
    description: "Foreign key to account record"
    example: 5678
    
  - name: investment_id
    type: Int32
    nullable: false
    description: "Foreign key to investment/security record"
    example: 9012
    
  # Financial amounts
  - name: amount
    type: Decimal(15, 2)
    nullable: false
    description: "Transaction amount (converted from string)"
    pii: true
    example: 10000.00
    
  - name: fees
    type: Decimal(10, 2)
    nullable: false
    description: "Transaction fees (converted from string)"
    pii: true
    example: 9.99
    
  - name: price_per_unit
    type: Decimal(15, 4)
    nullable: false
    description: "Price per share/unit (converted from string)"
    example: 125.5000
    
  - name: quantity
    type: Decimal(15, 4)
    nullable: false
    description: "Number of shares/units (converted from string)"
    example: 100.0000
    
  - name: currency
    type: String
    nullable: false
    description: "Currency code (trimmed, default USD)"
    example: "USD"
    
  # Dates
  - name: transaction_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Transaction date (parsed from string)"
    example: "2025-11-28 00:00:00.000"
    
  - name: settlement_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Settlement date (parsed from string)"
    example: "2025-11-30 00:00:00.000"
    
  - name: entry_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date transaction was entered into system (parsed from string)"
    example: "2025-11-28 14:30:00.000"
    
  # Status
  - name: status
    type: String
    nullable: false
    description: "Transaction status (trimmed)"
    example: "Completed"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized transaction status (completed/pending/failed/cancelled)"
    allowed_values: [completed, pending, failed, cancelled]
    example: "completed"
    
  # Description and notes
  - name: description
    type: String
    nullable: false
    description: "Transaction description (trimmed)"
    example: "Purchase of AAPL shares"
    
  - name: notes
    type: String
    nullable: false
    description: "Additional notes or comments (trimmed)"
    example: "Quarterly investment"
    
  - name: reference_number
    type: String
    nullable: false
    description: "External reference number (trimmed)"
    example: "REF-123456"
    
  # Flags
  - name: is_active
    type: UInt8
    nullable: false
    description: "Whether transaction is currently active (1=active, 0=cancelled)"
    allowed_values: [0, 1]
    example: 1
    
  # Investment data
  - name: investment_data
    type: String
    nullable: false
    description: "Serialized investment/security information (JSON)"
    pii: true
    example: '{"symbol":"AAPL","name":"Apple Inc."}'
    
  - name: investment_name
    type: String
    nullable: false
    description: "Investment name (denormalized field, trimmed)"
    example: "Apple Inc."
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail (parsed from string)"
    example: "2025-11-28 10:30:00.000"
    
  - name: rec_add_user
    type: Int32
    nullable: false
    description: "User ID who added the record"
    example: 42
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail (parsed from string)"
    example: "2025-11-28 14:20:00.000"
    
  - name: rec_edit_user
    type: Int32
    nullable: false
    description: "User ID who last edited the record"
    example: 42
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run (trimmed)"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record (parsed from string)"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.transaction_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"