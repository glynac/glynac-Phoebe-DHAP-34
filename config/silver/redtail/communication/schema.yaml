version: "1.0"
layer: silver
database: redtail_silver
table: communication


metadata:
  display_name: "Redtail Communications (Cleaned)"
  description: |
    Cleaned and transformed Redtail communication data from Bronze layer.
    Represents all communication activities including emails, messages, notes,
    and other correspondence with contacts, tracking direction, status, content, and attachments.
  
  owner: ai-team
  domain: redtail
  tags:
    - redtail
    - communications
    - emails
    - messages
    - crm
    - silver
    - pii
  data_classification: confidential
  contains_pii: true
  pii_columns:
    - subject
    - body
    - notes
  update_frequency: hourly
  retention_days: 2555  # ~7 years for financial records
  upstream_dependencies:
    - redtail.communication_raw
  downstream_dependencies: []

clickhouse:
  engine: ReplacingMergeTree
  engine_params:
    version_column: _loaded_at
  partition_by: toYYYYMM(processing_date)
  order_by:
    - processing_date
    - rec_id
  primary_key:
    - rec_id
  ttl: "processing_date + INTERVAL 2555 DAY"
  settings:
    index_granularity: 8192  
  indexes:
    - name: communication_type_idx
      expression: communication_type
      type: set
      granularity: 4
    - name: direction_idx
      expression: direction
      type: set
      granularity: 4
    - name: status_idx
      expression: comm_status
      type: set
      granularity: 4
    - name: contact_id_idx
      expression: contact_id
      type: bloom_filter
      granularity: 1
    - name: from_user_id_idx
      expression: from_user_id
      type: bloom_filter
      granularity: 1
    - name: subject_idx
      expression: subject
      type: bloom_filter
      granularity: 1

columns:
  - name: rec_id
    type: Int32
    nullable: false
    description: "Redtail internal record ID (primary key)"
    primary_key: true
    example: 12345
    
  - name: glynac_organization_id
    type: String
    nullable: false
    description: "Organization identifier for data isolation"
    example: "org-abc123"
    
  # Communication identifiers
  - name: communication_id
    type: Int32
    nullable: false
    description: "Unique communication identifier"
    example: 98765
    
  # Communication details
  - name: communication_type
    type: String
    nullable: false
    description: "Type of communication (Email, Note, Message, SMS)"
    example: "Email"
    
  - name: direction
    type: String
    nullable: false
    description: "Direction of communication (Inbound, Outbound, Internal)"
    example: "Outbound"
    
  - name: subject
    type: String
    nullable: false
    description: "Communication subject line"
    pii: true
    example: "Q4 Portfolio Review Meeting"
    
  - name: body
    type: String
    nullable: false
    description: "Communication body/content"
    pii: true
    example: "Dear Client, I wanted to schedule our quarterly review..."
    
  # Relationships
  - name: contact_id
    type: Int32
    nullable: false
    description: "Foreign key to contact record (primary recipient)"
    example: 42
    
  - name: from_user_id
    type: Int32
    nullable: false
    description: "User ID who sent/created the communication"
    example: 7
    
  - name: to_contact_id
    type: Int32
    nullable: false
    description: "Recipient contact ID"
    example: 43
    
  # Status
  - name: comm_status
    type: String
    nullable: false
    description: "Communication status (Sent, Delivered, Read, Failed, Draft)"
    example: "Delivered"
    
  - name: status_normalized
    type: LowCardinality(String)
    nullable: false
    description: "Normalized status (sent/delivered/read/failed/draft/unknown)"
    allowed_values: [sent, delivered, read, failed, draft, unknown]
    example: "delivered"
    
  - name: read_status
    type: Bool
    nullable: false
    description: "Whether communication has been read"
    example: true
    
  # Communication timing
  - name: communication_date
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Date and time when communication occurred"
    example: "2025-11-28 14:30:00.000"
    
  # Attachments
  - name: attachments_count
    type: Int32
    nullable: false
    description: "Number of attachments included"
    example: 2
    
  # Notes
  - name: notes
    type: String
    nullable: false
    description: "Additional notes about the communication"
    pii: true
    example: "Follow-up scheduled for next week"
    
  # Audit fields
  - name: rec_add
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was added in Redtail"
    example: "2025-11-28 14:30:00.000"
    
  - name: rec_edit
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when record was last edited in Redtail"
    example: "2025-11-28 15:20:00.000"
    
  # Batch metadata
  - name: scan_id
    type: String
    nullable: false
    description: "Unique identifier for the batch run"
    example: "scan_20251128_143022"
    
  - name: batch_number
    type: Int32
    nullable: false
    description: "Sequential batch number in the scan"
    example: 1
    
  - name: processing_date
    type: Date
    nullable: false
    description: "Date when data was processed (partition key)"
    partition_key: true
    example: "2025-11-28"
    
  - name: processing_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Timestamp when Flink processed this record"
    example: "2025-11-28 14:30:22.123"
    
  # System columns
  - name: _loaded_at
    type: DateTime
    nullable: false
    description: "Timestamp when loaded into Silver layer"
    system_column: true
    example: "2025-11-28 15:30:45"
    
  - name: _source_table
    type: String
    nullable: false
    description: "Source table name"
    system_column: true
    example: "redtail.communication_raw"
    
  - name: _source_timestamp
    type: Nullable(DateTime64(3))
    nullable: true
    description: "Source processing timestamp"
    system_column: true
    example: "2025-11-28 14:30:22.123"