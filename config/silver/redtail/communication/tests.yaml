# ============================================================
# DATA QUALITY TESTS: SILVER.REDTAIL_COMMUNICATION
# ============================================================
version: "1.0"

tests:
  - name: required_columns_not_null
    type: schema
    description: "Required columns must not be NULL"
    severity: error
    query: |
      SELECT 
        countIf(rec_id IS NULL) as null_rec_id,
        countIf(rec_id = 0) as zero_rec_id,
        countIf(communication_id IS NULL) as null_communication_id,
        countIf(communication_id = 0) as zero_communication_id,
        countIf(glynac_organization_id IS NULL) as null_org_id,
        countIf(glynac_organization_id = '') as empty_org_id,
        countIf(processing_date IS NULL) as null_processing_date,
        countIf(contact_id = 0) as zero_contact_id,
        countIf(from_user_id = 0) as zero_from_user_id
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
    expect:
      null_rec_id: 0
      zero_rec_id: 0
      null_communication_id: 0
      zero_communication_id: 0
      null_org_id: 0
      empty_org_id: 0
      null_processing_date: 0
      zero_contact_id: 0
      zero_from_user_id: 0
  
  - name: rec_id_unique_per_partition
    type: uniqueness
    description: "rec_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT rec_id, processing_date, count() as cnt
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY rec_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: communication_id_unique_per_partition
    type: uniqueness
    description: "communication_id should be unique per processing_date (after dedup)"
    severity: error
    query: |
      SELECT communication_id, processing_date, count() as cnt
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
      GROUP BY communication_id, processing_date
      HAVING cnt > 1
    expect_empty: true
  
  - name: all_communications_exist_in_bronze
    type: referential_integrity
    description: "All Silver communications should exist in Bronze source"
    severity: warning
    query: |
      SELECT count() as orphaned_communications
      FROM silver.redtail_communication s
      LEFT JOIN redtail.communication_raw b
        ON s.rec_id = b.rec_id
        AND s.processing_date = b.processing_date
      WHERE s.processing_date = toDate('{{ ds }}')
        AND b.rec_id IS NULL
    expect:
      orphaned_communications: 0
  
  - name: valid_status_normalized
    type: accepted_values
    description: "status_normalized must be in allowed list"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized NOT IN ('sent', 'delivered', 'read', 'failed', 'draft', 'unknown')
    expect:
      invalid_count: 0
  
  - name: communication_date_not_future
    type: assertion
    description: "Communication date should not be in the future"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND communication_date > now()
    expect:
      invalid_count: 0
  
  - name: communication_date_reasonable
    type: assertion
    description: "Communication date should be reasonable (within last 20 years)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND communication_date IS NOT NULL
        AND communication_date < now() - INTERVAL 20 YEAR
    expect:
      invalid_count: 0
  
  - name: attachments_count_non_negative
    type: assertion
    description: "Attachments count should not be negative"
    severity: error
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND attachments_count < 0
    expect:
      invalid_count: 0
  
  - name: attachments_count_reasonable
    type: assertion
    description: "Attachments count should be reasonable (< 100)"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND attachments_count > 100
    expect:
      invalid_count: 0
  
  - name: subject_or_body_present
    type: assertion
    description: "At least subject or body should be present for non-draft communications"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized != 'draft'
        AND subject = ''
        AND body = ''
    expect:
      invalid_count: 0
  
  - name: rec_edit_after_rec_add
    type: assertion
    description: "Edit timestamp should be after or equal to add timestamp"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND rec_add IS NOT NULL
        AND rec_edit IS NOT NULL
        AND rec_edit < rec_add
    expect:
      invalid_count: 0
  
  - name: valid_communication_types
    type: accepted_values
    description: "Communication type should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND communication_type != ''
        AND communication_type NOT IN ('Email', 'Note', 'Message', 'SMS', 'Letter', 'Call Log', 'Meeting Notes', 'Task', 'Reminder')
    expect:
      invalid_count: 0
  
  - name: valid_directions
    type: accepted_values
    description: "Direction should be valid"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND direction != ''
        AND direction NOT IN ('Inbound', 'Outbound', 'Internal')
    expect:
      invalid_count: 0
  
  - name: read_status_consistency
    type: assertion
    description: "Read status should be true when status is 'read'"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'read'
        AND read_status = false
    expect:
      invalid_count: 0
  
  - name: failed_communications_not_read
    type: assertion
    description: "Failed communications should not be marked as read"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND status_normalized = 'failed'
        AND read_status = true
    expect:
      invalid_count: 0
  
  - name: outbound_from_user_required
    type: assertion
    description: "Outbound communications should have a from_user_id"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND direction = 'Outbound'
        AND from_user_id = 0
    expect:
      invalid_count: 0
  
  - name: inbound_to_contact_required
    type: assertion
    description: "Inbound communications should have a to_contact_id"
    severity: warning
    query: |
      SELECT count() as invalid_count
      FROM silver.redtail_communication
      WHERE processing_date = toDate('{{ ds }}')
        AND direction = 'Inbound'
        AND to_contact_id = 0
    expect:
      invalid_count: 0