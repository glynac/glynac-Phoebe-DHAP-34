# Silver Layer - Mautic Page Hits (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Mautic page_hits from Bronze to Silver"
  tags: ["silver", "mautic", "page_hits", "auto-mode", "single-tenant"]

source:
  database: mautic
  table: page_hits_raw

target:
  database: mautic_silver
  table: page_hits

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  url:
    transform: clean_string
  referer:
    transform: clean_string

dedupe:
  partition_by: [id, partition]
  order_by: [date_hit DESC]

filters:
  - "id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
