# Silver Layer - Mautic Lead IPs Xref (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Mautic lead_ips_xref from Bronze to Silver"
  tags: ["silver", "mautic", "lead_ips_xref", "auto-mode", "single-tenant"]

source:
  database: mautic
  table: lead_ips_xref_raw

target:
  database: mautic_silver
  table: lead_ips_xref

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [lead_id, ip_id, partition]
  order_by: [lead_id DESC]

filters:
  - "lead_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
