# Silver Layer - Mautic Migrations (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Mautic migrations from Bronze to Silver"
  tags: ["silver", "mautic", "migrations", "auto-mode", "single-tenant"]

source:
  database: mautic
  table: migrations_raw

target:
  database: mautic_silver
  table: migrations

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [version, partition]
  order_by: [version DESC]

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
