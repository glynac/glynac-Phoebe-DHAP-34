# Silver Layer - Mautic Companies-Leads Junction (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Mautic companies_leads from Bronze to Silver"
  tags: ["silver", "mautic", "companies_leads", "auto-mode", "single-tenant"]

source:
  database: mautic
  table: companies_leads_raw

target:
  database: mautic_silver
  table: companies_leads

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [company_id, lead_id, partition]
  order_by: [date_added DESC]

filters:
  - "company_id IS NOT NULL"
  - "lead_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
