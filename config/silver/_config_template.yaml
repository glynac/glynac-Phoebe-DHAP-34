# ============================================================
# SILVER LAYER - AUTO MODE CONFIG TEMPLATE
# ============================================================
# This is a comprehensive template for auto-mode Silver transformations.
# Auto mode infers schema from Bronze and generates SQL automatically.
#
# Features:
#   - Schema inference from Bronze via DESCRIBE TABLE
#   - Automatic transforms based on column type
#   - Full DAG configuration (retries, SLA, dependencies)
#   - Data quality tests
#   - Deduplication settings
#
# Usage:
#   1. Copy this file to: silver/{source}/{table}/config.yaml
#   2. Fill in source and target details
#   3. Add transform overrides for columns needing special handling
#   4. Customize DAG settings as needed (or use defaults from _defaults.yaml)
#   5. Remove this header comment
#
# Defaults:
#   Values from _defaults.yaml are applied automatically.
#   Only specify values here if you need to OVERRIDE defaults.
#
# ============================================================

version: "1.0"

# ============================================================
# DAG SETTINGS
# ============================================================
# dag_id is auto-derived from folder path: silver_{source}_{table}
# e.g., silver/orion/account → silver_orion_account
#
# Most settings inherit from _defaults.yaml. Only override what you need.
dag:
  # Override schedule (default: "dataset" for Bronze-triggered)
  schedule_interval: "dataset"

  # Custom tags for this DAG (source tag auto-added)
  tags: ["silver", "orion", "account", "auto-mode"]

  # Override default_args if needed
  # default_args:
  #   owner: custom-team
  #   retries: 5
  #   retry_delay_minutes: 10
  #   execution_timeout_minutes: 60
  #   email_on_failure: true
  #   email_on_retry: false

  # Override SLA if needed
  # sla:
  #   enabled: true
  #   duration_minutes: 180

  # Override concurrency if needed
  # concurrency: 2
  # max_active_runs: 2
  # max_active_tasks_per_dag: 2

# ============================================================
# SOURCE (Bronze table to read from)
# ============================================================
source:
  database: orion              # Bronze database name
  table: account_raw           # Bronze VIEW or table name

# ============================================================
# TARGET (Silver table to write to)
# ============================================================
# Database naming: {source}_silver (e.g., orion_silver, redtail_silver)
# Table naming: just the entity name (e.g., account, customer)
target:
  database: orion_silver       # {source}_silver
  table: account               # Entity name without source prefix

# ============================================================
# TASK SETTINGS (optional - inherits from _defaults.yaml)
# ============================================================
# Override task execution settings if needed
# task:
#   incremental:
#     enabled: true
#     strategy: partition_based
#     partition_column: processing_date
#
#   execution:
#     mode: insert_overwrite
#     batch_size: 100000
#     max_insert_threads: 4

# ============================================================
# TRANSFORM OVERRIDES (optional)
# ============================================================
# Only specify columns that need special handling.
# All other columns will use default transforms based on type.
#
# Available transforms (from _transforms.yaml):
#   String:
#     - clean_string     : trim + coalesce to ''
#     - clean_email      : lowercase + trim
#     - clean_phone      : digits only
#     - clean_upper      : uppercase + trim
#     - extract_email_domain : get domain from email
#
#   Status:
#     - normalize_status : map active/closed/pending/unknown
#     - normalize_boolean: map true/false to 1/0
#
#   Numeric:
#     - parse_money      : "$1,234.56" → Decimal
#     - parse_percentage : "45.5%" → Decimal
#     - safe_int         : String → Int64 or NULL
#     - safe_float       : String → Float64 or NULL
#
#   DateTime:
#     - parse_date       : Various formats → DateTime64
#     - parse_date_only  : Various formats → Date
#     - parse_epoch_ms   : Epoch milliseconds → DateTime
#     - parse_epoch_sec  : Epoch seconds → DateTime
transforms:
  # Rename and transform a column
  account_status:
    target: status_normalized    # Rename to this
    transform: normalize_status  # Apply this transform

  # Just apply a custom transform (keep column name)
  email:
    transform: clean_email

  # Parse money amounts
  balance:
    transform: parse_money

  available_balance:
    transform: parse_money

# ============================================================
# EXCLUDE COLUMNS (optional)
# ============================================================
# Columns to exclude from Silver table
# Global excludes from _defaults.yaml are always applied
exclude:
  - internal_field
  - temp_data

# ============================================================
# LOOKBACK DAYS (optional - default: 90)
# ============================================================
# How many days of Bronze data to process
lookback_days: 90

# ============================================================
# DEDUPLICATION (required)
# ============================================================
# How to deduplicate records
# Primary key column varies by source:
#   - Redtail: rec_id
#   - Orion: {entity}_id (e.g., account_id, customer_id)
#   - Salesforce: sf_id
dedupe:
  partition_by:
    - account_id          # Change to match your entity's primary key
    - processing_date
  order_by:
    - processing_timestamp DESC

# ============================================================
# FILTERS (optional)
# ============================================================
# WHERE clause conditions for data quality
filters:
  - "account_id IS NOT NULL"       # Change to match primary key
  - "account_id != ''"             # Change to match primary key
  - "glynac_organization_id IS NOT NULL"
  - "glynac_organization_id != ''"

# ============================================================
# DEPENDENCIES (optional - inherits from _defaults.yaml)
# ============================================================
# Override dependency checks if needed
# dependencies:
#   auto_detect: true
#   mode: dataset_aware
#
#   check_strategy:
#     - type: table_exists
#       description: "Check if Bronze table exists"
#       fail_on_missing: true
#
#     - type: has_data
#       description: "Check if Bronze table has data"
#       fail_on_empty: true
#       partition_column: processing_date
#
#     - type: freshness
#       description: "Check Bronze data is fresh"
#       max_age_hours: 2
#       fail_on_stale: false

# ============================================================
# TESTS (optional - inherits row_count from _defaults.yaml)
# ============================================================
# Data quality tests
tests:
  - type: row_count
    min: 1
    severity: error

  - type: not_null
    columns:
      - account_id         # Change to match primary key
      - glynac_organization_id
    severity: error

  - type: unique
    columns:
      - account_id         # Change to match primary key
      - processing_date
    severity: warning
