version: "1.0"
layer: silver
database: silver
table: mv_redtail_email_to_timeline

dag:
  dag_id: "silver__mv_redtail_email_to_timeline"
  description: "Materialized View: Redtail Email → Timeline Events"
  schedule_interval: "dataset"
  catchup: false
  tags:
    - silver
    - timeline
    - materialized_view
    - redtail
    - email

task:
  task_type: materialized_view
  org_id: 123
  source_table: silver.redtail_email
  target_table: silver.org_123_timeline
  event_type: email_sent
  entity_type: email
