# Silver Layer - OpenCATS Email Template (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform OpenCATS email_template from Bronze to Silver"
  tags: ["silver", "opencats", "email_template", "auto-mode", "single-tenant"]

source:
  database: opencats
  table: email_template_raw

target:
  database: opencats_silver
  table: email_template

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [email_template_id, partition]
  order_by: [email_template_id DESC]

filters:
  - "email_template_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
