# Silver Layer - OpenCATS History (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform OpenCATS history from Bronze to Silver"
  tags: ["silver", "opencats", "history", "auto-mode", "single-tenant"]

source:
  database: opencats
  table: history_raw

target:
  database: opencats_silver
  table: history

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [history_id, partition]
  order_by: [history_id DESC]

filters:
  - "history_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
