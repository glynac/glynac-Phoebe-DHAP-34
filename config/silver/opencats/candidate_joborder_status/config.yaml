# Silver Layer - OpenCATS Candidate Joborder Status (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform OpenCATS candidate_joborder_status from Bronze to Silver"
  tags: ["silver", "opencats", "candidate_joborder_status", "auto-mode", "single-tenant"]

source:
  database: opencats
  table: candidate_joborder_status_raw

target:
  database: opencats_silver
  table: candidate_joborder_status

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [candidate_joborder_status_id, partition]
  order_by: [candidate_joborder_status_id DESC]

filters:
  - "candidate_joborder_status_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
