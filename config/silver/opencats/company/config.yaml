# Silver Layer - OpenCATS Company (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform OpenCATS company from Bronze to Silver"
  tags: ["silver", "opencats", "company", "auto-mode", "single-tenant"]

source:
  database: opencats
  table: company_raw

target:
  database: opencats_silver
  table: company

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  name:
    transform: clean_string
  city:
    transform: clean_string

dedupe:
  partition_by: [company_id, partition]
  order_by: [date_modified DESC]

filters:
  - "company_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
