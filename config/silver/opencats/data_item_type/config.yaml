# Silver Layer - OpenCATS Data Item Type (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform OpenCATS data_item_type from Bronze to Silver"
  tags: ["silver", "opencats", "data_item_type", "auto-mode", "single-tenant"]

source:
  database: opencats
  table: data_item_type_raw

target:
  database: opencats_silver
  table: data_item_type

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [data_item_type_id, partition]
  order_by: [data_item_type_id DESC]

filters:
  - "data_item_type_id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
