# Silver Layer - Strapi Role (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Strapi strapi_role from Bronze to Silver"
  tags: ["silver", "strapi", "strapi_role", "auto-mode", "single-tenant"]

source:
  database: strapi
  table: strapi_role_raw

target:
  database: strapi_silver
  table: strapi_role

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  name:
    transform: clean_string
  description:
    transform: clean_string

dedupe:
  partition_by: [id, partition]
  order_by: [id DESC]

filters:
  - "id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
