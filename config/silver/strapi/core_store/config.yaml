# Silver Layer - Strapi Core Store (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Strapi core_store from Bronze to Silver"
  tags: ["silver", "strapi", "core_store", "auto-mode", "single-tenant"]

source:
  database: strapi
  table: core_store_raw

target:
  database: strapi_silver
  table: core_store

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

dedupe:
  partition_by: [id, partition]
  order_by: [id DESC]

filters:
  - "id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
