# Silver Layer - Strapi Administrator (AUTO MODE)
version: "1.0"
single_tenant: true

dag:
  description: "Transform Strapi strapi_administrator from Bronze to Silver"
  tags: ["silver", "strapi", "strapi_administrator", "auto-mode", "single-tenant"]

source:
  database: strapi
  table: strapi_administrator_raw

target:
  database: strapi_silver
  table: strapi_administrator

task:
  incremental:
    partition_column: partition

clickhouse:
  partition_by: toYYYYMM(partition)
  ttl: "partition + INTERVAL 730 DAY"

transforms:
  firstname:
    transform: clean_string
  lastname:
    transform: clean_string
  email:
    transform: clean_email

dedupe:
  partition_by: [id, partition]
  order_by: [id DESC]

filters:
  - "id IS NOT NULL"

lookback_days: 90

tests:
  - type: row_count
    min: 1
    severity: error
