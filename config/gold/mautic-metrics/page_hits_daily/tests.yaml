version: "1.0"

tests:
  - name: not_empty
    description: "Table should have data"
    query: "SELECT count() > 0 FROM {database}.{table}"
    severity: error

  - name: has_recent_data
    description: "Should have data from last 7 days"
    query: "SELECT max(metric_date) >= today() - 7 FROM {database}.{table}"
    severity: warning

  - name: no_negative_hits
    description: "Hit counts should not be negative"
    query: "SELECT count() = 0 FROM {database}.{table} WHERE total_hits < 0"
    severity: error
