version: "1.0"

tests:
  - name: not_empty
    description: "Table should have data"
    query: "SELECT count() > 0 FROM {database}.{table}"
    severity: error

  - name: no_negative_counts
    description: "Counts should not be negative"
    query: "SELECT count() = 0 FROM {database}.{table} WHERE unique_leads < 0 OR total_visits < 0"
    severity: error
