# Gold: Mautic Leads Daily Stats
# Auto-detects dependency from query.sql: mautic.leads_raw

dag_id: gold_mautic_leads_daily_stats
description: "Daily aggregated lead statistics from Mautic"

schedule_interval: dataset  # Auto-detects from query.sql (mautic.leads_raw)

catchup: false
max_active_runs: 1

tags:
  - gold
  - mautic
  - leads
  - daily_stats
  - auto-dependency

task:
  task_type: materialized_view
  source_table: mautic.leads_raw
  refresh_mode: incremental

default_args:
  owner: data-engineering
  retries: 2
  retry_delay_minutes: 5

execution_timeout: 1800
