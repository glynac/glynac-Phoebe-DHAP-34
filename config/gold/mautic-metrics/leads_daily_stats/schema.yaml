version: "1.0"
layer: gold
database: gold
table: mautic_leads_daily_stats

metadata:
  display_name: "Mautic Leads Daily Stats"
  description: "Daily aggregated lead statistics - new leads, points, conversions"
  owner: data-engineering
  tags: [gold, mautic, leads, daily, metrics]
  refresh_frequency: realtime
  pii: false

clickhouse:
  engine: SummingMergeTree
  partition_by: toYYYYMM(metric_date)
  order_by:
    - metric_date
  settings:
    index_granularity: 8192

materialized_view:
  enabled: true
  name: mv_mautic_leads_daily_stats
  to_table: gold.mautic_leads_daily_stats
  source_table: mautic.leads_raw
  refresh_on_insert: true

schema:
  columns:
    - name: metric_date
      type: Date
      nullable: false
      description: "Date of the metric"

    - name: new_leads
      type: UInt32
      nullable: false
      description: "Number of new leads added"

    - name: identified_leads
      type: UInt32
      nullable: false
      description: "Number of leads identified"

    - name: total_points
      type: Int64
      nullable: false
      description: "Sum of all lead points"

    - name: avg_points
      type: Float64
      nullable: false
      description: "Average points per lead"

    - name: leads_with_email
      type: UInt32
      nullable: false
      description: "Leads with email address"

    - name: leads_with_company
      type: UInt32
      nullable: false
      description: "Leads with company info"

    - name: _aggregated_at
      type: DateTime
      nullable: false
      description: "When aggregation was computed"

validation:
  checks:
    - name: has_data
      query: "SELECT count() > 0 FROM {database}.{table}"
    - name: recent_data
      query: "SELECT max(metric_date) >= today() - 7 FROM {database}.{table}"
