version: "1.0"

dag:
  dag_id: "gold__user_daily_metrics"
  description: "Calculate daily user metrics for dashboards"
  schedule_interval: "dataset"
  start_date: "2025-01-01"
  catchup: false
  tags: [gold, metrics, daily]
  
  default_args:
    owner: analytics-team
    retries: 3
    retry_delay_minutes: 10

task:
  task_id: "calculate_metrics"
  task_type: clickhouse_aggregation
  
  incremental:
    enabled: true
    strategy: partition_based
    partition_column: metric_date

dependencies:
  auto_detect: true
  mode: dataset_aware

notifications:
  on_success:
    - type: log
      message: "✅ User daily metrics calculated"