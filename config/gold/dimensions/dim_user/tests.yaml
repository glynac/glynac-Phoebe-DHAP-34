version: "1.0"

tests:
  - name: metrics_not_negative
    type: assertion
    severity: error
    query: |
      SELECT 
        countIf(total_users < 0) as invalid
      FROM gold.user_daily_metrics
      WHERE metric_date = toDate('{{ ds }}')
    expect:
      invalid: 0
  
  - name: active_plus_inactive_equals_total
    type: assertion
    severity: error
    query: |
      SELECT 
        countIf(active_users + inactive_users != total_users) as mismatch
      FROM gold.user_daily_metrics
      WHERE metric_date = toDate('{{ ds }}')
    expect:
      mismatch: 0