version: "1.0"
layer: gold
category: metrics

database: gold
table: user_daily_metrics

metadata:
  display_name: "User Daily Metrics"
  description: "Daily aggregated user activity metrics for dashboards"
  owner: "data-engineering"
  tags: ["metrics", "users", "daily", "dashboard"]
  refresh_frequency: "daily"
  pii: false

clickhouse:
  engine: SummingMergeTree  # Auto-sum numeric columns on merge
  engine_options:
    sum_columns: 
      - total_users
      - active_users
      - inactive_users
  partition_by: toYYYYMM(metric_date)
  order_by: 
    - metric_date
    - organization_id
  settings:
    index_granularity: 8192
  ttl:
    column: metric_date
    interval: "90 DAY"  # Keep 90 days

schema:
  columns:
    # Dimensions
    - name: metric_date
      type: Date
      nullable: false
      description: "Date of the metric"
    
    - name: organization_id
      type: String
      nullable: false
      description: "Organization identifier"
    
    # Metrics
    - name: total_users
      type: UInt32
      nullable: false
      description: "Total number of users"
    
    - name: active_users
      type: UInt32
      nullable: false
      description: "Number of active users"
    
    - name: inactive_users
      type: UInt32
      nullable: false
      description: "Number of inactive users"
    
    - name: avg_user_age_days
      type: Float64
      nullable: true
      description: "Average user age in days"
    
    - name: max_user_age_days
      type: UInt32
      nullable: true
      description: "Maximum user age in days"
    
    - name: min_user_age_days
      type: UInt32
      nullable: true
      description: "Minimum user age in days"
    
    - name: median_user_age_days
      type: Float64
      nullable: true
      description: "Median user age in days"
    
    - name: p95_user_age_days
      type: Float64
      nullable: true
      description: "95th percentile user age in days"
    
    # Metadata
    - name: _aggregated_at
      type: DateTime
      nullable: false
      description: "Timestamp when aggregation ran"
    
    - name: _execution_date
      type: String
      nullable: false
      description: "Airflow execution date"