tests:
  - name: not_empty
    query: "SELECT COUNT(*) > 0 FROM {database}.{table}"
    expected: true
    severity: critical
  
  - name: revenue_positive
    query: "SELECT MIN(total_revenue) >= 0 FROM {database}.{table}"
    expected: true
    severity: critical
  
  - name: customer_count_positive
    query: "SELECT MIN(unique_customers) > 0 FROM {database}.{table}"
    expected: true
    severity: warning