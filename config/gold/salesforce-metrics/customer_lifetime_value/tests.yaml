tests:
  - name: not_empty
    query: "SELECT COUNT(*) > 0 FROM {database}.{table}"
    expected: true
    severity: critical
  
  - name: clv_positive
    query: "SELECT MIN(predicted_clv) >= 0 FROM {database}.{table}"
    expected: true
    severity: critical
  
  - name: valid_segments
    query: |
      SELECT COUNT(*) = 0 
      FROM {database}.{table}
      WHERE customer_segment NOT IN (
        'Champions', 'Loyal Customers', 'Potential Loyalists', 'At Risk', 'Lost'
      )
    expected: true
    severity: critical
  
  - name: rfm_score_range
    query: |
      SELECT MIN(rfm_score) >= 3 AND MAX(rfm_score) <= 15
      FROM {database}.{table}
    expected: true
    severity: warning