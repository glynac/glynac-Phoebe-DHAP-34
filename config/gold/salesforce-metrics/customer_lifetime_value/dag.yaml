# Gold: Customer Lifetime Value
# Auto-detects dependency from query.sql: silver.customer_orders

dag_id: gold_salesforce_customer_ltv
description: "Customer Lifetime Value calculation from Salesforce"

schedule_interval: dataset  # Auto-detects from query.sql (silver.customer_orders)

catchup: false
max_active_runs: 1

tags:
  - gold
  - salesforce
  - metrics
  - clv
  - auto-dependency

task:
  task_type: hybrid  # SQL preprocessing + Python CLV calculation

default_args:
  owner: data-engineering
  retries: 2
  retry_delay_minutes: 5

execution_timeout: 3600
