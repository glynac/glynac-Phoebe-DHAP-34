version: "1.0"
layer: gold
category: metrics

database: gold
table: revenue_metrics

metadata:
  display_name: "Revenue Metrics"
  description: "Advanced revenue calculations using Python"
  owner: "data-engineering"
  tags: ["metrics", "revenue", "python", "daily"]
  transformation_type: python  # Indicates Python transformation
  refresh_frequency: "daily"

clickhouse:
  engine: MergeTree
  partition_by: toYYYYMM(metric_date)
  order_by:
    - metric_date
    - organization_id

schema:
  columns:
    - name: organization_id
      type: String
      nullable: false
    
    - name: metric_date
      type: Date
      nullable: false
    
    - name: total_revenue
      type: Float64
      nullable: false
    
    - name: avg_revenue
      type: Float64
      nullable: false
    
    - name: std_revenue
      type: Float64
      nullable: true
    
    - name: transaction_count
      type: UInt32
      nullable: false
    
    - name: unique_customers
      type: UInt32
      nullable: false
    
    - name: revenue_per_customer
      type: Float64
      nullable: true
    
    - name: revenue_coefficient_of_variation
      type: Float64
      nullable: true
    
    - name: revenue_growth_rate
      type: Float64
      nullable: true
      description: "Day-over-day revenue growth rate (%)"
    
    - name: prev_day_revenue
      type: Float64
      nullable: true
    
    - name: _calculated_at
      type: DateTime
      nullable: false
    
    - name: _execution_date
      type: String
      nullable: false