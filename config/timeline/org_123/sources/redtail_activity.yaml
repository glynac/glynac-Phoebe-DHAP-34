version: "1.0"
# ============================================================
# Timeline Source: Redtail Activity
# ============================================================
# Generates timeline events from redtail_silver.activity table
# Events: activity_created, activity_scheduled, activity_completed, activity_updated

source:
  database: redtail_silver
  table: activity
  primary_key: rec_id
  org_filter_column: glynac_organization_id

timeline:
  entity_type: activity
  mv_name: mv_redtail_activity_to_timeline

  events:
    # Event 1: activity_created [timestamp: rec_add]
    - type: activity_created
      timestamp_field: rec_add
      timestamp_source: rec_add
      condition: "rec_add IS NOT NULL"
      description_template: "{activity_type} created: {subject}"
      metadata:
        activity_id: "toString(COALESCE(activity_id, 0))"
        category: "COALESCE(category, '')"
        subcategory: "COALESCE(subcategory, '')"
        priority: "COALESCE(priority_normalized, '')"
        contact_id: "toString(COALESCE(contact_id, 0))"

    # Event 2: activity_scheduled [timestamp: activity_date] - business event
    - type: activity_scheduled
      timestamp_field: activity_date
      timestamp_source: activity_date
      condition: "activity_date IS NOT NULL AND (rec_add IS NULL OR activity_date != rec_add)"
      description_template: "{activity_type} scheduled: {subject}"
      metadata:
        activity_id: "toString(COALESCE(activity_id, 0))"
        category: "COALESCE(category, '')"
        subcategory: "COALESCE(subcategory, '')"
        activity_status: "COALESCE(status_normalized, '')"
        priority: "COALESCE(priority_normalized, '')"
        duration_minutes: "toString(COALESCE(duration_minutes, 0))"
        contact_id: "toString(COALESCE(contact_id, 0))"
        owner_id: "toString(COALESCE(owner_id, 0))"
        location: "COALESCE(location, '')"

    # Event 3: activity_completed [timestamp: rec_edit] - when status = completed
    - type: activity_completed
      timestamp_field: rec_edit
      timestamp_source: rec_edit
      condition: "rec_edit IS NOT NULL AND status_normalized = 'completed'"
      description_template: "{activity_type} completed: {subject} - {outcome}"
      metadata:
        activity_id: "toString(COALESCE(activity_id, 0))"
        category: "COALESCE(category, '')"
        activity_status: "COALESCE(status_normalized, '')"
        outcome: "COALESCE(outcome, '')"
        duration_minutes: "toString(COALESCE(duration_minutes, 0))"
        contact_id: "toString(COALESCE(contact_id, 0))"
        notes: "COALESCE(notes, '')"

    # Event 4: activity_updated [timestamp: rec_edit]
    - type: activity_updated
      timestamp_field: rec_edit
      timestamp_source: rec_edit
      condition: "rec_edit IS NOT NULL AND rec_add IS NOT NULL AND rec_edit != rec_add"
      description_template: "{activity_type} updated: {subject}"
      metadata:
        activity_id: "toString(COALESCE(activity_id, 0))"
        activity_status: "COALESCE(status_normalized, '')"
        priority: "COALESCE(priority_normalized, '')"
        represents: "'final_state'"
