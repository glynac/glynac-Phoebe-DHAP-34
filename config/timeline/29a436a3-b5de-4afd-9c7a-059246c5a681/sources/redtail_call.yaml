version: "1.0"
# ============================================================
# Timeline Source: Redtail Call
# ============================================================
# Generates timeline events from redtail_silver.call table
# Events: call_created, call_made, call_updated

source:
  database: redtail_silver
  table: call
  primary_key: rec_id
  org_filter_column: glynac_organization_id

timeline:
  entity_type: call
  mv_name: mv_redtail_call_to_timeline

  events:
    # Event 1: call_created [timestamp: rec_add]
    - type: call_created
      timestamp_field: rec_add
      timestamp_source: rec_add
      condition: "rec_add IS NOT NULL"
      description_template: "Call logged: {subject}"
      metadata:
        call_id: "toString(COALESCE(call_id, 0))"
        call_type: "COALESCE(call_type, '')"
        contact_id: "toString(COALESCE(contact_id, 0))"

    # Event 2: call_made [timestamp: call_date] - business event
    - type: call_made
      timestamp_field: call_date
      timestamp_source: call_date
      condition: "call_date IS NOT NULL AND (rec_add IS NULL OR call_date != rec_add)"
      description_template: "{call_type} call: {subject}"
      metadata:
        call_id: "toString(COALESCE(call_id, 0))"
        call_status: "COALESCE(call_status, '')"
        phone_number: "COALESCE(phone_number, '')"
        duration_minutes: "toString(COALESCE(duration_minutes, 0))"
        disposition: "COALESCE(disposition, '')"
        outcome: "COALESCE(outcome, '')"
        contact_id: "toString(COALESCE(contact_id, 0))"
        user_id: "toString(COALESCE(user_id, 0))"
        has_recording: "toString(COALESCE(has_recording, 0))"

    # Event 3: call_updated [timestamp: rec_edit]
    - type: call_updated
      timestamp_field: rec_edit
      timestamp_source: rec_edit
      condition: "rec_edit IS NOT NULL AND rec_add IS NOT NULL AND rec_edit != rec_add"
      description_template: "Call record updated: {subject}"
      metadata:
        call_id: "toString(COALESCE(call_id, 0))"
        call_status: "COALESCE(call_status, '')"
        outcome: "COALESCE(outcome, '')"
        represents: "'final_state'"
