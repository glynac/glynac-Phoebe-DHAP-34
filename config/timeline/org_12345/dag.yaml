version: "1.0"
pipeline_type: timeline

# ============================================================
# Timeline DAG Configuration - Organization org-12345
# ============================================================
# This creates a DAG that:
#   1. Creates the timeline database and table
#   2. Creates MVs from source YAML configs
#   3. Backfills existing data
#   4. Validates the timeline
#
# Production configuration for org-12345 with Black Diamond data

dag:
  dag_id: "timeline__org_12345"
  description: "Canonical Event Timeline for Black Diamond - Organization org-12345"
  schedule_interval: "@once"  # Run once to create infrastructure
  start_date: "2026-01-01"
  catchup: false
  max_active_runs: 1
  concurrency: 5  # Run up to 5 source MVs in parallel

  tags:
    - timeline
    - blackdiamond
    - canonical-events
    - phase1

  default_args:
    owner: ai-team
    retries: 2
    retry_delay_minutes: 3
    execution_timeout_minutes: 30
    email_on_failure: false
    email_on_retry: false

# ============================================================
# Organization Configuration
# ============================================================
organization:
  org_id: "org-12345"
  org_name: "Organization 12345"
  database: "org_12345"

# ============================================================
# Timeline Table Configuration
# ============================================================
# Uses shared Jinja template: timeline/_templates/table.sql.j2
# Template variables: {{ database }}, {{ org_id }}, {{ ttl_days }}

timeline_table:
  name: timeline
  database: org_12345

  # Jinja template (shared across all orgs - no org-specific SQL needed)
  template_path: "timeline/_templates/table.sql.j2"

  # TTL
  ttl_days: 2555  # ~7 years

  # Table engine settings (documented for reference)
  engine: ReplacingMergeTree
  version_column: _version
  partition_by: "toYYYYMM(processing_date)"
  order_by:
    - org_id
    - entity_type
    - entity_id
    - timestamp
    - event_type
  primary_key:
    - org_id
    - entity_type
    - entity_id

# ============================================================
# Source Configurations - Phase 1 (12 Core Events)
# ============================================================
# Each source file defines events to extract from a silver table
# The generator reads these YAML files and creates MVs automatically

sources:
  # ============================================================
  # Phase 1: Core Events (11 events - tax_lots disabled)
  # ============================================================

  # Relationship Events (2 events: created, terminated)
  - name: blackdiamond_relationships
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_relationships.yaml"
    expected_min_events: 1
    description: "Relationship lifecycle events (Phase 1+3)"

  # Contact Events (1 event: created)
  - name: blackdiamond_contacts
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_contacts.yaml"
    expected_min_events: 1
    description: "Contact lifecycle events (Phase 1)"

  # Portfolio Events (1 event: created)
  - name: blackdiamond_portfolios
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolios.yaml"
    expected_min_events: 1
    description: "Portfolio lifecycle events (Phase 1)"

  # Account Events (6 events: created, opened, closed, reconciled, billing started/ended)
  - name: blackdiamond_accounts
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_accounts.yaml"
    expected_min_events: 1
    description: "Account lifecycle and billing events (Phase 1+2+3)"

  # Portfolio-Account Assignment Events (1 event: assigned)
  - name: blackdiamond_portfolio_accounts
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolio_accounts.yaml"
    expected_min_events: 1
    description: "Account-to-portfolio assignment events (Phase 1)"

  # Holding Events (6 events: established, closed, buy, sell, deposit, withdrawal)
  - name: blackdiamond_holdings
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_holdings.yaml"
    expected_min_events: 1
    description: "Holding and transaction events (Phase 1+2)"

  # ============================================================
  # Phase 2: High Value Events (7 events)
  # ============================================================

  # Goal Events (1 event: created)
  - name: blackdiamond_goals
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_goals.yaml"
    expected_min_events: 0
    description: "Goal lifecycle events (Phase 2)"

  # Goal Assignment Events (1 event: assigned to account)
  - name: blackdiamond_portfolio_account_goals
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolio_account_goals.yaml"
    expected_min_events: 0
    description: "Goal assignment events (Phase 2)"

  # Portfolio Benchmark Events (2 events: assigned, removed)
  - name: blackdiamond_portfolio_benchmarks
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolio_benchmarks.yaml"
    expected_min_events: 0
    description: "Portfolio benchmark events (Phase 2+3)"

  # Portfolio Advisor Events (1 event: assigned)
  - name: blackdiamond_portfolio_advisors
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolio_advisors.yaml"
    expected_min_events: 0
    description: "Portfolio advisor assignment events (Phase 2)"

  # ============================================================
  # Phase 3: Enhanced Events (3 events)
  # ============================================================

  # Relationship Contact Events (2 events: primary, secondary)
  - name: blackdiamond_relationship_contacts
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_relationship_contacts.yaml"
    expected_min_events: 0
    description: "Contact assignment events (Phase 3)"

  # Portfolio Group Events (1 event: group assigned)
  - name: blackdiamond_portfolio_group_members
    enabled: true
    config_path: "timeline/org_12345/sources/blackdiamond_portfolio_group_members.yaml"
    expected_min_events: 0
    description: "Portfolio group assignment events (Phase 3)"

  # ============================================================
  # Disabled Sources (table not available)
  # ============================================================

  # Tax Lot Events (1 event: opened)
  # DISABLED: tax_lots table does not exist in blackdiamond_silver yet
  - name: blackdiamond_tax_lots
    enabled: false
    config_path: "timeline/org_12345/sources/blackdiamond_tax_lots.yaml"
    expected_min_events: 0
    description: "Tax lot lifecycle events (disabled - table not available)"

# ============================================================
# Validation Configuration
# ============================================================
validation:
  enabled: true

  checks:
    - type: table_exists
      description: "Verify timeline table was created"
      table: timeline
      fail_on_missing: true

    - type: mv_exists
      description: "Verify all MVs were created"
      fail_on_missing: true

    - type: has_data
      description: "Verify timeline has events"
      table: timeline
      min_rows: 1
      fail_on_empty: false  # Warn only

    - type: data_quality
      description: "Check for NULL values in required fields"
      checks:
        - field: event_id
          rule: not_null
        - field: org_id
          rule: not_null
        - field: event_type
          rule: not_null
        - field: timestamp
          rule: not_null

# ============================================================
# Monitoring Configuration
# ============================================================
monitoring:
  enabled: true

  sla:
    enabled: true
    duration_minutes: 30

  metrics:
    - name: timeline_event_count
      query: "SELECT count() FROM org_12345.timeline"
      alert_if_below: 1

    - name: events_by_type
      query: |
        SELECT event_type, count() as cnt
        FROM org_12345.timeline
        GROUP BY event_type
        ORDER BY cnt DESC

    - name: events_by_entity_type
      query: |
        SELECT entity_type, count() as cnt
        FROM org_12345.timeline
        GROUP BY entity_type
        ORDER BY cnt DESC

# ============================================================
# Notes
# ============================================================
# Total Implemented Events: 25 out of 36 canonical events
#
# Phase 1 - Core Events (11 events - tax_lot_opened disabled):
#   1. relationship_created
#   2. contact_created
