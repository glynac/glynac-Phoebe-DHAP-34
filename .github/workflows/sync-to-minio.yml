name: Sync Configs to MinIO

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - 'stream-flink/**'
      - 'sql-extractor/**'  # Docker job DAG configs
  workflow_dispatch:  # Allow manual trigger

env:
  MINIO_ALIAS: minio

jobs:
  sync:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinIO Client
      run: |
        if ! command -v mc &> /dev/null; then
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc -O /tmp/mc
          chmod +x /tmp/mc
          sudo mv /tmp/mc /usr/local/bin/mc
        fi
        mc --version

    - name: Configure MinIO alias
      env:
        MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
        MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      run: |
        mc alias set ${{ env.MINIO_ALIAS }} $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

    - name: Sync configs to MinIO
      env:
        MINIO_BUCKET: ${{ secrets.MINIO_CONFIG_BUCKET || 'airflow-configs' }}
      run: |
        echo "Syncing configs to MinIO bucket: $MINIO_BUCKET"

        # Sync config folder (bronze, silver, gold, global_config.yaml, etc.)
        # --remove: Delete files in MinIO that don't exist in repo (handles renames/restructures)
        # --overwrite: Update existing files
        mc mirror --overwrite --remove config/ ${{ env.MINIO_ALIAS }}/$MINIO_BUCKET/ \
          --exclude ".gitkeep"

        echo "Config sync completed!"

    - name: Sync Docker job configs to MinIO
      env:
        MINIO_BUCKET: ${{ secrets.MINIO_CONFIG_BUCKET || 'airflow-configs' }}
      run: |
        echo "Syncing Docker job configs to MinIO..."

        # Sync sql-extractor DAG configs to docker-jobs-configs/sql-extractor/
        # Structure: sql-extractor/{database}/dag_*.yaml -> docker-jobs-configs/sql-extractor/{database}/dag_*.yaml
        if [ -d "sql-extractor" ]; then
          echo "Syncing sql-extractor configs..."
          mc mirror --overwrite --remove sql-extractor/ ${{ env.MINIO_ALIAS }}/$MINIO_BUCKET/docker-jobs-configs/sql-extractor/ \
            --exclude ".gitkeep" \
            --exclude "README.md"
          echo "sql-extractor sync completed!"
        else
          echo "No sql-extractor folder found, skipping..."
        fi

        echo "Docker job configs sync completed!"

    - name: Verify sync
      env:
        MINIO_BUCKET: ${{ secrets.MINIO_CONFIG_BUCKET || 'airflow-configs' }}
      run: |
        echo "=== MinIO bucket contents ==="
        mc ls --recursive ${{ env.MINIO_ALIAS }}/$MINIO_BUCKET/ | head -50

        echo ""
        echo "=== Summary ==="
        mc ls ${{ env.MINIO_ALIAS }}/$MINIO_BUCKET/

        echo ""
        echo "=== Docker Jobs Configs ==="
        mc ls --recursive ${{ env.MINIO_ALIAS }}/$MINIO_BUCKET/docker-jobs-configs/ 2>/dev/null || echo "No docker-jobs-configs yet"

    - name: Notify on failure
      if: failure()
      run: |
        echo "::error::Failed to sync configs to MinIO. Check credentials and connectivity."
