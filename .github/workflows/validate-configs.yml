name: Validate Configurations

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt

    - name: Run validation tests
      run: |
        cd tests
        pytest test_config_validation.py -v

    - name: Run Bronze layer tests
      run: |
        cd tests
        pytest test_bronze_configs.py -v

    - name: Run Silver layer tests
      run: |
        cd tests
        pytest test_silver_configs.py -v

    - name: Check YAML syntax
      run: |
        find config -name "*.yaml" -o -name "*.yml" | while read file; do
          echo "Checking $file"
          python -c "import yaml; yaml.safe_load(open('$file'))"
        done

    - name: Check SQL files exist and not empty
      run: |
        find config -name "*.sql" | while read file; do
          echo "Checking $file"
          if [ ! -s "$file" ]; then
            echo "ERROR: $file is empty"
            exit 1
          fi
        done

    - name: Summary
      if: success()
      run: |
        echo "✅ All configuration validations passed!"
        echo "📊 Config files validated:"
        echo "  - Global configs: $(find config -maxdepth 1 -name "*.yaml" | wc -l)"
        echo "  - Bronze configs: $(find config/bronze -name "*.yaml" | wc -l)"
        echo "  - Silver configs: $(find config/silver -name "*.yaml" | wc -l)"
        echo "  - Gold configs: $(find config/gold -name "*.yaml" | wc -l)"
        echo "  - Flink SQL files: $(find config/stream-flink -name "*.sql" | wc -l)"
